<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PK Dispatch — กำลังโหลด</title>
<meta http-equiv="refresh" content="0; url=app.html">
<link rel="canonical" href="app.html">
<style>
  html, body { margin:0; padding:0; height:100%; background:#0f1319; color:#e8ecf2; font-family:sans-serif; }
  .center { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; text-align:center; }
  .box { max-width:380px; }
  .logo { font-family:'Courier New',monospace; font-size:18px; color:#f5a623; letter-spacing:4px; margin-bottom:14px; }
  .msg { font-size:14px; color:#a8b3c7; margin-bottom:18px; line-height:1.6; }
  .link { display:inline-block; padding:10px 22px; background:#f5a623; color:#000; text-decoration:none; border-radius:8px; font-weight:700; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spin {
    display:inline-block; width:18px; height:18px;
    border:2px solid rgba(245,166,35,.2); border-top-color:#f5a623;
    border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle;
    margin-right:8px;
  }
</style>
<script>
  // redirect ทันทีถ้า JS เปิดอยู่
  location.replace('app.html');
</script>
</head>
<body>
  <div class="center">
    <div class="box">
      <div class="logo">PK DISPATCH</div>
      <div class="msg">
        <span class="spin"></span>กำลังพาไปยังระบบใหม่...<br>
        <small style="color:#6b7a94;">หากไม่ redirect อัตโนมัติ:</small>
      </div>
      <a class="link" href="app.html">ไปที่ app.html →</a>
    </div>
  </div>
</body>
</html>
