<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>PK — ช่าง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0f1319;--s:#171d27;--s2:#1e2535;--br:#2a3347;--acc:#f5a623;--gr:#34c759;--rd:#ff453a;--bl:#4a9eff;--tx:#e8ecf2;--mu:#6b7a94;--sans:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;padding-bottom:24px;}
#urlBanner{background:#1a1200;border-bottom:2px solid var(--acc);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#urlBanner.hi{display:none;}
#urlInput{flex:1;min-width:200px;padding:7px 10px;border:1px solid var(--br);border-radius:7px;background:var(--bg);color:var(--tx);font-family:var(--mono);font-size:11px;}
.url-save{background:var(--acc);color:#000;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);}
header{background:var(--s);border-bottom:1px solid var(--br);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--mono);font-size:13px;color:var(--acc);letter-spacing:2px;}
.hbtn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:var(--sans);}
.screen-pad{padding:20px 14px;}
.center-screen{min-height:78vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 14px;gap:12px;}
.ts-title{font-size:17px;font-weight:700;text-align:center;}
.ts-sub{font-size:13px;color:var(--mu);text-align:center;}
.tbtn{width:100%;max-width:360px;padding:16px;background:var(--s);border:1px solid var(--br);border-radius:14px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:all .15s;font-family:var(--sans);}
.tbtn:active{border-color:var(--acc);background:var(--s2);}
.tav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.c1{background:rgba(200,80,26,.2);color:#f5a623;}.c2{background:rgba(26,95,168,.2);color:#4a9eff;}.c3{background:rgba(45,122,58,.2);color:#34c759;}
.tbn{font-size:15px;font-weight:700;color:var(--tx);}.tbs{font-size:11px;color:var(--mu);margin-top:2px;}
.back-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.back-btn{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;padding:2px;}
.screen-title{font-size:15px;font-weight:700;}
.list{display:flex;flex-direction:column;gap:8px;}
.litem{padding:14px 16px;background:var(--s);border:1px solid var(--br);border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;}
.litem:active{border-color:var(--acc);background:var(--s2);}
.litem.locked{opacity:.4;cursor:not-allowed;}
.li-main{font-family:var(--mono);font-size:15px;font-weight:500;}
.li-sub{font-size:12px;color:var(--mu);margin-top:2px;}
.tag{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:20px;}
.tag-lock{background:rgba(255,69,58,.15);color:var(--rd);}
.tag-open{background:rgba(52,199,89,.15);color:var(--gr);}
.tag-today{background:rgba(245,166,35,.15);color:var(--acc);}
.worker-grid{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px;}
.wbtn{padding:14px 18px;background:var(--s);border:1px solid var(--br);border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;color:var(--tx);font-family:var(--sans);transition:all .15s;display:flex;align-items:center;gap:10px;}
.wbtn:active{border-color:var(--acc);background:var(--s2);}
.app-top{padding:10px 14px 8px;border-bottom:1px solid var(--br);background:var(--s);}
.app-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;}
.app-meta{font-size:11px;color:var(--mu);margin-top:4px;font-family:var(--mono);}
.app-stats{display:flex;gap:12px;margin-top:6px;}
.ast{font-size:11px;color:var(--mu);}.ast span{color:var(--tx);font-weight:600;}
.tabs{display:flex;background:var(--s);border-bottom:1px solid var(--br);}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.jlist{padding:10px;display:flex;flex-direction:column;gap:10px;}
.jcard{background:var(--s);border:1px solid var(--br);border-radius:14px;overflow:hidden;}
.jcard.working{border-color:var(--bl);}
.jcard.done{opacity:.72;}
.jtop{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;}
.jnum{font-family:var(--mono);font-size:11px;color:var(--mu);background:var(--s2);padding:2px 8px;border-radius:20px;}
.badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;font-family:var(--mono);}
.bp{background:rgba(245,166,35,.15);color:var(--acc);}.bw{background:rgba(74,158,255,.15);color:var(--bl);}.bd{background:rgba(52,199,89,.15);color:var(--gr);}
.jname{font-size:16px;font-weight:700;padding:0 14px 4px;}
.jaddr{font-size:12px;color:var(--mu);padding:0 14px 10px;line-height:1.5;}
.map-btn{margin:0 14px 10px;display:flex;align-items:center;gap:8px;background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.3);border-radius:8px;padding:9px 12px;color:var(--bl);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;}
.map-locked{margin:0 14px 10px;background:var(--s2);border:1px dashed var(--br);border-radius:8px;padding:9px 12px;color:var(--mu);font-size:12px;text-align:center;}
.map-btn:active{background:rgba(74,158,255,.2);}
.jdesc{margin:0 14px 10px;background:var(--s2);border-radius:7px;padding:9px 11px;font-size:12px;color:var(--mu);border-left:3px solid var(--bl);}
.jnote{margin:0 14px 10px;background:var(--s2);border-radius:7px;padding:9px 11px;font-size:12px;color:var(--mu);border-left:3px solid var(--acc);}
.jinfo{padding:9px 14px;border-top:1px solid var(--br);display:flex;gap:14px;flex-wrap:wrap;background:var(--s2);}
.ii{font-size:12px;}.il{color:var(--mu);margin-bottom:2px;}.iv{font-weight:600;}.iv.money{color:var(--acc);font-family:var(--mono);font-size:14px;}
.photos{padding:0 12px 10px;display:flex;gap:7px;overflow-x:auto;}
.photos::-webkit-scrollbar{display:none;}
.pthumb{width:58px;height:58px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--br);cursor:pointer;}
.jact{padding:10px 12px;border-top:1px solid var(--br);display:flex;gap:7px;flex-wrap:wrap;}
.btn{padding:11px 16px;border-radius:10px;border:none;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;flex:1;justify-content:center;min-width:80px;}
.btn:active{transform:scale(.96);}
.btn-start{background:var(--bl);color:#fff;}
.btn-done{background:var(--gr);color:#000;}
.btn-cont{background:var(--s2);color:var(--acc);border:1px solid var(--br);}
.btn-cancel{background:var(--s2);color:var(--rd);border:1px solid rgba(255,69,58,.4);}
.btn-photo{background:var(--s2);color:var(--tx);border:1px solid var(--br);flex:0 0 auto;min-width:auto;padding:11px 14px;}
.done-info{padding:9px 14px 12px;background:rgba(52,199,89,.07);border-top:1px solid rgba(52,199,89,.2);font-size:12px;color:var(--gr);display:flex;flex-direction:column;gap:3px;}
.map-wrap{margin:0 12px 10px;border-radius:10px;overflow:hidden;border:1px solid var(--br);height:180px;}
.loading{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:500;font-size:14px;color:#fff;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .75s linear infinite;}
.pmodal{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:400;display:none;align-items:center;justify-content:center;}
.pmodal.open{display:flex;}
.pmodal img{max-width:94vw;max-height:90vh;border-radius:8px;}
.pmclose{position:absolute;top:14px;right:14px;font-size:28px;color:#fff;cursor:pointer;background:none;border:none;}
.empty{padding:40px 20px;text-align:center;color:var(--mu);}
.empty-icon{font-size:36px;margin-bottom:10px;}.empty h3{font-size:15px;color:var(--tx);margin-bottom:5px;}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--s2);border:1px solid var(--br);border-radius:10px;padding:11px 18px;font-size:13px;z-index:300;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
a.call{color:var(--bl);text-decoration:none;font-weight:700;}
.no-worker{font-size:12px;color:var(--mu);text-align:center;padding:14px;line-height:1.6;}
</style>
</head>
<body>

<div id="urlBanner">
  <span style="font-size:12px;font-weight:600;color:var(--acc);white-space:nowrap;">🔗 URL:</span>
  <input id="urlInput" type="text" placeholder="วาง Apps Script URL ที่นี่">
  <button class="url-save" onclick="saveUrl()">บันทึก</button>
  <button onclick="document.getElementById('urlBanner').classList.add('hi')" style="background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;">×</button>
</div>

<header>
  <div class="logo">PK · ช่าง</div>
  <div style="display:flex;gap:7px;align-items:center;">
    <button class="hbtn" onclick="toggleUrl()">⚙</button>
    <button class="hbtn" onclick="refresh()">↺</button>
  </div>
</header>

<!-- TEAM SELECT -->
<div id="teamScreen" class="center-screen">
  <div class="ts-title">เลือกทีมของคุณ</div>
  <div class="ts-sub">กดเลือกทีมเพื่อดูรายการงาน</div>
  <div id="teamBtns" style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:8px;"></div>
</div>

<!-- DATE SELECT -->
<div id="dateScreen" class="screen-pad" style="display:none;">
  <div class="back-bar"><button class="back-btn" onclick="goTeam()">←</button><div class="screen-title" id="dateTitle"></div></div>
  <div class="list" id="dateList"></div>
</div>

<!-- WORKER SELECT -->
<div id="workerScreen" class="screen-pad" style="display:none;">
  <div class="back-bar"><button class="back-btn" onclick="goDate()">←</button><div class="screen-title" id="workerTitle"></div></div>
  <div class="ts-sub" style="margin-bottom:14px;">เลือกชื่อของคุณ (สำหรับงานวันนี้)</div>
  <div class="worker-grid" id="workerBtns"></div>
</div>

<!-- JOB APP -->
<div id="appScreen" style="display:none;">
  <div class="app-top">
    <div class="app-name"><button class="back-btn" onclick="goDate()">←</button><span id="appTN"></span><span id="appBadge" class="badge bp" style="font-size:10px;"></span></div>
    <div class="app-meta" id="appMeta"></div>
    <div class="app-stats" id="appSt"></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="setTab('active',this)">งานปัจจุบัน</button>
    <button class="tab" onclick="setTab('done',this)">เสร็จแล้ว</button>
  </div>
  <div id="jobWrap"></div>
</div>

<div class="loading" id="loading" style="display:none;"><div class="spinner"></div><div id="loadMsg">กำลังโหลด...</div></div>
<div class="pmodal" id="pmodal" onclick="closePM()"><button class="pmclose">×</button><img id="pmImg" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script>
let API='',selTeam=null,selDate=null,selWorker=null,jobs=[],curTab='active',maps={};
let accessDates=[],teams=[],allMembers=[];

window.addEventListener('DOMContentLoaded',()=>{
  const u=localStorage.getItem('pk_api')||'';
  if(u){API=u;document.getElementById('urlInput').value=u;document.getElementById('urlBanner').classList.add('hi');loadBootstrap();}
});

function saveUrl(){
  const v=document.getElementById('urlInput').value.trim();
  if(!v){toast('กรุณากรอก URL');return;}
  API=v;localStorage.setItem('pk_api',API);
  document.getElementById('urlBanner').classList.add('hi');loadBootstrap();
}
function toggleUrl(){document.getElementById('urlBanner').classList.toggle('hi');}

async function call(body){
  if(!API){toast('ตั้งค่า URL ก่อน (⚙)');throw new Error('no api');}
  try{
    const r=await fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
    return await r.json();
  }catch(e){toast('❌ เชื่อมต่อไม่ได้');throw e;}
}

async function loadBootstrap(){
  showLoad('กำลังโหลด...');
  try{
    const b=await call({action:'pk_bootstrap'});
    teams=b.teams||[];accessDates=b.access||[];allMembers=b.members||[];
    hideLoad();renderTeams();
  }catch(e){hideLoad();}
}

function renderTeams(){
  show('teamScreen');hide('dateScreen');hide('workerScreen');hide('appScreen');
  const cols=['c1','c2','c3'];
  const today=fmtDate(new Date());
  const w=document.getElementById('teamBtns');
  if(!teams.length){w.innerHTML='<div class="no-worker">ยังไม่มีทีมในระบบ</div>';return;}
  w.innerHTML=teams.map((t,i)=>{
    const has=accessDates.some(a=>a.team===t&&a.date>=today);
    return `<button class="tbtn" onclick="pickTeam('${t}')">
      <div class="tav ${cols[i%3]}">${t.charAt(t.length-1)}</div>
      <div><div class="tbn">${t}</div><div class="tbs">${has?'มีคิวที่อนุญาต':'ดูรายการงาน'}</div></div>
      <div style="margin-left:auto;font-size:20px;color:var(--mu);">→</div>
    </button>`;
  }).join('');
}

function pickTeam(t){
  selTeam=t;
  // หาวันที่ที่ทีมนี้ถูก "อนุญาต" จาก accessDates เท่านั้น (ไม่ดึงทุกวันแล้ว = เร็วขึ้น + แก้ปัญหา lock)
  const allowed=accessDates.filter(a=>a.team===t).map(a=>({date:a.date,note:a.note}));
  renderDates(allowed);
}

function renderDates(allowed){
  hide('teamScreen');show('dateScreen');hide('workerScreen');hide('appScreen');
  document.getElementById('dateTitle').textContent=selTeam;
  const today=fmtDate(new Date());
  const w=document.getElementById('dateList');
  if(!allowed.length){
    w.innerHTML='<div class="no-worker">ออฟฟิศยังไม่ได้เปิดคิววันไหนให้ทีมนี้<br>กรุณาติดต่อออฟฟิศ</div>';
    return;
  }
  // เรียงวันที่ใหม่สุดก่อน
  allowed.sort((a,b)=>b.date.localeCompare(a.date));
  w.innerHTML=allowed.map(a=>{
    const isToday=a.date===today;
    const isPast=a.date<today;
    let badge=isToday?'<span class="tag tag-today">วันนี้</span>':isPast?'<span class="tag tag-open">ผ่านแล้ว</span>':'<span class="tag tag-open">✓ เปิด</span>';
    return `<div class="litem" onclick="pickDate('${a.date}')">
      <div><div class="li-main">${fmtD(a.date)}</div><div class="li-sub">${dayTH(a.date)}${a.note?' · '+a.note:''}</div></div>
      ${badge}
    </div>`;
  }).join('');
}

function pickDate(d){
  selDate=d;
  selWorker='';   // assign เป็นทีม ไม่ต้องเลือกชื่อรายคน
  loadJobs();
}

async function loadJobs(){
  showLoad('กำลังโหลดงาน...');
  try{
    const r=await call({action:'pk_getJobs',team:selTeam,date:selDate});
    jobs=r.jobs||[];
    hideLoad();renderApp();
  }catch(e){hideLoad();}
}

function goTeam(){selTeam=null;selDate=null;selWorker=null;renderTeams();}
function goDate(){selDate=null;selWorker=null;if(selTeam)pickTeam(selTeam);else renderTeams();}
function setTab(t,btn){curTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderJobList();}

function renderApp(){
  hide('teamScreen');hide('dateScreen');hide('workerScreen');show('appScreen');
  document.getElementById('appTN').textContent=selTeam;
  // หารายชื่อสมาชิกทีมวันนี้มาแสดง (เป็นข้อมูล ไม่ต้องเลือก)
  const mem=allMembers.find(m=>m.team===selTeam&&m.date===selDate);
  const memTxt=mem&&mem.members.length?' · 👥 '+mem.members.join(', '):'';
  document.getElementById('appMeta').textContent=fmtD(selDate)+' '+dayTH(selDate)+memTxt;
  updateStats();renderJobList();
}
function updateStats(){
  const active=jobs.filter(j=>j.status!=='done');
  const done=jobs.filter(j=>j.status==='done');
  document.getElementById('appBadge').textContent=`${active.length} งาน`;
  document.getElementById('appSt').innerHTML=`
    <div class="ast">รอ <span>${jobs.filter(j=>j.status==='pending').length}</span></div>
    <div class="ast">ทำ <span style="color:var(--bl)">${jobs.filter(j=>j.status==='working').length}</span></div>
    <div class="ast">เสร็จ <span style="color:var(--gr)">${done.length}</span></div>`;
}
function renderJobList(){
  const list=curTab==='active'?jobs.filter(j=>j.status!=='done'):jobs.filter(j=>j.status==='done');
  const w=document.getElementById('jobWrap');
  if(!list.length){w.innerHTML=`<div class="empty"><div class="empty-icon">${curTab==='active'?'✅':'📋'}</div><h3>${curTab==='active'?'ไม่มีงานค้าง':'ยังไม่มีงานเสร็จ'}</h3></div>`;return;}
  w.innerHTML=`<div class="jlist">${list.map((j,i)=>renderCard(j,i)).join('')}</div>`;
  list.filter(j=>j.status==='done'&&j.lat).forEach(j=>setTimeout(()=>initMap(j),150));
}

function renderCard(j,i){
  const sl={pending:'bp',working:'bw',done:'bd'};
  const ll={pending:'รอรับงาน',working:'กำลังทำ',done:'เสร็จแล้ว'};
  const photos=(j.photos||[]).map(p=>`<img class="pthumb" src="${p}" onclick="openPM('${p}')">`).join('');
  // ปุ่มแผนที่ — โชว์เฉพาะหลังกดรับงานแล้ว (working/done) เพื่อบังคับให้กดรับงานก่อน
  const showMap = j.mapLink && (j.status==='working' || j.status==='done');
  const mapBtn = showMap ? `<a class="map-btn" href="${j.mapLink}" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    เปิด Google Maps (ดูเส้นทาง)
  </a>` : (j.status==='pending' ? `<div class="map-locked">🔒 กด "รับงาน" ก่อน จึงจะดูเส้นทางได้</div>` : '');
  const acts=j.status==='pending'?`
    <button class="btn btn-start" onclick="startJob('${j.id}')">▶ รับงาน / เริ่มงาน</button>
    <button class="btn btn-photo" onclick="doPhoto('${j.id}')">📷</button>`
  :j.status==='working'?`
    <button class="btn btn-done" onclick="finish('${j.id}','done')">✅ จบงาน</button>
    <button class="btn btn-cont" onclick="finish('${j.id}','continue')">➡ ต่องาน</button>
    <button class="btn btn-photo" onclick="doPhoto('${j.id}')">📷</button>
    <button class="btn btn-cancel" onclick="cancelJob('${j.id}')">✕ ยกเลิกการรับงาน</button>`:'';
  const doneBlock=j.status==='done'?`
    <div class="done-info">
      <div>✅ จบงานเมื่อ ${fmtTs(j.doneAt)}</div>
      ${j.worker?`<div>👤 โดย ${j.worker}</div>`:''}
      ${j.continueNote?`<div>➡ ${j.continueNote}</div>`:''}
      ${j.lat?`<div>📍 ${Number(j.lat).toFixed(5)}, ${Number(j.lng).toFixed(5)}</div>`:'<div style="color:var(--mu)">📍 ไม่มี GPS</div>'}
    </div>
    ${j.lat?`<div class="map-wrap" id="map_${j.id}"></div>`:''}
    <div class="jact" style="border-top:1px solid var(--br);padding-top:10px;">
      <button class="btn btn-cancel" onclick="undoDone('${j.id}')">↩ ยกเลิกการจบงาน (กดผิด)</button>
    </div>`:'';
  return `<div class="jcard ${j.status}" id="card_${j.id}">
    <div class="jtop"><div class="jnum">${j.orderLabel}</div><span class="badge ${sl[j.status]}">${ll[j.status]}</span></div>
    <div class="jname">${j.name}</div>
    <div class="jaddr">${j.address}</div>
    ${mapBtn}
    ${j.description?`<div class="jdesc">🔧 ${j.description}</div>`:''}
    ${j.note?`<div class="jnote">📌 ${j.note}</div>`:''}
    <div class="jinfo">
      <div class="ii"><div class="il">ยอดเงิน</div><div class="iv money">${j.amount?'฿'+fmt(j.amount):'-'}</div></div>
      ${j.startAt?`<div class="ii"><div class="il">เริ่มงาน</div><div class="iv" style="font-size:11px;">${fmtTs(j.startAt)}</div></div>`:''}
      ${j.worker&&j.status!=='done'?`<div class="ii"><div class="il">ผู้ทำงาน</div><div class="iv" style="font-size:12px;color:var(--bl);">${j.worker}</div></div>`:''}
    </div>
    ${photos?`<div class="photos">${photos}</div>`:''}
    ${doneBlock}
    ${acts?`<div class="jact">${acts}</div>`:''}
    <input type="file" accept="image/*" capture="environment" id="ph_${j.id}" style="display:none" onchange="handlePhoto(event,'${j.id}')">
  </div>`;
}

async function startJob(id){
  const j=jobs.find(x=>x.id===id);if(!j)return;
  j.status='working';j.startAt=Date.now().toString();
  // ผู้ทำงาน = ทีม (เพราะ assign เป็นทีม) เก็บไว้อ้างอิงใน log/dashboard
  const mem=allMembers.find(m=>m.team===selTeam&&m.date===selDate);
  j.worker=mem&&mem.members.length?mem.members.join(', '):selTeam;
  await call({action:'pk_updateJobStatus',id,status:'working',startAt:j.startAt,worker:j.worker});
  updateStats();renderJobList();toast('▶ เริ่มงานแล้ว');
}

async function cancelJob(id){
  if(!confirm('ยกเลิกการรับงานนี้?\nงานจะกลับไปเป็น "รอรับงาน"'))return;
  const j=jobs.find(x=>x.id===id);if(!j)return;
  j.status='pending';j.startAt='';j.worker='';
  await call({action:'pk_updateJobStatus',id,status:'pending',startAt:'',doneAt:'',lat:'',lng:'',continueNote:'',photos:j.photos||[],worker:''});
  updateStats();renderJobList();toast('↩ ยกเลิกการรับงานแล้ว');
}

async function undoDone(id){
  if(!confirm('ยกเลิกการจบงานนี้?\nงานจะกลับเป็น "รอรับงาน"\n(ข้อมูล GPS / เวลาจบงาน / รูป จะถูกล้าง)'))return;
  const j=jobs.find(x=>x.id===id);if(!j)return;
  j.status='pending';j.startAt='';j.doneAt='';j.lat='';j.lng='';j.continueNote='';j.worker='';
  await call({action:'pk_updateJobStatus',id,status:'pending',startAt:'',doneAt:'',lat:'',lng:'',continueNote:'',photos:[],worker:''});
  updateStats();renderJobList();toast('↩ ยกเลิกการจบงานแล้ว · งานกลับเป็นรอรับงาน');
}

function finish(id,mode){
  showLoad(mode==='done'?'กำลังดึง GPS แม่นยำ...\n(รอ 5-15 วินาที)':'กำลังบันทึก...');
  if(!navigator.geolocation){finishWith(id,mode,null,null,null);return;}

  // ใช้ watchPosition รอจนกว่า accuracy ดีพอ (< 30 เมตร) หรือ timeout 15 วินาที
  let best=null;
  let done=false;
  const finalize=()=>{
    if(done)return;done=true;
    try{navigator.geolocation.clearWatch(watchId);}catch(e){}
    if(best) finishWith(id,mode,best.lat,best.lng,best.acc);
    else finishWith(id,mode,null,null,null);
  };
  const watchId=navigator.geolocation.watchPosition(
    p=>{
      const acc=p.coords.accuracy;
      const cur={lat:p.coords.latitude,lng:p.coords.longitude,acc};
      // เก็บค่าที่ accuracy ดีที่สุด
      if(!best||acc<best.acc) best=cur;
      // อัพเดต UI ให้เห็นว่ารอแม่นกว่านี้
      document.getElementById('loadMsg').textContent=`GPS: ±${Math.round(acc)} ม. (กำลังหาตำแหน่งแม่นยำ...)`;
      // ถ้าแม่นพอแล้ว < 30 เมตร จบเลย
      if(acc<=30) finalize();
    },
    err=>{ if(!best) finalize(); },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
  // Timeout safety: 15 วินาทีถ้ายังไม่ได้ accuracy ดี ใช้ค่าที่ดีที่สุดเท่าที่มี
  setTimeout(finalize,15000);
}
async function finishWith(id,mode,lat,lng,accuracy){
  hideLoad();
  const j=jobs.find(x=>x.id===id);if(!j)return;
  const notify={ event:mode, name:j.name, team:selTeam, worker:j.worker||'', amount:j.amount||0 };
  if(mode==='done'){
    j.status='done';j.doneAt=Date.now().toString();
    if(lat!=null){j.lat=lat;j.lng=lng;j.accuracy=accuracy;}
    await call({action:'pk_updateJobStatus',id,status:'done',startAt:j.startAt||'',doneAt:j.doneAt,lat:lat||'',lng:lng||'',continueNote:j.continueNote||'',photos:j.photos||[],worker:j.worker||'',notify});
    updateStats();renderJobList();
    toast(lat?`✅ จบงานแล้ว · GPS ±${Math.round(accuracy||0)}ม.`:'✅ จบงานแล้ว (ไม่มี GPS)');
  }else{
    j.continueNote=`ต่องานเมื่อ ${new Date().toLocaleString('th-TH',{timeStyle:'short'})}${lat?` · GPS ${lat.toFixed(4)},${lng.toFixed(4)} ±${Math.round(accuracy||0)}ม.`:''}`;
    j.status='pending';j.startAt='';
    await call({action:'pk_updateJobStatus',id,status:'pending',startAt:'',doneAt:j.doneAt||'',lat:lat||j.lat||'',lng:lng||j.lng||'',continueNote:j.continueNote,photos:j.photos||[],worker:j.worker||'',notify});
    updateStats();renderJobList();toast('➡ บันทึกต่องาน · แจ้ง LINE แล้ว');
  }
}

function doPhoto(id){document.getElementById(`ph_${id}`)?.click();}
function handlePhoto(e,id){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    const j=jobs.find(x=>x.id===id);if(!j)return;
    if(!Array.isArray(j.photos))j.photos=[];
    j.photos.push(ev.target.result);
    await call({action:'pk_updateJobStatus',id,status:j.status,startAt:j.startAt||'',doneAt:j.doneAt||'',lat:j.lat||'',lng:j.lng||'',continueNote:j.continueNote||'',photos:j.photos,worker:j.worker||''});
    renderJobList();toast('📷 แนบรูปแล้ว');
  };
  r.readAsDataURL(f);e.target.value='';
}

function initMap(j){
  const mid='map_'+j.id;
  if(maps[mid]){try{maps[mid].remove();}catch(e){}delete maps[mid];}
  const el=document.getElementById(mid);if(!el)return;
  const m=L.map(mid,{zoomControl:false,attributionControl:false}).setView([j.lat,j.lng],16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
  const icon=L.divIcon({className:'',html:`<div style="background:#34c759;width:13px;height:13px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 10px #34c759;"></div>`,iconSize:[13,13],iconAnchor:[6,6]});
  L.marker([j.lat,j.lng],{icon}).addTo(m).bindPopup(`<b>${j.name}</b><br>${fmtTs(j.doneAt)}`).openPopup();
  maps[mid]=m;
}
function openPM(src){document.getElementById('pmImg').src=src;document.getElementById('pmodal').classList.add('open');}
function closePM(){document.getElementById('pmodal').classList.remove('open');}

async function refresh(){
  if(selDate&&selTeam){
    showLoad('กำลังรีเฟรช...');
    try{const r=await call({action:'pk_getJobs',team:selTeam,date:selDate});jobs=r.jobs||[];hideLoad();renderJobList();updateStats();}catch(e){hideLoad();}
  }else loadBootstrap();
}

function show(id){document.getElementById(id).style.display=id==='teamScreen'?'flex':'block';}
function hide(id){document.getElementById(id).style.display='none';}
function showLoad(m){document.getElementById('loadMsg').textContent=m||'กำลังโหลด...';document.getElementById('loading').style.display='flex';}
function hideLoad(){document.getElementById('loading').style.display='none';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2800);}
const fmt=n=>Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});
const fmtD=d=>{if(!d)return'-';const p=d.split('-');return`${p[2]}/${p[1]}/${p[0]}`;};
const fmtDate=d=>d.toISOString().split('T')[0];
const fmtTs=ts=>{if(!ts)return'-';return new Date(Number(ts)).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'});};
function dayTH(d){const dt=new Date(d);return'วัน'+['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][dt.getDay()];}

setInterval(()=>{if(selDate&&selTeam)call({action:'pk_getJobs',team:selTeam,date:selDate}).then(r=>{if(r.ok){jobs=r.jobs||[];updateStats();}}).catch(()=>{});},30000);
</script>
