  var SL=['มุ้งจีบมีรางธรรมดาสลิงบานเดี่ยว','มุ้งจีบมีรางธรรมดาสลิงบานคู่','มุ้งจีบมีรางธรรมดาสลิงบานอิสระ'];
  var JS_=RT.concat(SL);
  var KHOO=['มุ้งจีบมีรางธรรมดาบานคู่','มุ้งจีบมีรางธรรมดาสลิงบานคู่','มุ้งจีบรางเตี้ยบานคู่'];
  var ISARA=['มุ้งจีบมีรางธรรมดาบานอิสระ','มุ้งจีบมีรางธรรมดาสลิงบานอิสระ'];
  var RTDIAW=['มุ้งจีบรางเตี้ยบานเดี่ยวซ้าย','มุ้งจีบรางเตี้ยบานเดี่ยวขวา','มุ้งจีบรางเตี้ยบานเดี่ยวอิสระ'];
  var JDI=['มุ้งจีบมีรางธรรมดาบานเดี่ยว','มุ้งจีบมีรางธรรมดาบานอิสระ','มุ้งจีบมีรางธรรมดาสลิงบานเดี่ยว','มุ้งจีบมีรางธรรมดาสลิงบานอิสระ'];
  var JK=['มุ้งจีบมีรางธรรมดาบานคู่','มุ้งจีบมีรางธรรมดาสลิงบานคู่'];
  var inA=function(a,v){return a.indexOf(v)>=0;};
  var w=parseFloat(W),h=parseFloat(H);
  if(!type||W===''||W==null||H===''||H==null||isNaN(w)||isNaN(h)||inA(SKIP,type)) return {calculable:false,fields:{}};
  var ceil=Math.ceil, O=(inA(RT,type)||inA(SL,type))?h-2.4:h-1.7, jeeb;
  if(inA(JDI,type))jeeb=(w/1.8)-6; else if(inA(JK,type))jeeb=(w/3.6)-6; else if(inA(RTDIAW,type))jeeb=w*0.45+3; else jeeb=w/2*0.45+3;
  var chuok=inA(KHOO,type)?(w/2+h+30):(inA(ISARA,type)?(w+h+60):(w+h+30));
  return {calculable:true,fields:{
    maajab:inA(JS_,type)?h-6.5:h-5.9, rangkang:inA(JS_,type)?h-0.2:h-0.5, rangbl:w-2.2,
    rangtia:inA(JS_,type)?0:w-4, cutScreen:O, jeeb:jeeb, cutRope:chuok,
    nRope:inA(KHOO,type)?(ceil((O-6)/30)+1)*2:ceil((O-6)/30)+1,
    cutSling:inA(RT,type)?0:w+25, nSling:inA(RT,type)?0:2,
    pvc:inA(RT,type)?h-2.6:h-1.6, holePitch:(O-6)/ceil((O-6)/30)
  }};
}

function pkpCalcItem(it){

    f.split=true; f.pieces=pieces; f.pvcCount=pieces*2; return {calculable:true,kind:'split',fields:f};

  var f=Object.assign({},r.fields); f.jeeb=pkpRi(f.jeeb); f.pieces=pieces; f.pvcCount=pieces*2; return {calculable:true,kind:'normal',fields:f};
}

function pkpMagnetCount(t){ if(/6 มือจับ/.test(t))return 8; if(/4 มือจับ/.test(t))return 6; if(/อิสระ/.test(t))return 4; return 2; } // ตามรูปแบบบาน (ยาว/เส้น=PVC)
// จำนวนเส้นราง/ชุด: มือจับ N · รางข้าง O · บน-ล่าง P · เตี้ย Q (อิงสูตร Sheet1; handle=เท่าอิสระ, แยกกลาง=เท่าคู่ ตาม cut engine)
function pkpRailCount(t){
  return { N:(/บานคู่|อิสระ|แยกกลาง|มือจับ/.test(t)?2:1), O:2, P:(/รางเตี้ย/.test(t)?1:2), Q:(/รางเตี้ย/.test(t)?1:0) };
}
function pkpIsReqScreen(t){ return !!pkpREQ[t]; }  // มุ้งจีบที่ทำใบเบิกได้
// items = รายการ WO, mainAlu = สีอลูหลัก (ใช้เมื่อ item.cAlu ว่าง)
function pkpRequisition(items, mainAlu){
  var eq={ wheel:[0,0,0,0,0,0,0,0], ropePull:0, slingPull:0, joint:[0,0,0,0,0,0], plate:0,
           ropeLen:0, ropeCount:0, magLen:0, magCount:0, pvcLen:0, pvcCount:0 };
  var byColor={}, rails={}, totalSets=0, nonScreen=[], incomplete=0;
  (items||[]).forEach(function(it){
    var t=it.type; if(!t) return;
    if(!pkpIsReqScreen(t)){ nonScreen.push(it); return; }
    var c=pkpCalcItem(it); if(!c.calculable){ incomplete++; return; }
    var f=c.fields, R=pkpREQ[t];
    var col=(it.cAlu||mainAlu||'(ไม่ระบุสี)'), white=(col==='อบขาว');
    totalSets++; byColor[col]=(byColor[col]||0)+1;
    var wo=white?0:4; for(var k=0;k<4;k++) eq.wheel[wo+k]+=R.w[k];
    eq.ropePull+=R.p[0]; eq.slingPull+=R.p[1];
    var jo=white?0:3; for(var m=0;m<3;m++) eq.joint[jo+m]+=R.j[m];
    eq.plate+=R.plate;
    var rLen,rCnt;
    if(c.kind==='split'){ rCnt=f.nRope*2; rLen=(f.cutRopeL+f.cutRopeR)*f.nRope; }
    else { rCnt=f.nRope; rLen=f.cutRope*f.nRope; }
    eq.ropeLen+=rLen; eq.ropeCount+=rCnt;
    var len1=Math.max(0,f.pvc), mc=pkpMagnetCount(t);
    eq.pvcLen+=len1*f.pvcCount; eq.pvcCount+=f.pvcCount;
    eq.magLen+=len1*mc;         eq.magCount+=mc;
    var rc=pkpRailCount(t), R0=rails[col]||(rails[col]={handle:0,side:0,topbot:0,low:0});
    R0.handle+=(f.maajab||0)*rc.N; R0.side+=(f.rangkang||0)*rc.O; R0.topbot+=(f.rangbl||0)*rc.P; R0.low+=(f.rangtia||0)*rc.Q;
  });
  return { eq:eq, byColor:byColor, rails:rails, totalSets:totalSets, nonScreen:nonScreen, incomplete:incomplete };
}
// ════════ จัดตัดราง (1D cutting-stock · แยกสี) — frontend-only · ดึงชิ้นจาก engine ════════
// ชิ้นรางต่อรายการ: ความยาวจาก pkpCalcItem (maajab/rangkang/rangbl/rangtia) × จำนวนจาก pkpRailCount → ตรงกับใบเบิก
function pkpRailPieces(items, mainAlu, meta){
  meta=meta||{}; var out=[];
  (items||[]).forEach(function(it, idx){
    var t=it.type; if(!t||!pkpIsReqScreen(t)) return;
    var c=pkpCalcItem(it); if(!c.calculable) return;
    var f=c.fields, rc=pkpRailCount(t), col=(it.cAlu||mainAlu||'(ไม่ระบุสี)');
    function P(rail,len,qty){ len=Math.round((len||0)*100)/100; if(len>0&&qty>0) out.push({rail:rail,len:len,qty:qty,color:col,wo:meta.wo||'',name:meta.name||'',setNo:idx+1,type:t}); }
    P('handle', f.maajab,   rc.N);
    P('side',   f.rangkang, rc.O);
    P('topbot', f.rangbl,   rc.P);
    P('low',    f.rangtia,  rc.Q);
  });
  return out;
}
// First-Fit-Decreasing 1D cutting-stock (เผื่อ kerf ระหว่างชิ้นในเส้นเดียวกัน)
function pkpCutFFD(pieces, stockLen, kerf){
  var items=[]; pieces.forEach(function(p){ for(var k=0;k<p.qty;k++) items.push({len:p.len, wo:p.wo, name:p.name, setNo:p.setNo, rail:p.rail, type:p.type, pidx:k+1, ptot:p.qty}); });
  items.sort(function(a,b){return b.len-a.len;});
  var bars=[];
  items.forEach(function(it){
    if(it.len>stockLen){ bars.push({used:it.len, pieces:[it], over:true}); return; }
    var placed=false;
    for(var i=0;i<bars.length;i++){ var bar=bars[i]; if(bar.over) continue;
      var add=it.len+(bar.pieces.length>0?kerf:0);
      if(bar.used+add<=stockLen+1e-9){ bar.used+=add; bar.pieces.push(it); placed=true; break; } }
    if(!placed) bars.push({used:it.len, pieces:[it]});
  });
  var totalLen=items.reduce(function(s,i){return s+i.len;},0);
  var waste=bars.reduce(function(s,b){return s+(b.over?0:Math.max(0,stockLen-b.used));},0);
  return { bars:bars, stockLen:stockLen, count:items.length, usedStock:bars.length, totalLen:Math.round(totalLen*100)/100, waste:Math.round(waste*100)/100 };
}

 {g:'บานเลื่อน UPVC (บันทึกขนาด/สี — ไม่มีค่าตัด)', items:['มุ้งบานเลื่อน UPVC','มุ้งบานเลื่อนแยกกลาง UPVC']},
 {g:'อื่นๆ (ไม่มีค่าตัด)', items:['มุ้งบานเปิด','มุ้งบานเปิดแยกกลาง','มุ้งบานเลื่อน','มุ้งบานเลื่อนแยกกลาง','มุ้งบานตาย']}
];
var pkpARROWS=['→','←','↑','↓','↔','↕'];

// ── STATE ──
var pkpItems=[];
var pkpSigCheck=null, pkpSigApprove=null;   // ลายเซ็นดิจิทัล {name,img,ts} | null
var pkpEditingWO=null;   // null = ใบใหม่ / 'WO-xxxx' = กำลังแก้
var pkpLoadedStatus='';

function pkpToday(){ return new Date().toISOString().slice(0,10); }
function pkpBlankItem(){ return { type:'', patt:'→', w:'', h:'', wl:'', wr:'', cAlu:'', cMesh:'', note:'' }; }

// ── ลายเซ็นดิจิทัล (แนบรูป) ──
function pkpRenderSig(){
  var wrap=document.getElementById('pkpSigWrap'); if(!wrap) return;
  var isMgr = CURRENT_USER && CURRENT_USER.role==='manager';
  wrap.innerHTML =
    '<div class="fl" style="margin-bottom:6px;">ลายเซ็น (แนบรูปลายเซ็นที่เซฟไว้ — โชว์บนใบพิมพ์ ถ้าไม่แนบจะเป็นช่องเซ็นมือ)</div>'
    + '<div style="display:flex;gap:10px;flex-wrap:wrap;">'
    +   pkpSigSlot('check','ผู้ตรวจสอบ',pkpSigCheck,true)
    +   pkpSigSlot('approve','ผู้อนุมัติ',pkpSigApprove,isMgr)
    + '</div>';
}
function pkpSigKey(){ return 'pk_sig_'+((CURRENT_USER&&CURRENT_USER.username)||'x'); }
var pkpSavedSigData=null, pkpSavedSigLoaded=false;   // ลายเซ็นที่บันทึก (จาก Drive · cache ในหน้านี้)
function pkpSavedSig(){ if(pkpSavedSigData&&pkpSavedSigData.img) return pkpSavedSigData.img; try{ return localStorage.getItem(pkpSigKey())||''; }catch(e){ return ''; } }
function pkpSigSaveBackend_(img){ try{ call({ action:'pk_prodSigSet', img:img, name:pkpSigName() }); }catch(e){} }
// โหลดลายเซ็นที่บันทึกจาก Drive (ครั้งเดียวต่อ session) — มี localStorage เป็น fallback + auto-migrate ของเครื่องขึ้น Drive
async function pkpLoadSavedSig(force){
  if(pkpSavedSigLoaded && !force) return;
  pkpSavedSigLoaded=true;
  var ls=''; try{ ls=localStorage.getItem(pkpSigKey())||''; }catch(e){}
  try{
    var r=await call({ action:'pk_prodSigGet' });
    if(r&&r.ok){
      if(r.sig&&r.sig.img){ pkpSavedSigData={ img:r.sig.img, name:r.sig.name||'' }; try{ localStorage.setItem(pkpSigKey(),r.sig.img); }catch(e){} }
      else if(ls){ pkpSavedSigData={ img:ls, name:'' }; pkpSigSaveBackend_(ls); }   // เคยเซฟไว้ในเครื่อง → ย้ายขึ้น Drive ให้
      else pkpSavedSigData=null;
    } else if(ls){ pkpSavedSigData={ img:ls, name:'' }; }
  }catch(e){ if(ls) pkpSavedSigData={ img:ls, name:'' }; }   // ออฟไลน์ → ใช้ของเครื่อง
  if(typeof pkpRenderSig==='function') pkpRenderSig();
}
function pkpSigForget(){
  if(!confirm('ลบลายเซ็นที่บันทึกไว้?\n(ลายเซ็นที่ลงในใบที่ทำอยู่ยังคงอยู่)')) return;
  pkpSavedSigData=null; try{ localStorage.removeItem(pkpSigKey()); }catch(e){}
  pkpSigSaveBackend_('');   // img='' = เคลียร์บน Drive (ไฟล์ยังอยู่ กู้ได้)
  pkpRenderSig(); toast('ลบลายเซ็นที่บันทึกแล้ว');
}
function pkpSigName(){ return (CURRENT_USER&&(CURRENT_USER.name||CURRENT_USER.username))||''; }
function pkpSigApply(key,img){
  var sig={ name:pkpSigName(), img:String(img||''), ts:pkpToday() };
  if(key==='check') pkpSigCheck=sig; else pkpSigApprove=sig;
  pkpRenderSig();
  toast(key==='check'?'ลงลายเซ็นตรวจสอบแล้ว':'✅ อนุมัติแล้ว');
}
function pkpSigUseSaved(key){ var s=pkpSavedSig(); if(!s){ toast('ยังไม่มีลายเซ็นที่บันทึกไว้ — แนบรูปก่อน'); return; } pkpSigApply(key,s); }
function pkpSigSlot(key,label,sig,enabled){
  var saved=pkpSavedSig();
  var actLabel = key==='check' ? '✔️ ลงลายเซ็นตรวจสอบ' : '✅ อนุมัติ';
  var inner;
  if(sig && sig.img){
    inner='<img src="'+sig.img+'" alt="ลายเซ็น" style="max-height:46px;max-width:170px;object-fit:contain;background:#fff;border-radius:4px;padding:3px;display:block;">'
      +'<div style="font-size:12px;margin-top:3px;font-weight:600;">'+(sig.name||'')+'</div>'
      +'<div style="font-size:11px;color:var(--mu,#6b7a94);">'+(sig.ts||'')+'</div>'
      +(enabled?'<button class="btn btn-g btn-sm" style="margin-top:5px;color:var(--rd,#ff453a);" onclick="pkpSigClear(\''+key+'\')">ลบลายเซ็น</button>':'');
  } else if(enabled){
    var btns='';
    if(saved){
      btns+='<div style="margin-bottom:7px;"><img src="'+saved+'" alt="ลายเซ็นที่บันทึก" style="max-height:40px;max-width:150px;object-fit:contain;background:#fff;border-radius:4px;padding:3px;border:1px solid var(--line,#2a3344);display:block;"></div>';
      btns+='<button class="btn btn-p btn-sm" onclick="pkpSigUseSaved(\''+key+'\')">'+actLabel+'</button>';
    }
    btns+='<button class="btn btn-g btn-sm" '+(saved?'style="margin-left:6px;"':'')+' onclick="document.getElementById(\'pkpSigFile_'+key+'\').click()">📎 '+(saved?'เปลี่ยนรูป':'แนบรูปลายเซ็น')+'</button>'
      +'<input type="file" accept="image/*" id="pkpSigFile_'+key+'" style="display:none;" onchange="pkpSigUpload(\''+key+'\',this)">';
    if(saved) btns+='<button class="btn btn-g btn-sm" style="margin-left:6px;color:var(--mu,#6b7a94);" onclick="pkpSigForget()">ลบลายเซ็นที่บันทึก</button>';
    inner='<div style="font-size:12px;color:var(--mu,#6b7a94);margin-bottom:6px;">'+(saved?'ลายเซ็นที่บันทึกไว้ — กดปุ่มเพื่อลงในใบนี้':'ยังไม่เซ็น')+'</div>'+btns;
  } else {
    inner='<div style="font-size:12px;color:var(--mu,#6b7a94);">เฉพาะผู้จัดการเซ็นอนุมัติได้</div>';
  }
  return '<div style="flex:1;min-width:190px;border:1px solid var(--line,#2a3344);border-radius:8px;padding:10px;background:var(--surf,#171d27);">'
    +'<div style="font-weight:700;font-size:13px;margin-bottom:5px;">'+label+'</div>'+inner+'</div>';
}
function pkpSigUpload(key,input){
  var f=input.files&&input.files[0]; if(!f){ return; }
  if(!/^image\//.test(f.type||'')){ toast('⚠️ ต้องเป็นไฟล์รูปภาพ'); input.value=''; return; }
  if(f.size>500*1024){ toast('⚠️ รูปใหญ่เกิน 500KB — ใช้รูปลายเซ็นเล็กลง'); input.value=''; return; }
  var rd=new FileReader();
  rd.onload=function(){
    var img=String(rd.result||'');
    try{ localStorage.setItem(pkpSigKey(), img); }catch(e){}   // cache เร็วในเครื่อง
    pkpSavedSigData={ img:img, name:pkpSigName() };            // อัปเดต cache หน้านี้
    pkpSigSaveBackend_(img);                                   // เก็บขึ้น Drive → ใช้ได้ทุกเครื่อง
    pkpSigApply(key,img);
    toast('แนบ + บันทึกลายเซ็นแล้ว (ใช้ได้ทุกเครื่อง)');
  };
  rd.onerror=function(){ toast('❌ อ่านไฟล์รูปไม่ได้'); };
  rd.readAsDataURL(f);
  input.value='';
}
function pkpSigClear(key){ if(key==='check')pkpSigCheck=null; else pkpSigApprove=null; pkpRenderSig(); }

// ── INIT (เรียกจาก setTab) ──
function pkpInit(){
  if(!pkpItems.length){
    var raw=null; try{raw=localStorage.getItem(PKP_DRAFT_KEY);}catch(e){}
    if(raw && pkpDraftHasData(raw) && confirm('พบใบผลิตที่กรอกค้างไว้ ต้องการกู้คืนไหม?\n(กดยกเลิก = เริ่มใบใหม่ · ข้อมูลค้างจะถูกล้าง)')){
      pkpNew(true); pkpRestoreDraft(raw);
    } else {
      try{localStorage.removeItem(PKP_DRAFT_KEY);}catch(e){}
      pkpNew(true);
    }
  }
  else { pkpRenderRows(); }
  pkpRenderSig();
  // default วันที่ออก = วันนี้ (ถ้ายังว่าง)
  var iss=document.getElementById('pkpIssue'); if(iss && !iss.value){ iss.value=pkpToday(); }
  // default เดือนที่ list = เดือนนี้
  var mEl=document.getElementById('pkpListMonth'); if(mEl && !mEl.value){ mEl.value=pkpToday().slice(0,7); }
  if(typeof refreshAllDateDisplays==='function') refreshAllDateDisplays();
  pkpLoadSavedSig();   // โหลดลายเซ็นที่บันทึกไว้ (Drive · ข้ามเครื่อง)
  pkpLoadList();
}

// ── ใบใหม่ (reset) ──
function pkpNew(skipRender){
  pkpEditingWO=null; pkpLoadedStatus='';
  pkpItems=[pkpBlankItem(),pkpBlankItem(),pkpBlankItem()];
  pkpSigCheck=null; pkpSigApprove=null;
  ['pkpCust','pkpRef','pkpNote','pkpMainAlu','pkpMainMesh'].forEach(function(id){var e=document.getElementById(id); if(e)e.value='';});
  var iss=document.getElementById('pkpIssue'); if(iss)iss.value=pkpToday();
  var ins=document.getElementById('pkpInstall'); if(ins)ins.value='';
  var woEl=document.getElementById('pkpWoLabel'); if(woEl)woEl.textContent='(ใบใหม่ — เลขออกตอนบันทึก)';
  var sv=document.getElementById('pkpSaveBtn'); if(sv)sv.textContent='💾 บันทึกใบผลิต';
  if(typeof refreshAllDateDisplays==='function') refreshAllDateDisplays();
  if(!skipRender) pkpRenderRows();
  pkpRenderSig();
}

// ── autosave ใบผลิตที่กรอกค้าง (เฉพาะใบใหม่ · localStorage) ──
var PKP_DRAFT_KEY='pk_prod_draft';
function pkpCollectDraft(){
  var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  return { cust:g('pkpCust'), issue:g('pkpIssue'), install:g('pkpInstall'), ref:g('pkpRef'), note:g('pkpNote'), mainAlu:g('pkpMainAlu'), mainMesh:g('pkpMainMesh'), items:pkpItems };
}
function pkpDraftHasData(raw){
  try{ var d=JSON.parse(raw); return !!(d.cust||d.ref||d.note||d.mainAlu||d.mainMesh||(d.items&&d.items.some(function(it){return it.type||it.w||it.h||it.wl||it.wr||it.cAlu||it.cMesh||it.note;}))); }catch(e){ return false; }
}
function pkpAutosave(){
  if(pkpEditingWO) return;   // ไม่ autosave ตอนแก้ใบเดิม (กันทับ)
  try{
    var raw=JSON.stringify(pkpCollectDraft());
    if(pkpDraftHasData(raw)) localStorage.setItem(PKP_DRAFT_KEY,raw);
    else localStorage.removeItem(PKP_DRAFT_KEY);
  }catch(e){}
}
function pkpRestoreDraft(raw){
  try{
    var d=JSON.parse(raw); var s=function(id,v){var e=document.getElementById(id);if(e)e.value=v||'';};
    s('pkpCust',d.cust); s('pkpIssue',d.issue); s('pkpInstall',d.install); s('pkpRef',d.ref); s('pkpNote',d.note); s('pkpMainAlu',d.mainAlu); s('pkpMainMesh',d.mainMesh);
    pkpItems=(d.items&&d.items.length)?d.items:[pkpBlankItem()];
    if(typeof refreshAllDateDisplays==='function') refreshAllDateDisplays();
    pkpRenderRows();
    toast('กู้คืนใบที่ค้างไว้แล้ว');
  }catch(e){}
}
function pkpClearForm(){
  if(!confirm('ล้างข้อมูลที่กรอกทั้งหมด? (กู้คืนไม่ได้)')) return;
  try{localStorage.removeItem(PKP_DRAFT_KEY);}catch(e){}
  pkpNew();
  toast('ล้างข้อมูลแล้ว');
}

// ── items CRUD ──
function pkpAddItem(){ pkpItems.push(pkpBlankItem()); pkpRenderRows(); pkpAutosave(); }
function pkpDelItem(i){ pkpItems.splice(i,1); if(!pkpItems.length)pkpItems.push(pkpBlankItem()); pkpRenderRows(); pkpAutosave(); }
function pkpAllTypes(){ var a=[]; pkpTYPES.forEach(function(g){ a=a.concat(g.items); }); return a; }
function pkpValidType(v){ return pkpAllTypes().indexOf(v)>=0; }
function pkpOnType(i,val){
  val=(val||'').trim();
  if(val && !pkpValidType(val)){ toast('"'+val+'" ไม่ตรงรายการชนิด — เลือกจากที่ระบบแนะนำ'); pkpRenderRows(); return; }  // บังคับให้ตรง dropdown
  pkpItems[i].type=val; pkpRenderRows(); pkpAutosave();
}
function pkpOnPatt(i){ var a=pkpItems[i]; var idx=pkpARROWS.indexOf(a.patt); a.patt=pkpARROWS[(idx+1)%pkpARROWS.length]; var el=document.getElementById('pkpPatt'+i); if(el)el.textContent=a.patt; pkpAutosave(); }
function pkpOnField(i,field,val){ pkpItems[i][field]=val; pkpRecalc(i); pkpRenderReqSummary(); pkpAutosave(); }   // ตัวเลข → คำนวณเฉพาะแถว (ไม่ re-render = ไม่เสีย focus)

// ── render การ์ดทุกรายการ ──
function pkpRenderRows(){
  var wrap=document.getElementById('pkpItemsWrap'); if(!wrap) return;
  var dl=document.getElementById('pkpTypeList');   // เติม datalist ชนิด (ครั้งเดียว)
  if(dl && !dl.children.length){ dl.innerHTML=pkpAllTypes().map(function(t){return '<option value="'+t+'"></option>';}).join(''); }
  var html='';
  pkpItems.forEach(function(it,i){
    var sp=pkpIsSplit(it.type);
    // ช่องขนาด
    var dims = sp
      ? '<div class="fg" style="width:78px"><label class="fl">ซ้าย(ซม.)</label><input class="fi" type="number" step="0.1" value="'+(it.wl||'')+'" oninput="pkpOnField('+i+',\'wl\',this.value)"></div>'
       +'<div class="fg" style="width:78px"><label class="fl">ขวา(ซม.)</label><input class="fi" type="number" step="0.1" value="'+(it.wr||'')+'" oninput="pkpOnField('+i+',\'wr\',this.value)"></div>'
       +'<div class="fg" style="width:78px"><label class="fl">สูง(ซม.)</label><input class="fi" type="number" step="0.1" value="'+(it.h||'')+'" oninput="pkpOnField('+i+',\'h\',this.value)"></div>'
      : '<div class="fg" style="width:90px"><label class="fl">กว้าง(ซม.)</label><input class="fi" type="number" step="0.1" value="'+(it.w||'')+'" oninput="pkpOnField('+i+',\'w\',this.value)"></div>'
       +'<div class="fg" style="width:90px"><label class="fl">สูง(ซม.)</label><input class="fi" type="number" step="0.1" value="'+(it.h||'')+'" oninput="pkpOnField('+i+',\'h\',this.value)"></div>';
    html+='<div class="pkp-card" style="border:1px solid var(--line,#2a3344);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--surf,#171d27);">'
      +'<div class="row-form" style="align-items:flex-end;gap:8px;margin-bottom:8px;">'
        +'<div style="font-weight:700;color:var(--acc,#f5a623);min-width:24px;">'+(i+1)+'.</div>'
        +'<div class="fg" style="flex:1;min-width:200px;"><label class="fl">รายการ</label><input class="fi" list="pkpTypeList" value="'+(it.type||'').replace(/"/g,'&quot;')+'" placeholder="พิมพ์ค้น/เลือกชนิด" onchange="pkpOnType('+i+',this.value)"></div>'
        +'<div class="fg" style="width:54px"><label class="fl">แบบ</label><button type="button" class="btn btn-g" id="pkpPatt'+i+'" onclick="pkpOnPatt('+i+')" style="width:100%;font-size:18px;padding:6px 0;">'+(it.patt||'→')+'</button></div>'
        +'<button type="button" class="btn btn-g" onclick="pkpDelItem('+i+')" title="ลบ" style="color:var(--rd,#ff453a);">✕</button>'
      +'</div>'
      +'<div class="row-form" style="gap:8px;margin-bottom:8px;">'+dims
        +'<div class="fg" style="width:120px"><label class="fl">สีอลู (ว่าง=ตามหลัก)</label><input class="fi" type="text" list="pkpColorList" value="'+(it.cAlu||'')+'" placeholder="ตามสีหลัก" oninput="pkpOnField('+i+',\'cAlu\',this.value)"></div>'
        +'<div class="fg" style="width:120px"><label class="fl">สีผ้ามุ้ง (ว่าง=ตามหลัก)</label><input class="fi" type="text" list="pkpColorList" value="'+(it.cMesh||'')+'" placeholder="ตามสีหลัก" oninput="pkpOnField('+i+',\'cMesh\',this.value)"></div>'
      +'</div>'
      +'<div class="row-form" style="gap:8px;margin-bottom:8px;"><div class="fg" style="flex:1;min-width:220px"><label class="fl">หมายเหตุชุดนี้ (พิมพ์เฉพาะที่กรอก)</label><input class="fi" type="text" value="'+(it.note||'')+'" placeholder="(ถ้ามี — จะโชว์ใต้รายการบนใบพิมพ์)" oninput="pkpOnField('+i+',\'note\',this.value)"></div></div>'
      +'<div id="pkpCalc'+i+'" style="font-size:12px;color:var(--mu,#6b7a94);line-height:1.7;border-top:1px dashed var(--line,#2a3344);padding-top:7px;"></div>'
    +'</div>';
  });
  wrap.innerHTML=html;
  pkpItems.forEach(function(_,i){ pkpRecalc(i); });
  pkpRenderReqSummary();
}

// ── คำนวณ + แสดงสรุปต่อแถว ──
function pkpRecalc(i){
  var el=document.getElementById('pkpCalc'+i); if(!el) return;
  var it=pkpItems[i];
  if(!it.type){ el.innerHTML='<span style="color:var(--mu,#6b7a94)">เลือกประเภทเพื่อคำนวณ</span>'; return; }
  var c=pkpCalcItem(it), f=c.fields||{};
  if(!c.calculable){ el.innerHTML='<span style="color:var(--mu,#6b7a94)">— ประเภทนี้ไม่มีค่าตัด หรือยังกรอกขนาดไม่ครบ —</span>'; return; }
  var V=pkpFmt;
  if(c.kind==='split'){
    el.innerHTML='อลู: มือจับ <b>'+V(f.maajab)+'</b> · รางข้าง <b>'+V(f.rangkang)+'</b> · รางบน-ล่าง <b>'+V(f.rangbl)+'</b> · รางเตี้ย <b>'+V(f.rangtia)+'</b> · สลิง <b>'+V(f.cutSling)+'</b>×'+V(f.nSling)+' · PVC <b>'+V(f.pvc)+'</b>×'+f.pvcCount
      +'<br>ซ้าย: มุ้ง <b>'+V(f.cutScreen)+'</b> จีบ <b>'+f.jeebL+'</b> เชือก <b>'+V(f.cutRopeL)+'</b>×'+V(f.nRope)+' เส้น'

// ── build payload ส่ง backend ──
function pkpBody(){
  return {
    customer:{ name:(document.getElementById('pkpCust')||{}).value||'' },
    issueDate:(document.getElementById('pkpIssue')||{}).value||'',
    installDate:(document.getElementById('pkpInstall')||{}).value||'',
    refNo:(document.getElementById('pkpRef')||{}).value||'',
    note:(document.getElementById('pkpNote')||{}).value||'',
    mainColorAlu:(document.getElementById('pkpMainAlu')||{}).value||'',
    mainColorMesh:(document.getElementById('pkpMainMesh')||{}).value||'',
    items: pkpItems.filter(function(it){return it.type;}).map(function(it){return {
      type:it.type, patt:it.patt||'',
      w:it.w, h:it.h, wl:it.wl, wr:it.wr,
      cAlu:it.cAlu, cMesh:it.cMesh, note:it.note||''
    };}),
    sigCheck: pkpSigCheck,
    sigApprove: pkpSigApprove,
    specialColors: pkpSpecialColors(pkpItems.filter(function(it){return it.type;}), (document.getElementById('pkpMainAlu')||{}).value||'')
  };
}
function pkpValidate(b){
  if(!b.customer.name.trim()) return 'กรอกชื่อลูกค้า';
  if(!b.items.length) return 'ต้องมีอย่างน้อย 1 รายการที่เลือกประเภท';
  return null;
}

// ── บันทึก (create / update) ──
async function pkpSave(){
  var b=pkpBody(); var err=pkpValidate(b);
  if(err){ toast('⚠️ '+err); return; }
  var sv=document.getElementById('pkpSaveBtn'); if(sv){sv.disabled=true;sv.textContent='กำลังบันทึก...';}
  try{
    var r;
    if(pkpEditingWO){ b.woId=pkpEditingWO; if(pkpLoadedStatus)b.status=pkpLoadedStatus; r=await call({ action:'pk_prodUpdate', ...b }); }
    else { r=await call({ action:'pk_prodCreate', ...b }); }
    if(!r.ok){ toast('❌ '+(r.error||'บันทึกไม่สำเร็จ')); return; }
    pkpEditingWO=r.woId;
    if(r.status) pkpLoadedStatus=r.status;
    var woEl=document.getElementById('pkpWoLabel'); if(woEl)woEl.textContent=r.woId+(pkpLoadedStatus?' · '+pkpLoadedStatus:'');
    if(sv)sv.textContent='💾 บันทึกการแก้ไข';
    toast('✅ บันทึกแล้ว — '+r.woId+(r.status?' ('+r.status+')':''));
    try{localStorage.removeItem(PKP_DRAFT_KEY);}catch(e){}   // บันทึกสำเร็จ → ล้าง draft ค้าง
    pkpLoadList();
  }catch(e){ toast('❌ เชื่อมต่อไม่ได้'); }
  finally{ if(sv){sv.disabled=false; if(sv.textContent==='กำลังบันทึก...')sv.textContent='💾 บันทึกใบผลิต';} }
}

// ── เปิดใบมาแก้ ──
async function pkpOpen(woId){
  showLoad('กำลังเปิดใบผลิต...');
  try{
    var r=await call({ action:'pk_prodGet', woId:woId });
    if(!r.ok){ toast('❌ '+(r.error||'เปิดไม่ได้')); return; }
    var o=r.order;
    pkpEditingWO=o.woId; pkpLoadedStatus=o.status||'';
    var set=function(id,v){var e=document.getElementById(id); if(e)e.value=v||'';};
    set('pkpCust',(o.customer&&o.customer.name)||''); set('pkpIssue',o.issueDate); set('pkpInstall',o.installDate);
    set('pkpRef',o.refNo); set('pkpNote',o.note); set('pkpMainAlu',o.mainColorAlu); set('pkpMainMesh',o.mainColorMesh);
    pkpItems=(o.items&&o.items.length?o.items:[pkpBlankItem()]).map(function(it){return {
      type:it.type||'', patt:it.patt||'→', w:it.w||'', h:it.h||'', wl:it.wl||'', wr:it.wr||'', cAlu:it.cAlu||'', cMesh:it.cMesh||'', note:it.note||''
    };});
    pkpSigCheck=o.sigCheck||null; pkpSigApprove=o.sigApprove||null;
    var woEl=document.getElementById('pkpWoLabel'); if(woEl)woEl.textContent=o.woId+(o.status?' · '+o.status:'');
    var sv=document.getElementById('pkpSaveBtn'); if(sv)sv.textContent='💾 บันทึกการแก้ไข';
    pkpRenderRows();
    pkpRenderSig();
    if(typeof refreshAllDateDisplays==='function') refreshAllDateDisplays();
    if(window.scrollTo)window.scrollTo(0,0);
    toast('เปิด '+o.woId+' แล้ว');
  }catch(e){ toast('❌ เชื่อมต่อไม่ได้'); }
  finally{ hideLoad(); }
}

// ── ลบ (soft) ──
async function pkpDelete(woId){
  if(!confirm('ลบใบผลิต '+woId+' ?\n(ลบแบบกู้คืนได้ — ข้อมูลไม่หายถาวร)')) return;
  try{
    var r=await call({ action:'pk_prodDelete', woId:woId });
    if(!r.ok){ toast('❌ '+(r.error||'ลบไม่สำเร็จ')); return; }
    toast('ลบแล้ว '+woId);
    if(pkpEditingWO===woId) pkpNew();
    pkpLoadList();
  }catch(e){ toast('❌ เชื่อมต่อไม่ได้'); }
}
