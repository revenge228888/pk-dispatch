<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PK Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#0f1319;--surf:#171d27;--surf2:#1e2535;--bdr:#2a3347;
  --acc:#f5a623;--grn:#34c759;--rd:#ff453a;--blu:#4a9eff;
  --tx:#e8ecf2;--mu:#6b7a94;
  --sans:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;}

/* HEADER */
header{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--mono);font-size:14px;color:var(--acc);letter-spacing:3px;}
.logo span{color:#fff;}
.logo small{color:var(--mu);font-size:11px;margin-left:8px;letter-spacing:1px;}
.hbtns{display:flex;gap:8px;align-items:center;}
.hbtn{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--sans);transition:all .15s;text-decoration:none;}
.hbtn:hover{background:rgba(255,255,255,.06);color:#fff;}
.hbtn.danger{color:#ff8a80;border-color:rgba(255,69,58,.4);}
.hbtn.danger:hover{background:rgba(255,69,58,.1);}
.user-chip{font-size:12px;color:var(--mu);display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(255,255,255,.03);border-radius:20px;}
.user-chip b{color:var(--tx);font-weight:600;}
.role-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.role-office{background:rgba(245,166,35,.15);color:var(--acc);}
.role-sales{background:rgba(74,158,255,.15);color:var(--blu);}
.role-manager{background:rgba(175,82,222,.18);color:#c77dff;}
.role-tech{background:rgba(52,199,89,.15);color:var(--grn);}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;background:radial-gradient(ellipse at center, rgba(245,166,35,.05), transparent);}
.login-box{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:36px 32px;width:100%;max-width:380px;}
.login-logo{font-family:var(--mono);font-size:20px;color:var(--acc);letter-spacing:4px;text-align:center;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--mu);text-align:center;margin-bottom:28px;}
.login-fg{margin-bottom:14px;}
.login-fl{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block;}
.login-fi,.fi{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;font-size:13px;font-family:var(--sans);color:var(--tx);transition:border-color .15s;}
.login-fi:focus,.fi:focus{outline:none;border-color:var(--acc);}
select.fi{cursor:pointer;}
.login-btn{width:100%;background:var(--acc);color:#000;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .15s;margin-top:8px;}
.login-btn:hover:not(:disabled){background:#ffc235;}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-err{color:var(--rd);font-size:13px;margin-top:12px;min-height:18px;text-align:center;}
.login-foot{margin-top:22px;padding-top:18px;border-top:1px solid var(--bdr);font-size:11px;color:var(--mu);text-align:center;line-height:1.6;}

/* WRAP */
.wrap{max-width:1280px;margin:0 auto;padding:20px;}
.wrap.wrap-sidebar{max-width:none;padding:0;}
.empty-section{text-align:center;padding:60px 20px;color:var(--mu);}
.empty-section h2{font-size:18px;color:var(--tx);margin-bottom:8px;font-weight:600;}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.card-head{padding:14px 18px;background:var(--surf2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
.card-body{padding:18px;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--surf);border-radius:12px 12px 0 0;overflow:hidden;}
.tab{flex:1;padding:13px 0;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);transition:all .15s;}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);background:var(--surf2);}

/* ── SIDEBAR LAYOUT ── */
.app-shell{display:flex;min-height:100vh;position:relative;}
.sidebar{background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;width:56px;transition:width .2s ease;flex-shrink:0;position:sticky;top:0;height:100vh;z-index:50;}
.sidebar.expanded{width:220px;}
.sidebar-top{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--bdr);min-height:56px;box-sizing:border-box;}
.sidebar-toggle{background:none;border:none;color:var(--tx);font-size:20px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;width:24px;text-align:center;}
.sidebar-brand{font-size:15px;font-weight:700;color:var(--acc);white-space:nowrap;overflow:hidden;opacity:0;transition:opacity .2s;}
.sidebar.expanded .sidebar-brand{opacity:1;}
.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto;overflow-x:hidden;}
.sidebar-item{display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;color:var(--mu);font-size:13px;font-weight:600;white-space:nowrap;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);border-left:3px solid transparent;transition:all .12s;box-sizing:border-box;}
.sidebar-item:hover{background:var(--surf2);color:var(--tx);}
.sidebar-item.on{color:var(--acc);border-left-color:var(--acc);background:var(--surf2);}
.sidebar-ico{font-size:18px;flex-shrink:0;width:22px;text-align:center;}
.sidebar-label{overflow:hidden;opacity:0;transition:opacity .2s;}
.sidebar.expanded .sidebar-label{opacity:1;}
.sidebar-divider{height:1px;background:var(--bdr);margin:8px 12px;}
.exp-badge{display:inline-block;min-width:18px;padding:0 5px;height:18px;line-height:18px;text-align:center;font-size:11px;border-radius:9px;background:var(--rd);color:#fff;margin-left:6px;font-weight:700;}
.exp-badge:empty{display:none;}
.exp-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
.exp-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;}
.exp-card:hover{border-color:var(--acc);transform:translateY(-2px);}
.exp-card-head{display:flex;align-items:center;gap:10px;}
.exp-avatar{width:40px;height:40px;border-radius:50%;background:rgba(245,166,35,.15);color:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.exp-card-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.exp-card-sub{font-size:11px;color:var(--mu);font-family:var(--mono);}
.exp-amount{font-weight:700;font-size:16px;margin-top:2px;}
.exp-card-cat{font-size:12px;color:var(--mu);margin-top:10px;}
.exp-card-desc{font-size:12px;margin-top:4px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.exp-card-foot{font-size:12px;color:var(--acc);margin-top:10px;text-align:right;}
.exp-dt-row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:13px;}
.exp-dt-row .k{color:var(--mu);flex-shrink:0;}
.exp-dt-row .v{font-weight:600;text-align:right;word-break:break-word;}
.exp-bank-box{background:rgba(10,132,255,.08);border:1px solid rgba(10,132,255,.25);border-radius:8px;padding:10px;margin:10px 0;}
.wt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.wt{padding:10px 6px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg);color:var(--mu);font-size:12px;font-weight:600;cursor:pointer;text-align:center;font-family:var(--sans);transition:all .15s;}
.wt:hover{border-color:var(--acc);color:var(--tx);}
.wt.on{background:rgba(245,166,35,.12);border-color:var(--acc);color:var(--acc);}
.wt.minus.on{background:rgba(255,69,58,.12);border-color:var(--rd);color:var(--rd);}
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;max-width:330px;}
.cal-head button{background:var(--surf2);border:1px solid var(--bdr);color:var(--tx);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;}
.cal-month{font-weight:700;font-size:14px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-width:330px;}
.cal-dow{text-align:center;font-size:10px;color:var(--mu);font-weight:600;padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid transparent;background:var(--bg);transition:all .12s;font-family:var(--mono);max-width:44px;}
.cal-day:hover{border-color:var(--acc);}
.cal-day.sel{background:var(--acc);color:#000;font-weight:700;}
.cal-day.sun{color:var(--rd);}
.cal-day.empty{background:none;cursor:default;}
.sidebar-bottom{border-top:1px solid var(--bdr);padding:8px 0;}
.sidebar-user{display:flex;align-items:center;gap:14px;padding:10px 16px;color:var(--mu);font-size:12px;white-space:nowrap;overflow:hidden;}
.sidebar-user .sidebar-label{font-weight:600;color:var(--tx);}
.content-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow-x:hidden;}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45;}

/* Mobile: sidebar เป็น drawer */
@media (max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;width:220px;transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 16px rgba(0,0,0,.4);}
  .sidebar.expanded{transform:translateX(0);width:220px;}
  .sidebar .sidebar-brand,.sidebar .sidebar-label{opacity:1;}
  .sidebar-backdrop.on{display:block;}
  .content-area{width:100%;}
  .mobile-topbar{display:flex !important;}
}
.mobile-topbar{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--surf);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:40;}
.mobile-topbar button{background:none;border:none;color:var(--tx);font-size:22px;cursor:pointer;}
.mobile-topbar .mt-title{font-size:15px;font-weight:700;color:var(--acc);}

/* ── SKELETON LOADING ── */
@keyframes pk-shimmer{0%{background-position:-400px 0;}100%{background-position:400px 0;}}
.skel{background:linear-gradient(90deg,var(--surf2) 25%,var(--bdr) 50%,var(--surf2) 75%);background-size:800px 100%;animation:pk-shimmer 1.3s infinite linear;border-radius:6px;}
.skel-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:10px;}
.skel-line{height:12px;margin-bottom:8px;}
.skel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:12px 16px;}
.skel-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;padding:16px;}
.sm-subtab.on{background:var(--acc) !important;color:#fff !important;border-color:var(--acc) !important;}

/* FORM */
.section-pad{padding:14px 16px;}
.row-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.pkp-btn-row{justify-content:space-between;align-items:center;}
.pkp-btn-row .btn-p{margin-left:0;}
.pkp-btn-row .btn{white-space:nowrap;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;}
.btn{padding:8px 16px;border-radius:7px;border:none;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;}
.btn-p{background:var(--acc);color:#000;}.btn-p:hover{background:#ffc235;}
.btn-d{background:transparent;color:var(--rd);border:1px solid rgba(255,69,58,.4);}.btn-d:hover{background:rgba(255,69,58,.08);}
.btn-g{background:transparent;color:var(--mu);border:1px solid var(--bdr);}.btn-g:hover{border-color:var(--acc);color:var(--acc);}
.btn-sm{padding:4px 10px;font-size:11px;}

/* DASHBOARD */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding:16px;}
.dstat{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:14px;}
.dstat-num{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1;}
.dstat-lbl{font-size:11px;color:var(--mu);margin-top:5px;text-transform:uppercase;letter-spacing:.6px;}
.dash-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:0 16px 16px;}
.dteam{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;position:relative;}
.dteam:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,166,35,.12);}
.dteam::after{content:'›';position:absolute;top:14px;right:14px;color:var(--mu);font-size:18px;transition:transform .15s;}
.dteam:hover::after{color:var(--acc);transform:translateX(3px);}
.dteam-name{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.dteam-bar{display:flex;height:8px;border-radius:6px;overflow:hidden;margin-bottom:10px;background:var(--surf2);}
.dseg-p{background:var(--acc);}.dseg-w{background:var(--blu);}.dseg-d{background:var(--grn);}
.dteam-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--mu);}
.dteam-row b{color:var(--tx);font-family:var(--mono);}

/* ACCESS + MEMBERS */
.acc-group{margin-bottom:14px;}
.acc-team-label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;padding:4px 0 6px;}
.acc-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surf2);border-radius:7px;border:1px solid var(--bdr);margin-bottom:5px;}
.acc-date{font-family:var(--mono);font-size:13px;font-weight:500;}
.acc-note{flex:1;font-size:12px;color:var(--mu);}
.acc-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--mono);font-weight:600;}
.tag-f{background:rgba(52,199,89,.15);color:var(--grn);}
.tag-t{background:rgba(245,166,35,.15);color:var(--acc);}
.tag-p{background:rgba(120,120,120,.15);color:#888;}
.mem-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.mem-chip{background:rgba(74,158,255,.15);color:var(--blu);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.mem-chip button{background:none;border:none;color:var(--blu);cursor:pointer;font-size:13px;padding:0;line-height:1;}
.mem-existing{padding:10px 16px;border-top:1px solid var(--bdr);}

/* JOB TABLE */
.job-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:680px;}
thead th{padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;background:var(--surf2);border-bottom:1px solid var(--bdr);}
tbody tr{border-bottom:1px solid var(--bdr);}
tbody tr:hover{background:var(--surf2);}
td{padding:9px 12px;font-size:13px;vertical-align:middle;}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);}
.bp{background:rgba(245,166,35,.15);color:var(--acc);}
.bw{background:rgba(74,158,255,.15);color:var(--blu);}
.bd{background:rgba(52,199,89,.15);color:var(--grn);}
.lnk{color:var(--blu);text-decoration:none;font-weight:600;font-size:12px;cursor:pointer;}
.lnk:hover{text-decoration:underline;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.on{display:flex;}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal.large{max-width:560px;}
.map-box{height:380px;border-radius:0 0 14px 14px;}

/* LOADING / TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surf2);border:1px solid var(--bdr);color:var(--tx);border-radius:10px;padding:11px 18px;font-size:13px;z-index:300;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
.loading{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;gap:12px;flex-direction:column;z-index:400;color:#fff;font-size:14px;}
.loading.on{display:flex;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .75s linear infinite;}
.loading-row{text-align:center;padding:28px;color:var(--mu);font-size:13px;}

/* ── TECH Card งาน ── */
.t-count{display:inline-block;background:rgba(255,255,255,.1);padding:1px 7px;border-radius:10px;font-family:var(--mono);font-size:10px;margin-left:5px;}
.t-jobcard{
  background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;
  padding:12px 14px;margin-bottom:10px;
}
.t-jobcard.working{border-color:rgba(74,158,255,.4);background:rgba(74,158,255,.04);}
.t-jobcard.done{border-color:rgba(52,199,89,.3);background:rgba(52,199,89,.04);opacity:.85;}
.t-jobhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.t-jobnum{font-family:var(--mono);font-size:11px;color:var(--mu);font-weight:600;}
.t-jobname{font-size:14px;font-weight:700;color:var(--tx);line-height:1.3;margin-bottom:4px;}
.t-jobaddr{font-size:12px;color:var(--mu);margin-bottom:3px;line-height:1.4;}
.t-jobdesc{font-size:12px;color:var(--blu);margin-bottom:3px;line-height:1.4;}
.t-jobmeta{display:flex;gap:14px;font-size:12px;margin-top:4px;flex-wrap:wrap;}
.t-jobtime{font-size:11px;color:var(--grn);margin-top:4px;}
.t-jobnote{
  background:rgba(245,166,35,.1);border-left:3px solid var(--acc);
  padding:6px 10px;font-size:12px;color:var(--acc);margin-top:8px;border-radius:0 6px 6px 0;
}
.t-jobbtns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}

/* ── Records (📐 จดขนาด) ── */
.rec-toolbar{display:flex;gap:8px;align-items:center;padding:12px 16px;flex-wrap:wrap;border-bottom:1px solid var(--bdr);}
.rec-search{flex:1;min-width:160px;}
.rec-list{padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.rec-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;transition:all .15s;}
.rec-card:hover{border-color:var(--acc);transform:translateY(-1px);}
.rec-card.deleted{opacity:.55;border-style:dashed;}
.rec-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
.rec-id{font-family:var(--mono);font-size:10px;color:var(--mu);}
.rec-when{font-size:10px;color:var(--mu);text-align:right;}
.rec-cust{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px;}
.rec-meta{font-size:11px;color:var(--mu);margin-bottom:8px;display:flex;gap:10px;flex-wrap:wrap;}
.rec-meta b{color:var(--tx);font-weight:600;}

/* ── DATE INPUT (custom display dd/mm/yy) ── */
.date-wrap{position:relative;display:inline-block;width:100%;}
.date-wrap input[type="date"]{
  width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;
  padding:10px 12px;font-size:13px;font-family:var(--sans);color:transparent;
  cursor:pointer;caret-color:transparent;
}

/* ซ่อนข้อความ native ของ input */
.date-wrap input[type="date"]::-webkit-datetime-edit{color:transparent;}
.date-wrap input[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(1) opacity(.6);cursor:pointer;
}
/* แสดง dd/mm/yy ทับลงไป */
.date-wrap .date-display{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);

  letter-spacing:.5px;
}
.date-wrap .date-display.empty{color:var(--mu);font-family:var(--sans);}

<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
// ════════════════════════════════════════
//  CONFIG — Worker URL + Secret
//  ⚠️ ตั้งให้ตรงกับ Cloudflare Worker ของคุณ
// ════════════════════════════════════════
const WORKER_URL   = 'https://pk-discord-relay.revenge2288.workers.dev';
const API          = 'https://pk-discord-relay.revenge2288.workers.dev/api';
const API_SECRET   = '2389';   // ค่าเดียวกับ PK_SECRET ใน Cloudflare Worker

let CURRENT_USER = null;
// manager ทำได้ทุกอย่างที่ office ทำ — ใช้เช็คสิทธิ์ระดับ office
function isOfficeLevel(){ return CURRENT_USER && (CURRENT_USER.role === 'office' || CURRENT_USER.role === 'manager'); }
let _teams=[], _salesTeams=[], _accessDates=[], _allMembers=[], _memDraft=[], _mapObj=null;

// ════════════════════════════════════════
//  API CALL — auto-attach token + secret
// ════════════════════════════════════════
// ════════════════════════════════════════
//  SKELETON HELPERS
// ════════════════════════════════════════
// skeleton สำหรับ card list (records/quotes)
function skelCards(n){
  n = n || 6;
  let h = '';
  for (let i = 0; i < n; i++) {
    h += `<div class="skel-card">
      <div class="skel skel-line" style="width:40%;"></div>
      <div class="skel skel-line" style="width:70%;height:16px;"></div>

  }

// skeleton สำหรับ dashboard (stat + team cards)
function skelDashboard(){
  let stats = '';
  for (let i = 0; i < 4; i++) stats += `<div class="skel-card" style="text-align:center;"><div class="skel skel-line" style="width:50%;height:24px;margin:0 auto 8px;"></div><div class="skel skel-line" style="width:70%;margin:0 auto;"></div></div>`;
  let teams = '';
  for (let i = 0; i < 3; i++) teams += `<div class="skel-card"><div class="skel skel-line" style="width:45%;height:15px;"></div><div class="skel skel-line" style="width:100%;height:8px;margin:10px 0;"></div><div class="skel skel-line" style="width:80%;"></div></div>`;
  return `<div class="skel-stat-grid">${stats}</div><div class="skel-grid">${teams}</div>`;
}

// ════════════════════════════════════════
//  CLIENT CACHE (Level 1) — opt-in per call
// ════════════════════════════════════════
const _apiCache = new Map();  // key → { data, expires }
const CACHE_TTL_MS = 30000;   // 30 วินาที

// action ที่อนุญาตให้ cache ได้ (list/read เท่านั้น)
const CACHEABLE_ACTIONS = new Set([
  'pk_getJobs', 'pk_recordList', 'pk_quoteList',
  'pk_quoteMetadata', 'pk_recordListRecentJobs', 'pk_dashboard'
]);

function _cacheKey(body){
  // key = action + args ที่เกี่ยวข้อง (ไม่รวม token/username/secret)
  const { username, token, ...rest } = body;
  return JSON.stringify(rest);
}

// ลบ cache ของ action ที่ระบุ (เรียกหลัง create/update/delete)
function clearCache(actions){
  if (!actions) { _apiCache.clear(); return; }
  const list = Array.isArray(actions) ? actions : [actions];
  for (const key of _apiCache.keys()) {
    if (list.some(a => key.indexOf('"action":"' + a + '"') !== -1)) {
      _apiCache.delete(key);
    }
  }
}

async function call(body, opts){
  opts = opts || {};
  // Auto-attach username + token (ยกเว้น pk_login ที่ส่ง username/password)
  if (CURRENT_USER && body.action !== 'pk_login') {
    if (body.username == null) body.username = CURRENT_USER.username;
    if (body.token == null)    body.token    = CURRENT_USER.token;
  }

  // ── Cache read (เฉพาะ opt-in + cacheable + ไม่ bypass) ──
  const useCache = opts.cache && CACHEABLE_ACTIONS.has(body.action) && !opts.bypassCache;
  const ckey = useCache ? _cacheKey(body) : null;
  if (useCache) {
    const hit = _apiCache.get(ckey);
    if (hit && hit.expires > Date.now()) {
      return hit.data;
    }
  }

  try {
    const r = await fetch(API, {
      method: 'POST',
      redirect: 'follow',
      headers: {
        'Content-Type': 'application/json',
        'X-PK-Secret': API_SECRET
      },
      body: JSON.stringify(body)
    });
    const data = await r.json();

    // ถ้า server บอกว่า session ไม่ valid → verify อีกครั้งก่อน kick (กัน glitch ชั่วคราว)
    if (data && data.ok === false && data.error &&
        (data.error.indexOf('session') !== -1 ||
         data.error.indexOf('login ใหม่') !== -1 ||
         data.error.indexOf('user ถูก') !== -1)) {
      if (CURRENT_USER && body.action !== 'pk_checkSession') {
        try {
          const v = await call({ action:'pk_checkSession', username:CURRENT_USER.username, token:CURRENT_USER.token });
          if (v && v.ok === true && v.valid === false) {   // ยืนยันตายจริงเท่านั้น
            toast('⚠️ ' + data.error);
            setTimeout(() => {
              localStorage.removeItem('pk_user');
              location.reload();
            }, 1500);
          }
        } catch(e) { /* glitch → ไม่ kick */ }
      }
    }

    // ── Cache write (เฉพาะผลลัพธ์ ok) ──
    if (useCache && data && data.ok !== false) {
      _apiCache.set(ckey, { data, expires: Date.now() + CACHE_TTL_MS });
    }

    return data;
  } catch(e) { toast('❌ เชื่อมต่อไม่ได้'); throw e; }
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  ['lgUser','lgPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });

  // ESC ปิด modal บนสุดที่เปิดอยู่
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    // หา modal ที่ on อยู่ — เลือกตัวที่ z-index สูงสุด (รูปก่อน team detail)
    const photoModals = ['tPhotoModal','officePhotoModal'];
    for (const id of photoModals) {
      const m = document.getElementById(id);
      if (m && m.classList.contains('on')) { m.classList.remove('on'); return; }
    }
    const others = ['teamDetailModal','tDoneModal','mapModal'];
    for (const id of others) {
      const m = document.getElementById(id);
      if (m && m.classList.contains('on')) { m.classList.remove('on'); return; }
    }
  });

  const savedUser = localStorage.getItem('pk_user');
  if (savedUser) {
    try {
      const u = JSON.parse(savedUser);
      if (u.username && u.token) {
        showLoad('กำลังตรวจสอบ session...');
        // ตอนเช็ค session — ส่ง username/token แบบ explicit ไม่ผ่าน CURRENT_USER
        const r = await call({ action:'pk_checkSession', username:u.username, token:u.token });
        hideLoad();
        if (r.ok && r.valid) { CURRENT_USER = { ...u, ...r.user }; enterApp(); return; }
        localStorage.removeItem('pk_user');
        if (r && r.error) toast(r.error);
      }
    } catch(e) { localStorage.removeItem('pk_user'); }
  }
});

// ════════════════════════════════════════
//  LOGIN / LOGOUT
// ════════════════════════════════════════
async function doLogin(){
  const username = document.getElementById('lgUser').value.trim();
  const password = document.getElementById('lgPass').value;
  const err = document.getElementById('lgErr');
  err.textContent = '';
  if (!username || !password) { err.textContent = 'กรอกข้อมูลให้ครบ'; return; }
  const btn = document.getElementById('lgBtn');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  try {
    const r = await call({ action:'pk_login', username, password });
    if (r.ok) {
      CURRENT_USER = { username:r.user.username, role:r.user.role, name:r.user.name, token:r.token };
      localStorage.setItem('pk_user', JSON.stringify(CURRENT_USER));
      enterApp();
    } else err.textContent = r.error || 'เข้าสู่ระบบไม่สำเร็จ';
  } catch(e) { err.textContent = 'เชื่อมต่อไม่ได้: ' + e.message; }
  finally { btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; }
}
function logout(){
  if (!confirm('ออกจากระบบ?')) return;
  localStorage.removeItem('pk_user');
  if (window._pkSessionInterval) clearInterval(window._pkSessionInterval);
  CURRENT_USER = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('lgUser').value = '';
  document.getElementById('lgPass').value = '';
  document.getElementById('lgErr').textContent = '';
}

// ════════════════════════════════════════
//  ENTER APP
// ════════════════════════════════════════
function enterApp(){
  if (!CURRENT_USER) return;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';

  const roleLabel = { office:'ออฟฟิศ', sales:'เซลล์', tech:'ช่าง', manager:'ผู้จัดการ' }[CURRENT_USER.role] || CURRENT_USER.role;
  document.getElementById('hdrRoleLabel').textContent = '· ' + roleLabel;
  document.getElementById('hdrName').textContent = CURRENT_USER.name || CURRENT_USER.username;
  const badge = document.getElementById('hdrRoleBadge');
  badge.className = 'role-badge role-' + CURRENT_USER.role;
  badge.textContent = roleLabel.toUpperCase();

  const c = document.getElementById('roleContent');
  const wrapEl = c.closest('.wrap');
  if (wrapEl) wrapEl.classList.remove('wrap-sidebar');
  if (CURRENT_USER.role === 'office' || CURRENT_USER.role === 'manager') { if(wrapEl) wrapEl.classList.add('wrap-sidebar'); c.innerHTML = renderOfficeShell(); officeInit(); }
  else if (CURRENT_USER.role === 'sales')  { if(wrapEl) wrapEl.classList.add('wrap-sidebar'); c.innerHTML = renderSalesStub();   _showRefreshForSales(); restoreSidebarState(); }
  else if (CURRENT_USER.role === 'tech')   {
    c.innerHTML = renderTechStub();
    if (CURRENT_USER.team) {
      document.getElementById('btnRefresh').style.display = '';
      document.getElementById('btnRefresh').onclick = initTech;
      initTech();
    } else {
      document.getElementById('btnRefresh').style.display = 'none';
    }
  }
  else                                      c.innerHTML = '<div class="empty-section"><h2>ไม่รู้จัก role</h2></div>';

  if (window._pkSessionInterval) clearInterval(window._pkSessionInterval);
  window._pkSessionFails = 0;
  window._pkSessionInterval = setInterval(async () => {
    try {
      const r = await call({ action:'pk_checkSession', username:CURRENT_USER.username, token:CURRENT_USER.token });
      // logout เฉพาะเมื่อ backend ยืนยันชัดว่า session ตายจริง (ok:true + valid:false)
      // ไม่เด้งตอน error/timeout ชั่วคราว (r.ok=false) — กัน false logout จาก glitch
      if (r && r.ok === true && r.valid === false) {
        window._pkSessionFails++;
        if (window._pkSessionFails >= 2) {   // ต้องยืนยัน 2 ครั้งติดกันก่อนเด้งออก
          clearInterval(window._pkSessionInterval);
          toast('❌ ' + (r.error || 'Session ถูกยกเลิก'));
          setTimeout(() => { localStorage.removeItem('pk_user'); location.reload(); }, 2000);
        }
      } else {
        window._pkSessionFails = 0;   // ผ่าน หรือ error ชั่วคราว → รีเซ็ตตัวนับ
      }
    } catch(e) { window._pkSessionFails = 0; }   // network error → ไม่นับ
  }, 180000);   // เช็คทุก 3 นาที (เดิม 1 นาที — ลดโอกาสเจอ glitch)
}

let _srSalesLoaded = false;

async function salesReportInit(){
  if (_srSalesLoaded) return;
  // โหลด dropdown เซลล์
  try {
    const r = await call({ action:'pk_managerSalesList' });
    if (r.ok) {
      const sel = document.getElementById('srSalesUser');
      sel.innerHTML = '<option value="">— เลือกเซลล์ —</option>' +
        r.sales.map(s => `<option value="${escAttr(s.username)}">${escAttr(s.name)}${s.active?'':' (ปิดใช้งาน)'}</option>`).join('');
      _srSalesLoaded = true;
    }
  } catch(e) {}
}

async function salesReportLoad(){
  const username = document.getElementById('srSalesUser').value;
  if (!username) { toast('เลือกเซลล์ก่อน'); return; }
  const fromDate = document.getElementById('srFrom').value || '';
  const toDate = document.getElementById('srTo').value || '';
  const w = document.getElementById('srContent');
  w.innerHTML = skelDashboard();
  try {
    const r = await call({ action:'pk_managerSalesReport', salesUsername: username, fromDate, toDate });
    if (!r.ok) { w.innerHTML = '<div class="loading-row">'+(r.error||'โหลดไม่ได้')+'</div>'; return; }
    salesReportRender(r);
  } catch(e) { w.innerHTML = '<div class="loading-row">เชื่อมต่อไม่ได้</div>'; }
}

function salesReportRender(r){
  const s = r.summary;
  const fmtB = n => '฿' + (n||0).toLocaleString('th-TH');
  const rangeStr = (r.range.fromDate || r.range.toDate)
    ? `${r.range.fromDate||'เริ่มต้น'} → ${r.range.toDate||'ปัจจุบัน'}`
    : 'ทั้งหมด';

  // สรุปตัวเลข
  let html = `
    <div class="section-pad">
      <div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px;">👤 ${escAttr(r.sales.name)}</div>
      <div style="font-size:12px;color:var(--mu);margin-bottom:14px;">📅 ${rangeStr}</div>
      <div class="dash-stats" style="padding:0;">
        <div class="dstat"><div class="dstat-num">${s.installCount}</div><div class="dstat-lbl">งานติดตั้งลงคิว</div></div>
        <div class="dstat"><div class="dstat-num" style="font-size:18px;">${fmtB(s.installAmount)}</div><div class="dstat-lbl">ยอดติดตั้ง</div></div>
        <div class="dstat"><div class="dstat-num">${s.measureCount}</div><div class="dstat-lbl">งานวัด (จบ ${s.measureDone})</div></div>
        <div class="dstat"><div class="dstat-num">${s.quoteCount}</div><div class="dstat-lbl">Quotes</div></div>
        <div class="dstat"><div class="dstat-num" style="font-size:18px;">${fmtB(s.quoteAmount)}</div><div class="dstat-lbl">ยอด Quotes</div></div>
      </div>
    </div>
  `;

  // 3 list
  html += salesReportList('🔧 งานติดตั้งที่ลงคิว', r.installJobs, j =>
    `${j.id} · ${escAttr(j.customer)} · ${fmtB(j.amount)} · <span style="color:var(--mu);">${escAttr(j.status)}</span>`);
  html += salesReportList('📏 งานวัด', r.measureJobs, j =>
    `${j.id} · ${escAttr(j.customer)} · <span style="color:var(--mu);">${j.status==='done'?'✅ จบ':j.status}</span>`);
  html += salesReportList('💰 Quotes', r.quotes, q =>
    `${q.id} · ${escAttr(q.customer)} · ${fmtB(q.totalAmount)}`);

  document.getElementById('srContent').innerHTML = html;
}

function salesReportList(title, items, lineFn){
  let rows;
  if (!items.length) {
    rows = '<div style="padding:10px 14px;color:var(--mu);font-size:13px;font-style:italic;">— ไม่มีข้อมูล —</div>';
  } else {
    rows = items.map(it => `<div style="padding:8px 14px;border-bottom:1px solid var(--bdr);font-size:13px;">${it.date} · ${lineFn(it)}</div>`).join('');
  }
  return `
    <div class="section-pad" style="padding-top:0;">
      <div style="font-size:13px;font-weight:700;color:var(--acc);margin:8px 0;">${title} (${items.length})</div>
      <div style="background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;max-height:300px;overflow-y:auto;">${rows}</div>
    </div>
  `;
}

async function reloadAll(){
  if (CURRENT_USER && CURRENT_USER.role !== 'office' && CURRENT_USER.role !== 'manager') return;
  clearCache();  // ปุ่ม refresh global → ล้าง cache ทั้งหมด
  document.getElementById('syncTxt').textContent = 'กำลังโหลด...';
  try {
    const b = await call({ action:'pk_bootstrap' });
    _teams = b.teams || [];
    _salesTeams = b.salesTeams || [];
    _accessDates = b.access || [];
    _allMembers = b.members || [];
    fillTeamDropdowns();
    renderAccess();
    document.getElementById('syncTxt').textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH',{timeStyle:'short'});
    if (document.getElementById('tabDash') && document.getElementById('tabDash').style.display !== 'none') loadDashboard();
  } catch(e) { document.getElementById('syncTxt').textContent = '❌ โหลดไม่ได้'; }

function fillTeamDropdowns(){
  const at = document.getElementById('accTeam');
  if (at) {
    const v = at.value; at.innerHTML = '';
    _teams.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; at.appendChild(o); });
    if (v) at.value = v;
  }
  const jt = document.getElementById('jTeam');
  if (jt) {
    const jv = jt.value;
    jt.innerHTML = '<option value="__ALL__">ทุกทีม</option>';
    _teams.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; jt.appendChild(o); });
    if (jv) jt.value = jv;
  }
  // bkTeam ใช้ฟังก์ชันแยก เพราะต้องเปลี่ยนตาม _bkType
  fillBookingTeam();
}

// เติม dropdown ทีมในแท็บลงคิว ตามประเภทปัจจุบัน
function fillBookingTeam(){
  const bt = document.getElementById('bkTeam');
  if (!bt) return;
  const list = (typeof _bkType !== 'undefined' && _bkType === 'measure') ? _salesTeams : _teams;
  const label = (typeof _bkType !== 'undefined' && _bkType === 'measure') ? 'เซลล์' : 'ช่าง';
  bt.innerHTML = '<option value="">— ไม่ระบุ —</option>';
  if (!list.length) {
    const o = document.createElement('option');
    o.disabled = true; o.textContent = `(ยังไม่มีทีม${label}ในระบบ)`;
    bt.appendChild(o);
    return;
  }
  list.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; bt.appendChild(o); });
}

function _expFileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve({ name:file.name, mimeType:file.type, bytes: reader.result.split(',')[1] });
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function expenseSelectCat(cat, btn){
  if (!_expMaster){ toast('ข้อมูลยังโหลดไม่เสร็จ ลองกดใหม่อีกครั้ง'); return; }
  _expCat = cat;
  document.querySelectorAll('.exp-chip').forEach(c => c.classList.remove('on'));
  if (btn) btn.classList.add('on');

  const isWage = (cat === 'ค่าแรง');
  const isTravel = (cat === 'ค่าเดินทาง');

  // สลับ UI ค่าแรง ↔ ฟอร์มปกติ
  document.getElementById('expWageBlock').style.display = isWage ? '' : 'none';
  document.getElementById('expSubTypeWrap').style.display = isWage ? 'none' : '';

  if (isWage){
    document.getElementById('expPayeeWrap').style.display = 'none';
    document.getElementById('expPayeeBankWrap').style.display = 'none';
    document.getElementById('expVehicleWrap').style.display = 'none';
    expWageReset();
    expWageLoadEmps();
    return;
  }

  const list = isTravel ? _expMaster.travelTypes : _expMaster.costTypes;
  document.getElementById('expSubType').innerHTML =
    '<option value="">— เลือกประเภท —</option>' + list.map(t => `<option value="${t}">${t}</option>`).join('');

  document.getElementById('expVehicleWrap').style.display = isTravel ? '' : 'none';

function expensePayeeCheck(){
  const name = (document.getElementById('expPayee').value||'').trim();

  const bankEl = document.getElementById('expPayeeBank');
  const accEl  = document.getElementById('expPayeeAccount');

  const found = _expPayeeMap[name];

    bankEl.value = found.bank || ''; accEl.value = found.account || '';

    hint.textContent = (found.bank && found.account) ? '(ผู้รับเดิม — แก้ไขได้)' : '(ผู้รับเดิม — เติมบัญชีให้ครบได้)';

const TH_MON_W = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function expWageRenderTypes(){
  const wrap = document.getElementById('expWageTypeWrap');
  const box = document.getElementById('expWageTypeBtns');
  const e = _wageEmp, P = _wagePerms;
  if (!e || !P){ wrap.style.display = 'none'; return; }
  let types;
  if (e.type === 'รายเดือน') types = ['เงินเดือน','เบิกล่วงหน้า','เบี้ยเลี้ยง','OT (ค่าล่วงเวลา)','โบนัส','หักอื่นๆ'];
  else if (e.type === 'รายวัน') types = ['ค่าแรงรายวัน','เบิกล่วงหน้า','เบี้ยเลี้ยง','OT (ค่าล่วงเวลา)','โบนัส','หักอื่นๆ'];
  else types = ['เบี้ยเลี้ยง','OT (ค่าล่วงเวลา)','โบนัส'];
  const canDo = (t) => {
    if (P.open.indexOf(t) >= 0) return true;
    if (CURRENT_USER.role === 'manager') return true;
    if (P.managerOnly.indexOf(t) >= 0) return false;
    if (P.restricted.indexOf(t) >= 0) return !!e.officeAllowed;
    return false;
  };
  const allowed = types.filter(canDo);
  if (!allowed.length){ box.innerHTML = '<div style="color:var(--mu);font-size:12px;">ไม่มีสิทธิ์ตั้งเบิกพนักงานคนนี้</div>'; wrap.style.display=''; return; }
  const minus = ['เบิกล่วงหน้า','หักอื่นๆ'];
  box.innerHTML = allowed.map(t =>
    '<button type="button" class="wt' + (minus.indexOf(t)>=0?' minus':'') + '" onclick="expWageSelType(\'' + t + '\',this)">' + t + '</button>').join('');
  wrap.style.display = '';
}

function expWageSelType(t, btn){
  _wageType = t;

  const isDaily = (t === 'ค่าแรงรายวัน');
  document.getElementById('expWageCalWrap').style.display = isDaily ? '' : 'none';
  if (isDaily){ _wageSelDays = {}; expWageRenderCal(); }

    const now = new Date(), y = now.getFullYear(), m = now.getMonth();

    document.getElementById('expSalTo').value = new Date(y,m+1,0).toISOString().slice(0,10);
  }
}

function expWageCalMove(d){ _wageCalDate.setMonth(_wageCalDate.getMonth()+d); expWageRenderCal(); }
function expWageRenderCal(){
  const y = _wageCalDate.getFullYear(), m = _wageCalDate.getMonth();
  document.getElementById('expWageCalMonth').textContent = TH_MON_W[m] + ' ' + (y+543);
  const first = new Date(y,m,1).getDay(), days = new Date(y,m+1,0).getDate();
  const dow = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  let h = dow.map(d => '<div class="cal-dow">'+d+'</div>').join('');
  for (let i=0;i<first;i++) h += '<div class="cal-day empty"></div>';
  for (let d=1;d<=days;d++){
    const key = y+'-'+m+'-'+d, wd = new Date(y,m,d).getDay();
    h += '<div class="cal-day' + (_wageSelDays[key]?' sel':'') + (wd===0?' sun':'') + '" onclick="expWageToggleDay(\''+key+'\')">'+d+'</div>';
  }
  document.getElementById('expWageCalGrid').innerHTML = h;
  expWageCalc();
}
function expWageToggleDay(key){ _wageSelDays[key] ? delete _wageSelDays[key] : _wageSelDays[key]=1; expWageRenderCal(); }
function expWageCalc(){
  if (!_wageEmp) return;
  const n = Object.keys(_wageSelDays).length, rate = _wageEmp.daily||0, total = n*rate;
  document.getElementById('expWageDays').textContent = n;
  document.getElementById('expWageRate').textContent = '฿' + rate.toLocaleString();
  document.getElementById('expWageCalc').textContent = '฿' + total.toLocaleString();
  document.getElementById('expAmount').value = total;
}

let _salData = null, _salLiId = 0;
async function expWageCalcSalary(){
  if (!_wageEmp){ toast('เลือกพนักงาน'); return; }
  const from = document.getElementById('expSalFrom').value, to = document.getElementById('expSalTo').value;
  if (!from || !to){ toast('ระบุงวด (จาก–ถึง)'); return; }

    const r = await call({ action:'pk_payCalcSalary', empId:_wageEmp.id, from:from, to:to });

    _salData = r;
    document.getElementById('salBase').textContent = '฿' + r.base.toLocaleString();
    document.getElementById('salAbsentLbl').textContent = 'หักขาด/ลา (' + r.absentDays + ' วัน)';

function expSalAddLi(){
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:8px;';
  div.innerHTML =
    '<button type="button" class="wt minus" style="width:36px;flex:0 0 auto;padding:8px 0;" onclick="this.classList.toggle(\'minus\');this.textContent=this.classList.contains(\'minus\')?\'−\':\'+\';expSalRecalc();">−</button>' +
    '<input class="fi" style="flex:1;" placeholder="ชื่อรายการ">' +
    '<input class="fi" type="number" inputmode="numeric" style="width:88px;text-align:right;" placeholder="0" oninput="expSalRecalc()">' +
    '<button type="button" style="background:none;border:none;color:var(--mu);cursor:pointer;font-size:16px;flex:0 0 auto;" onclick="this.parentNode.remove();expSalRecalc();">✕</button>';
  document.getElementById('salLiList').appendChild(div);
}
function expSalRecalc(){
  if (!_salData) return;
  let itemsSum = 0; const notes = [];
  document.querySelectorAll('#salLiList > div').forEach(row => {
    const minus = row.querySelector('.wt').classList.contains('minus');
    const ins = row.querySelectorAll('input');
    const name = ins[0].value.trim();
    const v = parseFloat(ins[1].value) || 0;
    if (v){ itemsSum += minus ? -v : v; if (name) notes.push((minus?'−':'+') + name + ' ' + v); }
  });
  const net = _salData.netBeforeItems + itemsSum;
  document.getElementById('salNet').textContent = '฿' + net.toLocaleString();
  // เขียน backing fields (submit เดิมอ่านต่อ)
  document.getElementById('expAmount').value = net;
  document.getElementById('expPayee').value = _salData.employee.name;
  document.getElementById('expPayeeBank').value = _salData.employee.bank || '';
  document.getElementById('expPayeeAccount').value = _salData.employee.account || '';
  const from = document.getElementById('expSalFrom').value, to = document.getElementById('expSalTo').value;
  const dt = document.getElementById('expDetail');
  dt.value = 'เงินเดือน ' + _salData.employee.name + ' (' + from + ' ถึง ' + to + ')';
  dt.dataset.auto = '1';
  const np = [];
  if (_salData.absentDays) np.push('หักขาด/ลา ' + _salData.absentDays + 'วัน');
  if (_salData.advanceTotal) np.push('หักล่วงหน้า ' + _salData.advanceTotal);
  document.getElementById('expNote').value = np.concat(notes).join(', ');
}

async function expenseSubmit(){
  if (!_expCat){ toast('เลือกหมวดหลัก'); return; }
  const formData = {
    mainCat: _expCat,
    subType: document.getElementById('expSubType').value,
    expenseDate: document.getElementById('expDate').value,
    detail: document.getElementById('expDetail').value.trim(),
    amount: document.getElementById('expAmount').value,
    payee:   _expCat === 'ค่าเดินทาง' ? '' : document.getElementById('expPayee').value,
    payeeBank:    _expCat === 'ค่าเดินทาง' ? '' : document.getElementById('expPayeeBank').value.trim(),
    payeeAccount: _expCat === 'ค่าเดินทาง' ? '' : document.getElementById('expPayeeAccount').value.trim(),
    vehicle: _expCat === 'ค่าเดินทาง' ? document.getElementById('expVehicle').value : '',
    transferDate: document.getElementById('expTransfer').value,
    note: document.getElementById('expNote').value.trim()
  };
  if (!formData.subType){ toast('เลือกประเภท'); return; }
  if (!formData.detail){ toast('กรอกรายละเอียด'); return; }
  if (!(parseFloat(formData.amount) > 0)){ toast('ยอดเงินไม่ถูกต้อง'); return; }
  if (formData.mainCat === 'ค่าเดินทาง' && !formData.vehicle){ toast('เลือกทะเบียนรถ'); return; }
  if (formData.mainCat !== 'ค่าเดินทาง' && !formData.payee){ toast('เลือกผู้รับเงิน'); return; }

  let fileData = null;
  const fileEl = document.getElementById('expFile');
  if (fileEl && fileEl.files && fileEl.files[0]){
    const file = fileEl.files[0];
    if (file.size > 5*1024*1024){ toast('ไฟล์ใหญ่เกิน 5MB'); return; }
    showLoad('อัปโหลดใบแจ้งหนี้...');
    try { fileData = await _expFileToBase64(file); }
    catch(e){ hideLoad(); toast('อ่านไฟล์ไม่ได้'); return; }
  } else {
    showLoad('บันทึก...');
  }

  try {
    const r = await call({ action:'pk_expenseSubmit', formData, fileData });
    hideLoad();
    if (!r.ok){ toast('❌ ' + (r.error||'บันทึกไม่ได้')); return; }
    // ผู้รับใหม่ถูกเพิ่มเข้า master → อัปเดต map + datalist ใน memory (ไม่ต้อง re-bootstrap)
    if (r.payeeAdded && formData.payee){
      _expPayeeMap[formData.payee] = { bank:formData.payeeBank, account:formData.payeeAccount };
      const dl = document.getElementById('expPayeeList');
      if (dl){ const o = document.createElement('option'); o.value = formData.payee; dl.appendChild(o); }
      if (_expMaster && _expMaster.payees) _expMaster.payees.push({ name:formData.payee, bank:formData.payeeBank, account:formData.payeeAccount });
    }
    toast('✅ ตั้งเบิกสำเร็จ ' + r.id + (r.payeeAdded ? ' · เพิ่มผู้รับใหม่แล้ว' : ''));
    expenseResetForm();
  } catch(e){ hideLoad(); }
}

let _batchMode = false, _batchSel = [], _batchPayee = null;

function expenseBatchToggle(){
  _batchMode = !_batchMode;
  _batchSel = []; _batchPayee = null;
  document.getElementById('expBatchToggle').textContent = _batchMode ? '✕ ออกโหมด' : '🧾 รวบจ่าย';
  document.getElementById('expBatchBar').style.display = _batchMode ? '' : 'none';
  expenseApproveRender();

function expenseBatchExit(){
  _batchMode = false; _batchSel = []; _batchPayee = null;
  const t = document.getElementById('expBatchToggle'); if (t) t.textContent = '🧾 รวบจ่าย';
  const b = document.getElementById('expBatchBar'); if (b) b.style.display = 'none';
}

function expenseBatchCardHtml(it){
  const sel = _batchSel.indexOf(it.id) >= 0;
  const payee = (it.payee||'').trim();
  const locked = (_batchPayee !== null && payee !== _batchPayee && !sel);
  const amt = (Number(it.amount)||0).toLocaleString('th-TH', { minimumFractionDigits:2 });
  const d = it.date ? new Date(it.date).toLocaleDateString('th-TH') : '';
  return '<div class="exp-card" style="' + (locked?'opacity:.4;':'') + (sel?'border-color:var(--acc);background:rgba(245,166,35,.06);':'') + '" onclick="' + (locked?'':'expenseBatchToggleItem(\'' + it.id + '\')') + '">' +
    '<div style="display:flex;align-items:center;gap:10px;">' +
    '<div style="width:22px;height:22px;border-radius:6px;border:2px solid ' + (sel?'var(--acc)':'var(--bdr)') + ';background:' + (sel?'var(--acc)':'transparent') + ';flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;font-size:13px;">' + (sel?'✓':'') + '</div>' +
    '<div style="flex:1;min-width:0;">' +
    '<div style="font-weight:600;font-size:13px;">' + (payee||'(ไม่ระบุผู้รับ)') + (locked?' <span style="color:var(--rd);font-size:10px;">คนละผู้รับ</span>':'') + '</div>' +
    '<div style="font-size:11px;color:var(--mu);">' + it.id + ' · ' + d + ' · ' + (it.subType||'') + '</div></div>' +
    '<div style="font-weight:700;color:var(--acc);flex-shrink:0;">฿' + amt + '</div>' +
    '</div></div>';
}

function expenseBatchToggleItem(id){
  const it = (_expCurrentList||[]).find(x => x.id === id);
  if (!it) return;
  const payee = (it.payee||'').trim();
  const i = _batchSel.indexOf(id);
  if (i >= 0){ _batchSel.splice(i,1); if (_batchSel.length === 0) _batchPayee = null; }
  else {

// คัดลอกเลขบัญชี (มี fallback สำหรับเบราว์เซอร์ที่บล็อก clipboard API)
function pkCopyAccount(t, btn){
  const txt = String(t);
  const done = function(){
    if (btn){ const o = btn.innerHTML; btn.innerHTML = '✓ คัดลอกแล้ว'; setTimeout(function(){ btn.innerHTML = o; }, 1200); }
    toast('คัดลอกเลขบัญชีแล้ว');
  };
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(function(){ pkCopyFallback(txt); done(); });
  } else { pkCopyFallback(txt); done(); }
}
function pkCopyFallback(t){
  try {
    const ta = document.createElement('textarea');
    ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  } catch(e){}
}

function timelogSelEmp(){
  const id = document.getElementById('tlEmp').value;
  const box = document.getElementById('tlQuota');
  const emp = _tlEmps.find(e => e.id === id);
  if (!emp){ box.style.display = 'none'; return; }
  // นับลาที่ "ไม่หัก" ปีนี้
  const yr = new Date().getFullYear();
  let sick = 0, per = 0;
  _tlRecords.forEach(rec => {
    if (rec.empId !== id || rec.deduct) return;
    const y = rec.date ? new Date(rec.date).getFullYear() : 0;
    if (y !== yr) return;
    if (rec.type === 'ลาป่วย') sick++;
    else if (rec.type === 'ลากิจ') per++;
  });
  box.innerHTML = 'โควตาปีนี้ (เฉพาะที่ไม่หัก) — ลาป่วย: <b style="color:var(--tx);">' + sick + '/' + (emp.quotaSick||0) +
    '</b> · ลากิจ: <b style="color:var(--tx);">' + per + '/' + (emp.quotaPersonal||0) + '</b>';
  box.style.display = '';
}

  // ค่าเริ่มต้นหัก: ขาด=หัก · ลา/สาย=ไม่หัก (ปรับเองได้)
  _tlDeduct = (t === 'ขาด');

function timelogUpdateDeductBtn(){
  const b = document.getElementById('tlDeduct');

async function timelogSave(){
  const payload = {
    action:'pk_paySaveTimeLog',
    id: document.getElementById('tlId').value,
    empId: document.getElementById('tlEmp').value,
    date: document.getElementById('tlDate').value,
    type: _tlType,
    deduct: _tlDeduct,
    lateMin: document.getElementById('tlLateMin').value,
    note: document.getElementById('tlNote').value.trim()
  };
  if (!payload.empId){ toast('เลือกพนักงาน'); return; }
  if (!payload.date){ toast('ระบุวันที่'); return; }
  if (!payload.type){ toast('เลือกประเภท'); return; }
  showLoad('บันทึก...');
  try {
    const r = await call(payload);
    hideLoad();
    if (!r.ok){ toast('❌ ' + (r.error||'บันทึกไม่ได้')); return; }
    toast('✅ บันทึกแล้ว ' + r.id);
    timelogResetForm();
    timelogLoad();
  } catch(e){ hideLoad(); }

function timelogResetForm(){
  document.getElementById('tlId').value = '';
  document.getElementById('tlNote').value = '';
  document.getElementById('tlLateMin').value = '';
  document.getElementById('tlLateWrap').style.display = 'none';
  _tlType = ''; _tlDeduct = false;
  document.querySelectorAll('#tlTypeBtns .wt').forEach(b => b.classList.remove('on'));
  timelogUpdateDeductBtn();
}

function timelogRender(){
  const box = document.getElementById('tlRecList');
  const filt = document.getElementById('tlFilterEmp').value;
  let recs = _tlRecords;
  if (filt) recs = recs.filter(r => r.empId === filt);
  if (!recs.length){ box.innerHTML = '<div class="loading-row">ยังไม่มีบันทึก</div>'; return; }
  const typeColor = { 'ขาด':'var(--rd)', 'ลาป่วย':'var(--grn)', 'ลากิจ':'var(--blu)', 'มาสาย':'var(--acc)' };
  box.innerHTML = recs.map(rec => {
    const d = rec.date ? new Date(rec.date).toLocaleDateString('th-TH') : '';
    const c = typeColor[rec.type] || 'var(--mu)';
    const tag = rec.type + (rec.type==='มาสาย' && rec.lateMin ? (' ' + rec.lateMin + ' นาที') : '') + ' · ' + (rec.deduct ? 'หัก' : 'ไม่หัก');
    return '<div style="background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;">' +
      '<div style="min-width:0;"><div style="font-weight:600;font-size:13px;">' + rec.empName + ' · ' + d + '</div>' +
      '<div style="font-size:11px;color:' + c + ';">' + tag + (rec.note ? (' · ' + rec.note) : '') + '</div></div>' +
      '<div style="flex-shrink:0;display:flex;gap:6px;">' +
      '<button class="btn btn-g" style="padding:5px 10px;font-size:12px;" onclick="timelogEdit(\'' + rec.id + '\')">แก้</button>' +
      '<button class="btn" style="padding:5px 10px;font-size:12px;background:rgba(255,69,58,.12);color:var(--rd);" onclick="timelogDelete(\'' + rec.id + '\')">ลบ</button>' +
      '</div></div>';
  }).join('');
}

function timelogEdit(id){
  const rec = _tlRecords.find(r => r.id === id);
  if (!rec) return;
  document.getElementById('tlId').value = rec.id;
  document.getElementById('tlEmp').value = rec.empId;
  document.getElementById('tlDate').value = rec.date ? rec.date.slice(0,10) : '';
  document.getElementById('tlNote').value = rec.note || '';
  document.getElementById('tlLateMin').value = rec.lateMin || '';
  timelogSelEmp();
  // set ประเภท
  _tlType = rec.type;
  document.querySelectorAll('#tlTypeBtns .wt').forEach(b => b.classList.toggle('on', b.textContent === rec.type));
  document.getElementById('tlLateWrap').style.display = (rec.type === 'มาสาย') ? '' : 'none';
  _tlDeduct = rec.deduct;
  timelogUpdateDeductBtn();
  window.scrollTo({ top:0, behavior:'smooth' });
  toast('แก้ไขรายการ ' + id);
}

async function timelogDelete(id){
  if (!confirm('ลบบันทึกนี้? (ลบถาวร)')) return;
  showLoad('ลบ...');
  try {
    const r = await call({ action:'pk_payDeleteTimeLog', id: id });
    hideLoad();
    if (!r.ok){ toast('❌ ' + (r.error||'ลบไม่ได้')); return; }
    toast('🗑 ลบแล้ว');
    timelogLoad();
  } catch(e){ hideLoad(); }
}

function summaryInit(){
  const el = document.getElementById('sumMonth');
  if (el && !el.value){ const d = new Date(); el.value = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }
  summaryLoad();
}
async function summaryLoad(){
  const box = document.getElementById('sumBody');
  const month = document.getElementById('sumMonth').value;
  if (!month){ box.innerHTML = '<div class="loading-row">เลือกเดือน</div>'; return; }
  box.innerHTML = '<div class="loading-row">กำลังโหลด...</div>';
  try {
    const r = await call({ action:'pk_expenseMonthSummary', month: month });
    if (!r.ok){ box.innerHTML = '<div class="loading-row">' + (r.error||'โหลดไม่ได้') + '</div>'; return; }
    summaryRender(r);
  } catch(e){ box.innerHTML = '<div class="loading-row">เชื่อมต่อไม่ได้</div>'; }
}
function summaryRender(d){
  const box = document.getElementById('sumBody');
  if (!d.count){ box.innerHTML = '<div class="loading-row">เดือนนี้ยังไม่มีรายการที่จ่ายแล้ว</div>'; return; }
  const baht = function(n){ return '฿' + (n||0).toLocaleString('th-TH', { minimumFractionDigits:2 }); };
  let html = '<div style="background:var(--surf2);border-radius:12px;padding:16px;margin-bottom:16px;">' +
    '<div style="font-size:12px;color:var(--mu);">ยอดจ่ายรวมทั้งเดือน (' + d.count + ' รายการ)</div>' +
    '<div style="font-size:26px;font-weight:800;color:var(--acc);">' + baht(d.total) + '</div></div>';
  // แยกหมวด
  html += '<div style="font-weight:700;font-size:13px;margin-bottom:10px;">แยกตามหมวด</div>';
  const catColor = { 'ค่าแรง':'var(--acc)', 'ค่าเดินทาง':'var(--blu)', 'ต้นทุน ค่าใช้จ่าย':'var(--grn)' };
  (d.cats||[]).forEach(c => {
    const pct = d.total ? Math.round(c.total / d.total * 100) : 0;
    const col = catColor[c.cat] || 'var(--mu)';
    html += '<div style="margin-bottom:11px;">' +
      '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><span>' + c.cat + '</span><span style="font-weight:600;">' + baht(c.total) + ' · ' + pct + '%</span></div>' +
      '<div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:' + col + ';border-radius:4px;"></div></div></div>';
  });
  // รายวัน
  html += '<div style="font-weight:700;font-size:13px;margin:20px 0 10px;">ยอดรวมรายวัน</div>';
  html += '<div style="display:grid;grid-template-columns:1fr auto auto;gap:7px 14px;font-size:13px;align-items:center;">';
  html += '<div style="color:var(--mu);font-size:11px;">วันที่</div><div style="color:var(--mu);font-size:11px;text-align:right;">รายการ</div><div style="color:var(--mu);font-size:11px;text-align:right;">ยอด</div>';
  (d.byDay||[]).forEach(row => {
    const dt = new Date(row.date + 'T00:00:00').toLocaleDateString('th-TH', { day:'numeric', month:'short' });
    html += '<div>' + dt + '</div><div style="text-align:right;color:var(--mu);">' + row.count + '</div><div style="text-align:right;font-weight:600;">' + baht(row.total) + '</div>';
  });
  html += '</div>';
  box.innerHTML = html;
}

function setTab(t, btn){
  ['Dash','Access','Booking','Jobs','Records','Quotes','Salesreport','Expensesubmit','Expensemy','Expenseapprove','Employees','Timelog','Production','Summary'].forEach(x => {
    const el = document.getElementById('tab'+x); if (el) el.style.display = 'none';
  });
  const tgt = document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
  if (tgt) tgt.style.display = 'block';
  // sidebar active state
  document.querySelectorAll('#officeSidebar .sidebar-item').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  // mobile title
  const titleEl = document.getElementById('mobileTabTitle');
  if (titleEl && btn) {
    const lbl = btn.querySelector('.sidebar-label');
    if (lbl) titleEl.textContent = lbl.textContent;
  }
  // ปิด drawer บนมือถือ
  closeSidebarMobile();

  if (t === 'booking') initBookingTab();
  if (t === 'records') recordsInit();
  if (t === 'quotes') quotesInit();

  if (t === 'expensesubmit') expenseInit();
  if (t === 'expensemy') expenseMyInit();
  if (t === 'expenseapprove') expenseApproveInit();
  if (t === 'employees') employeesInit();
  if (t === 'timelog') timelogInit();
  if (t === 'summary') summaryInit();
  if (t === 'production') pkpInit();
}

// ── Sidebar toggle ──
function toggleSidebar(){
  const sb = document.getElementById('officeSidebar') || document.getElementById('salesSidebar');
  if (!sb) return;
  // mobile: toggle drawer / desktop: expand-collapse
  if (window.innerWidth <= 768) {
    sb.classList.toggle('expanded');
    document.getElementById('sidebarBackdrop').classList.toggle('on', sb.classList.contains('expanded'));
  } else {
    const expanded = sb.classList.toggle('expanded');
    try { localStorage.setItem('pk_sidebar_expanded', expanded ? '1' : '0'); } catch(e){}
  }
}
function openSidebarMobile(){
  const sb = document.getElementById('officeSidebar') || document.getElementById('salesSidebar');
  if (!sb) return;
  sb.classList.add('expanded');
  document.getElementById('sidebarBackdrop').classList.add('on');
}
function closeSidebarMobile(){
  if (window.innerWidth > 768) return;
  const sb = document.getElementById('officeSidebar') || document.getElementById('salesSidebar');
  if (!sb) return;
  sb.classList.remove('expanded');
  const bd = document.getElementById('sidebarBackdrop');
  if (bd) bd.classList.remove('on');
}
// restore sidebar state (desktop)
function restoreSidebarState(){
  if (window.innerWidth <= 768) return;
  const sb = document.getElementById('officeSidebar') || document.getElementById('salesSidebar');
  if (!sb) return;
  try {
    if (localStorage.getItem('pk_sidebar_expanded') === '1') sb.classList.add('expanded');
  } catch(e){}
}

let _bkRecent = [];

async function initBookingTab(){
  // sync ปุ่มประเภท/รูปแบบ ให้ตรงกับ state (source of truth = _bkType/_bkMode)
  setBookingType(_bkType);
  setBookingMode(_bkMode);
  // set วันที่เป็นวันนี้ ถ้ายังว่าง
  const dt = document.getElementById('bkDate');
  if (dt && !dt.value) {
    dt.value = new Date().toISOString().split('T')[0];
    updateDateDisplay(dt);
  }
  // ถ้า _teams ยังว่าง ให้โหลดก่อน
  if (!_teams.length && !_salesTeams.length) {

function setBookingType(t){

  document.getElementById('bkTypeInstall').classList.toggle('on', t==='install');

}
function setBookingMode(m){
  _bkMode = m;
  document.getElementById('bkModeForm').classList.toggle('on', m==='form');

  document.getElementById('bkRaw').style.display = (m==='raw') ? 'block' : 'none';

async function submitBooking(){
  const body = { action:'pk_addBooking', type:_bkType };

  if (_bkMode === 'form') {
    const date     = document.getElementById('bkDate').value;
    const customer = document.getElementById('bkCustomer').value.trim();
    const address  = document.getElementById('bkAddress').value.trim();
    const job      = document.getElementById('bkJob').value.trim();
    const score    = document.getElementById('bkScore').value;
    const amount   = document.getElementById('bkAmount').value;
    const team     = document.getElementById('bkTeam').value;
    if (!date || !customer) { toast('กรอก วันที่ และ ชื่อลูกค้า'); return; }
    Object.assign(body, { date, customer, address, job, score, amount, team });
  } else {
    const raw = document.getElementById('bkRawText').value.trim();
    if (!raw) { toast('พิมพ์ข้อมูลก่อน'); return; }
    body.raw = raw;
  }

  showLoad('กำลังบันทึก...');
  try {
    const r = await call(body);
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error || 'ผิดพลาด')); return; }
    toast(`✅ ลงคิว ${r.sheet} #${r.id} สำเร็จ`);
    addRecentBooking(r);
    clearBookingForm();
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

function addRecentBooking(r){
  _bkRecent.unshift(r);
  if (_bkRecent.length > 5) _bkRecent.pop();
  renderRecentBookings();
}
function renderRecentBookings(){
  const w = document.getElementById('bkRecent');
  if (!w) return;
  if (!_bkRecent.length) { w.innerHTML = ''; return; }
  w.innerHTML = `<div style="font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">บันทึกล่าสุด (รอบนี้)</div>` +
    _bkRecent.map(r => `
      <div class="bk-recent-item">
        <span class="bk-id">${r.sheet} #${r.id}</span>
        <span>${r.customer}</span>
        <span class="bk-meta">${r.date}${r.team?' · '+r.team:''} · ฿${fmt(r.amount)} · รอ CF</span>
      </div>
    `).join('');
}

function clearBookingForm(){
  if (_bkMode === 'form') {
    document.getElementById('bkCustomer').value = '';
    document.getElementById('bkAddress').value = '';
    document.getElementById('bkJob').value = '';
    document.getElementById('bkScore').value = '1';
    document.getElementById('bkAmount').value = '';
    document.getElementById('bkTeam').value = '';
  } else {
    document.getElementById('bkRawText').value = '';
  }
}

async function loadDashboard(){
  const date = document.getElementById('dashDate').value;
  if (!date) { document.getElementById('dashContent').innerHTML='<div class="loading-row">เลือกวันที่ก่อน</div>'; return; }
  document.getElementById('dashContent').innerHTML = skelDashboard();

    const r = await call({ action:'pk_dashboard', date }, { cache: true });
    if (!r.ok) { document.getElementById('dashContent').innerHTML='<div class="loading-row">'+r.error+'</div>'; return; }
    const s = r.summary;
    if (s.totalJobs === 0) { document.getElementById('dashContent').innerHTML='<div class="loading-row">ไม่มีงานในวันที่ '+fmtD(date)+'</div>'; return; }
    let html = `<div class="dash-stats">
      <div class="dstat"><div class="dstat-num">${s.totalJobs}</div><div class="dstat-lbl">งานทั้งหมด</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--acc)">${s.cntPending}</div><div class="dstat-lbl">รอรับงาน</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--blu)">${s.cntWorking}</div><div class="dstat-lbl">กำลังทำ</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--grn)">${s.cntDone}</div><div class="dstat-lbl">✅ จบงาน</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--acc)">${s.cntContinue||0}</div><div class="dstat-lbl">➡ ต่องาน</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--grn);font-size:18px;">฿${fmt(s.totalAmt)}</div><div class="dstat-lbl">ยอดเงินรวม</div></div>
    </div><div class="dash-team-grid">`;
    r.teams.forEach(t => {
      const tot = t.jobs || 1;
      const pp = (t.pending||0)/tot*100, pw=(t.working||0)/tot*100, pd=(t.done||0)/tot*100;
      html += `<div class="dteam" onclick="showTeamDetail('${t.team.replace(/'/g,"\\'")}','${date}')">
        <div class="dteam-name">👷 ${t.team}</div>
        <div class="dteam-bar"><div class="dseg-p" style="width:${pp}%"></div><div class="dseg-w" style="width:${pw}%"></div><div class="dseg-d" style="width:${pd}%"></div></div>
        <div class="dteam-row"><span>งานทั้งหมด</span><b>${t.jobs}</b></div>
        <div class="dteam-row"><span style="color:var(--acc)">รอรับงาน</span><b>${t.pending||0}</b></div>
        <div class="dteam-row"><span style="color:var(--blu)">กำลังทำ</span><b>${t.working||0}</b></div>
        <div class="dteam-row"><span style="color:var(--grn)">✅ จบงาน</span><b>${t.done||0}</b></div>
        <div class="dteam-row"><span style="color:var(--acc)">➡ ต่องาน</span><b>${t.continued||0}</b></div>
        <div class="dteam-row" style="border-top:1px solid var(--bdr);margin-top:6px;padding-top:6px;"><span>ยอดเงิน</span><b style="color:var(--grn)">฿${fmt(t.amount)}</b></div>
      </div>`;
    });
    html += '</div>';
    document.getElementById('dashContent').innerHTML = html;
  } catch(e) { document.getElementById('dashContent').innerHTML='<div class="loading-row">โหลดไม่ได้</div>'; }
}

// ─── Team Detail Modal — กด card ทีมใน Dashboard → ดูงานของทีมนั้น ───
async function showTeamDetail(team, date){
  const m = document.getElementById('teamDetailModal');
  const b = document.getElementById('tdmBody');
  document.getElementById('tdmTitle').textContent = `👷 ${team} · ${fmtD(date)}`;
  b.innerHTML = '<div class="loading-row">กำลังโหลด...</div>';
  m.classList.add('on');

  try {
    const r = await call({ action:'pk_getJobs', team, date });
    if (!r.ok) { b.innerHTML = '<div class="loading-row">'+(r.error||'โหลดไม่ได้')+'</div>'; return; }
    const jobs = r.jobs || [];
    if (!jobs.length) { b.innerHTML = '<div class="loading-row">ไม่มีงานในวันนี้</div>'; return; }

    // จัดกลุ่ม
    const pending  = jobs.filter(j => j.status === 'pending');
    const working  = jobs.filter(j => j.status === 'working');
    const doneOnly = jobs.filter(j => j.status === 'done' && !j.continueNote);
    const continued = jobs.filter(j => j.status === 'done' && j.continueNote);

    const totalAmt = jobs.reduce((s,j) => s + (Number(j.amount)||0), 0);

    let html = `
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;">
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;">${jobs.length}</div><div class="dstat-lbl">งานทั้งหมด</div></div>
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;color:var(--acc);">${pending.length}</div><div class="dstat-lbl">รอรับงาน</div></div>
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;color:var(--blu);">${working.length}</div><div class="dstat-lbl">กำลังทำ</div></div>
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;color:var(--grn);">${doneOnly.length}</div><div class="dstat-lbl">✅ จบ</div></div>
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;color:var(--acc);">${continued.length}</div><div class="dstat-lbl">➡ ต่องาน</div></div>
      </div>

    `;

    // render กลุ่ม
    const groups = [
      { title:'⏳ รอรับงาน', list:pending,   color:'var(--acc)' },
      { title:'🔧 กำลังทำ',  list:working,   color:'var(--blu)' },
      { title:'✅ จบงาน',    list:doneOnly,  color:'var(--grn)' },
      { title:'➡ ต่องาน',    list:continued, color:'var(--acc)' },
    ];

    groups.forEach(g => {
      if (!g.list.length) return;
      html += `<div style="margin-bottom:14px;">
        <div style="font-size:12px;font-weight:700;color:${g.color};text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;border-left:3px solid ${g.color};padding-left:8px;">

        html += `<div style="background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:6px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;">

              ${j.address?`<div style="font-size:11px;color:var(--mu);margin-top:2px;">📍 ${j.address}</div>`:''}
              ${j.description?`<div style="font-size:11px;color:var(--blu);margin-top:2px;">🔧 ${j.description}</div>`:''}
            </div>
            <div style="text-align:right;font-size:11px;">
              ${j.amount?`<div style="color:var(--acc);font-family:var(--mono);font-weight:600;">฿${fmt(j.amount)}</div>`:''}
              ${j.worker?`<div style="color:var(--blu);margin-top:2px;">👤 ${j.worker}</div>`:''}
              ${doneTime?`<div style="color:var(--grn);margin-top:2px;">⏱ ${doneTime}</div>`:''}
            </div>
          </div>
          ${j.continueNote?`<div style="background:rgba(245,166,35,.1);border-left:3px solid var(--acc);padding:5px 8px;font-size:11px;color:var(--acc);margin-top:6px;border-radius:0 4px 4px 0;">📝 ${j.continueNote}</div>`:''}
          ${j.photos&&j.photos.length?`<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;">${j.photos.map((p,i)=>`<img src="${fixDriveUrl(p)}" referrerpolicy="no-referrer" style="width:42px;height:42px;object-fit:cover;border-radius:4px;border:1px solid var(--bdr);cursor:pointer;" onclick="showTdmPhoto('${j.id}',${i})" onerror="this.style.opacity='.3'">`).join('')}</div>`:''}
        </div>`;
      });
      html += '</div>';
    });

    b.innerHTML = html;
    // เก็บ jobs ไว้สำหรับเปิดรูป
    window._tdmJobs = jobs;
  } catch(e) {
    b.innerHTML = '<div class="loading-row">โหลดไม่ได้</div>';

}
