<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PK Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#0f1319;--surf:#171d27;--surf2:#1e2535;--bdr:#2a3347;
  --acc:#f5a623;--grn:#34c759;--rd:#ff453a;--blu:#4a9eff;
  --tx:#e8ecf2;--mu:#6b7a94;
  --sans:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;}

/* HEADER */
header{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--mono);font-size:14px;color:var(--acc);letter-spacing:3px;}
.logo span{color:#fff;}
.logo small{color:var(--mu);font-size:11px;margin-left:8px;letter-spacing:1px;}
.hbtns{display:flex;gap:8px;align-items:center;}
.hbtn{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--sans);transition:all .15s;text-decoration:none;}
.hbtn:hover{background:rgba(255,255,255,.06);color:#fff;}
.hbtn.danger{color:#ff8a80;border-color:rgba(255,69,58,.4);}
.hbtn.danger:hover{background:rgba(255,69,58,.1);}
.user-chip{font-size:12px;color:var(--mu);display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(255,255,255,.03);border-radius:20px;}
.user-chip b{color:var(--tx);font-weight:600;}
.role-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.role-office{background:rgba(245,166,35,.15);color:var(--acc);}
.role-sales{background:rgba(74,158,255,.15);color:var(--blu);}
.role-tech{background:rgba(52,199,89,.15);color:var(--grn);}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;background:radial-gradient(ellipse at center, rgba(245,166,35,.05), transparent);}
.login-box{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:36px 32px;width:100%;max-width:380px;}
.login-logo{font-family:var(--mono);font-size:20px;color:var(--acc);letter-spacing:4px;text-align:center;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--mu);text-align:center;margin-bottom:28px;}
.login-fg{margin-bottom:14px;}
.login-fl{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block;}
.login-fi,.fi{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;font-size:13px;font-family:var(--sans);color:var(--tx);transition:border-color .15s;}
.login-fi:focus,.fi:focus{outline:none;border-color:var(--acc);}
select.fi{cursor:pointer;}
.login-btn{width:100%;background:var(--acc);color:#000;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .15s;margin-top:8px;}
.login-btn:hover:not(:disabled){background:#ffc235;}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-err{color:var(--rd);font-size:13px;margin-top:12px;min-height:18px;text-align:center;}
.login-foot{margin-top:22px;padding-top:18px;border-top:1px solid var(--bdr);font-size:11px;color:var(--mu);text-align:center;line-height:1.6;}

/* WRAP */
.wrap{max-width:1280px;margin:0 auto;padding:20px;}
.empty-section{text-align:center;padding:60px 20px;color:var(--mu);}
.empty-section h2{font-size:18px;color:var(--tx);margin-bottom:8px;font-weight:600;}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.card-head{padding:14px 18px;background:var(--surf2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
.card-body{padding:18px;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--surf);border-radius:12px 12px 0 0;overflow:hidden;}
.tab{flex:1;padding:13px 0;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);transition:all .15s;}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);background:var(--surf2);}

/* FORM */
.section-pad{padding:14px 16px;}
.row-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;}
.btn{padding:8px 16px;border-radius:7px;border:none;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;}
.btn-p{background:var(--acc);color:#000;}.btn-p:hover{background:#ffc235;}
.btn-d{background:transparent;color:var(--rd);border:1px solid rgba(255,69,58,.4);}.btn-d:hover{background:rgba(255,69,58,.08);}
.btn-g{background:transparent;color:var(--mu);border:1px solid var(--bdr);}.btn-g:hover{border-color:var(--acc);color:var(--acc);}
.btn-sm{padding:4px 10px;font-size:11px;}

/* DASHBOARD */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding:16px;}
.dstat{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:14px;}
.dstat-num{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1;}
.dstat-lbl{font-size:11px;color:var(--mu);margin-top:5px;text-transform:uppercase;letter-spacing:.6px;}
.dash-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:0 16px 16px;}
.dteam{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;position:relative;}
.dteam:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,166,35,.12);}
.dteam::after{content:'›';position:absolute;top:14px;right:14px;color:var(--mu);font-size:18px;transition:transform .15s;}
.dteam:hover::after{color:var(--acc);transform:translateX(3px);}
.dteam-name{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.dteam-bar{display:flex;height:8px;border-radius:6px;overflow:hidden;margin-bottom:10px;background:var(--surf2);}
.dseg-p{background:var(--acc);}.dseg-w{background:var(--blu);}.dseg-d{background:var(--grn);}
.dteam-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--mu);}
.dteam-row b{color:var(--tx);font-family:var(--mono);}

/* ACCESS + MEMBERS */
.acc-group{margin-bottom:14px;}
.acc-team-label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;padding:4px 0 6px;}
.acc-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surf2);border-radius:7px;border:1px solid var(--bdr);margin-bottom:5px;}
.acc-date{font-family:var(--mono);font-size:13px;font-weight:500;}
.acc-note{flex:1;font-size:12px;color:var(--mu);}
.acc-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--mono);font-weight:600;}
.tag-f{background:rgba(52,199,89,.15);color:var(--grn);}
.tag-t{background:rgba(245,166,35,.15);color:var(--acc);}
.tag-p{background:rgba(120,120,120,.15);color:#888;}
.mem-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.mem-chip{background:rgba(74,158,255,.15);color:var(--blu);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.mem-chip button{background:none;border:none;color:var(--blu);cursor:pointer;font-size:13px;padding:0;line-height:1;}
.mem-existing{padding:10px 16px;border-top:1px solid var(--bdr);}

/* JOB TABLE */
.job-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:680px;}
thead th{padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;background:var(--surf2);border-bottom:1px solid var(--bdr);}
tbody tr{border-bottom:1px solid var(--bdr);}
tbody tr:hover{background:var(--surf2);}
td{padding:9px 12px;font-size:13px;vertical-align:middle;}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);}
.bp{background:rgba(245,166,35,.15);color:var(--acc);}
.bw{background:rgba(74,158,255,.15);color:var(--blu);}
.bd{background:rgba(52,199,89,.15);color:var(--grn);}
.lnk{color:var(--blu);text-decoration:none;font-weight:600;font-size:12px;cursor:pointer;}
.lnk:hover{text-decoration:underline;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.on{display:flex;}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal.large{max-width:560px;}
.map-box{height:380px;border-radius:0 0 14px 14px;}

/* LOADING / TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surf2);border:1px solid var(--bdr);color:var(--tx);border-radius:10px;padding:11px 18px;font-size:13px;z-index:300;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
.loading{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;gap:12px;flex-direction:column;z-index:400;color:#fff;font-size:14px;}
.loading.on{display:flex;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .75s linear infinite;}
.loading-row{text-align:center;padding:28px;color:var(--mu);font-size:13px;}

/* ── TECH Card งาน ── */
.t-count{display:inline-block;background:rgba(255,255,255,.1);padding:1px 7px;border-radius:10px;font-family:var(--mono);font-size:10px;margin-left:5px;}
.t-jobcard{
  background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;
  padding:12px 14px;margin-bottom:10px;
}
.t-jobcard.working{border-color:rgba(74,158,255,.4);background:rgba(74,158,255,.04);}
.t-jobcard.done{border-color:rgba(52,199,89,.3);background:rgba(52,199,89,.04);opacity:.85;}
.t-jobhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.t-jobnum{font-family:var(--mono);font-size:11px;color:var(--mu);font-weight:600;}
.t-jobname{font-size:14px;font-weight:700;color:var(--tx);line-height:1.3;margin-bottom:4px;}
.t-jobaddr{font-size:12px;color:var(--mu);margin-bottom:3px;line-height:1.4;}
.t-jobdesc{font-size:12px;color:var(--blu);margin-bottom:3px;line-height:1.4;}
.t-jobmeta{display:flex;gap:14px;font-size:12px;margin-top:4px;flex-wrap:wrap;}
.t-jobtime{font-size:11px;color:var(--grn);margin-top:4px;}
.t-jobnote{
  background:rgba(245,166,35,.1);border-left:3px solid var(--acc);
  padding:6px 10px;font-size:12px;color:var(--acc);margin-top:8px;border-radius:0 6px 6px 0;
}
.t-jobbtns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}

/* ── Records (📐 จดขนาด) ── */
.rec-toolbar{display:flex;gap:8px;align-items:center;padding:12px 16px;flex-wrap:wrap;border-bottom:1px solid var(--bdr);}
.rec-search{flex:1;min-width:160px;}
.rec-list{padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.rec-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;transition:all .15s;}
.rec-card:hover{border-color:var(--acc);transform:translateY(-1px);}
.rec-card.deleted{opacity:.55;border-style:dashed;}
.rec-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
.rec-id{font-family:var(--mono);font-size:10px;color:var(--mu);}
.rec-when{font-size:10px;color:var(--mu);text-align:right;}
.rec-cust{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px;}
.rec-meta{font-size:11px;color:var(--mu);margin-bottom:8px;display:flex;gap:10px;flex-wrap:wrap;}
.rec-meta b{color:var(--tx);font-weight:600;}
.rec-link{display:inline-block;background:rgba(74,158,255,.12);color:var(--blu);padding:2px 8px;border-radius:10px;font-size:11px;font-family:var(--mono);}
.rec-btns{display:flex;gap:5px;flex-wrap:wrap;}
.rec-btns .btn{font-size:11px;padding:5px 10px;}

/* ── Record Form Modal ── */
.recm-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:600;display:none;}
.recm-bg.on{display:flex;justify-content:center;}
.recm-wrap{width:100%;max-width:760px;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
.recm-head{position:sticky;top:0;background:var(--surf);border-bottom:1px solid var(--bdr);padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:5;}
.recm-title{flex:1;font-size:15px;font-weight:700;color:var(--tx);}
.recm-body{padding:16px 18px;flex:1;overflow-y:auto;}
.recm-save-bar{position:sticky;bottom:0;background:var(--surf);border-top:1px solid var(--bdr);padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:5;}
.recm-section{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:14px;}
.recm-section-head{font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.recm-entry{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:12px;}
.recm-entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr);}
.recm-entry-num{font-size:12px;font-weight:700;color:var(--acc);font-family:var(--mono);}
.recm-size-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.recm-size-row .fg{margin:0;}
.recm-check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:8px;}
.recm-check{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--surf);border:1px solid var(--bdr);border-radius:6px;cursor:pointer;font-size:12px;user-select:none;}
.recm-check:hover{border-color:var(--acc);}
.recm-check input{margin:0;cursor:pointer;width:14px;height:14px;}
.recm-check.checked{background:rgba(245,166,35,.1);border-color:var(--acc);color:var(--acc);}
.recm-rang-row{display:flex;gap:8px;margin-top:6px;}
.recm-rang-row .recm-check{flex:1;}
.recm-add-btn{width:100%;padding:14px;background:rgba(245,166,35,.06);border:2px dashed var(--acc);border-radius:10px;color:var(--acc);font-weight:600;cursor:pointer;font-size:13px;transition:all .15s;}
.recm-add-btn:hover{background:rgba(245,166,35,.15);}
.recm-save-status{flex:1;font-size:11px;color:var(--mu);}
.recm-readonly input,.recm-readonly textarea,.recm-readonly select{pointer-events:none;opacity:.8;}
.recm-readonly .recm-check{pointer-events:none;opacity:.85;}
.recm-readonly .recm-rm-entry,.recm-readonly .recm-add-btn{display:none;}
.recm-rm-entry{background:none;border:1px solid var(--rd);color:var(--rd);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;}
.recm-rm-entry:hover{background:var(--rd);color:#fff;}

/* ── A4 Export Template (hidden, used for html2canvas) ── */
.a4-export-host{position:fixed;left:-99999px;top:0;width:794px;background:#fff;color:#1e3a5f;font-family:'Sarabun',sans-serif;}
.a4-page{width:794px;height:1123px;padding:40px 50px;box-sizing:border-box;background:#fff;display:flex;flex-direction:column;page-break-after:always;}
.a4-header{border-bottom:3px solid #1e6fb8;padding-bottom:14px;margin-bottom:18px;}
.a4-title{font-size:22px;font-weight:700;color:#1e3a5f;text-align:center;margin-bottom:10px;letter-spacing:1px;}
.a4-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:13px;color:#333;}
.a4-meta-row{display:flex;gap:6px;}
.a4-meta-label{font-weight:600;color:#1e3a5f;min-width:70px;}
.a4-meta-val{color:#000;}
.a4-entries{flex:1;display:flex;flex-direction:column;gap:10px;}
.a4-entry{border:1.5px solid #c0c7d0;border-radius:8px;padding:10px 14px;background:#fafbfc;}
.a4-entry-head{display:flex;align-items:baseline;gap:10px;border-bottom:1px solid #d0d7de;padding-bottom:6px;margin-bottom:8px;}
.a4-entry-num{font-size:18px;font-weight:700;color:#1e6fb8;font-family:'IBM Plex Mono',monospace;}
.a4-entry-loc{font-size:15px;font-weight:600;color:#1e3a5f;}
.a4-size-box{display:inline-block;background:#fff;border:2px solid #1e6fb8;border-radius:6px;padding:6px 12px;font-size:16px;font-weight:700;color:#1e6fb8;font-family:'IBM Plex Mono',monospace;margin:4px 0;}
.a4-size-label{font-size:10px;color:#888;font-weight:400;display:block;margin-top:-2px;}
.a4-row{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;font-size:12px;}
.a4-tag{display:inline-block;background:#e7f0f8;border:1px solid #b8d4ec;color:#1e3a5f;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:500;margin:2px 2px 0 0;}
.a4-tag.muang{background:#fff4e6;border-color:#f5cba7;color:#8b4513;}
.a4-tag.krachok{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32;}
.a4-tag.rang{background:#fce4ec;border-color:#f48fb1;color:#880e4f;}
.a4-detail{font-size:12px;color:#555;margin-top:4px;font-style:italic;background:#fffef0;border-left:3px solid #f5a623;padding:4px 8px;border-radius:0 4px 4px 0;}
.a4-footer{margin-top:auto;padding-top:10px;border-top:1px solid #ccc;font-size:11px;color:#888;display:flex;justify-content:space-between;}

/* ── BOOKING tab ── */
.bk-type-btn, .bk-mode-btn{
  flex:1;padding:11px 16px;border-radius:8px;border:1px solid var(--bdr);
  background:var(--bg);color:var(--mu);font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--sans);transition:all .15s;
}
.bk-type-btn:hover, .bk-mode-btn:hover{border-color:var(--acc);color:var(--tx);}
.bk-type-btn.on, .bk-mode-btn.on{
  background:rgba(245,166,35,.12);border-color:var(--acc);color:var(--acc);
}
.bk-recent-item{
  background:rgba(52,199,89,.07);border:1px solid rgba(52,199,89,.3);
  border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.bk-recent-item .bk-id{font-family:var(--mono);color:var(--grn);font-weight:700;}
.bk-recent-item .bk-meta{color:var(--mu);font-size:12px;}

/* ── DATE INPUT (custom display dd/mm/yy) ── */
.date-wrap{position:relative;display:inline-block;width:100%;}
.date-wrap input[type="date"]{
  width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;
  padding:10px 12px;font-size:13px;font-family:var(--sans);color:transparent;
  cursor:pointer;caret-color:transparent;
}

<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
// ════════════════════════════════════════
//  CONFIG — Worker URL + Secret
//  ⚠️ ตั้งให้ตรงกับ Cloudflare Worker ของคุณ
// ════════════════════════════════════════
const WORKER_URL   = 'https://pk-discord-relay.revenge2288.workers.dev';
const API          = 'https://pk-discord-relay.revenge2288.workers.dev/api';
const API_SECRET   = '2389';   // ค่าเดียวกับ PK_SECRET ใน Cloudflare Worker

let CURRENT_USER = null;
let _teams=[], _salesTeams=[], _accessDates=[], _allMembers=[], _memDraft=[], _mapObj=null;

// ════════════════════════════════════════
//  API CALL — auto-attach token + secret
// ════════════════════════════════════════
async function call(body){
  // Auto-attach username + token (ยกเว้น pk_login ที่ส่ง username/password)
  if (CURRENT_USER && body.action !== 'pk_login') {
    if (body.username == null) body.username = CURRENT_USER.username;
    if (body.token == null)    body.token    = CURRENT_USER.token;
  }
  try {
    const r = await fetch(API, {
      method: 'POST',
      redirect: 'follow',
      headers: {
        'Content-Type': 'application/json',
        'X-PK-Secret': API_SECRET
      },
      body: JSON.stringify(body)
    });
    const data = await r.json();

    // ถ้า server บอกว่า session ไม่ valid → kick กลับหน้า login
    if (data && data.ok === false && data.error &&
        (data.error.indexOf('session') !== -1 ||
         data.error.indexOf('login ใหม่') !== -1 ||
         data.error.indexOf('user ถูก') !== -1)) {
      if (CURRENT_USER) {
        // อย่า kick ตอน checkSession ปกติ — มันจัดการเอง
        if (body.action !== 'pk_checkSession') {
          toast('⚠️ ' + data.error);
          setTimeout(() => {
            localStorage.removeItem('pk_user');
            location.reload();
          }, 1500);
        }
      }
    }
    return data;
  } catch(e) { toast('❌ เชื่อมต่อไม่ได้'); throw e; }
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  ['lgUser','lgPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });

  // ESC ปิด modal บนสุดที่เปิดอยู่
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    // หา modal ที่ on อยู่ — เลือกตัวที่ z-index สูงสุด (รูปก่อน team detail)
    const photoModals = ['tPhotoModal','officePhotoModal'];
    for (const id of photoModals) {
      const m = document.getElementById(id);
      if (m && m.classList.contains('on')) { m.classList.remove('on'); return; }
    }
    const others = ['teamDetailModal','tDoneModal','mapModal'];
    for (const id of others) {
      const m = document.getElementById(id);
      if (m && m.classList.contains('on')) { m.classList.remove('on'); return; }
    }
  });

  const savedUser = localStorage.getItem('pk_user');
  if (savedUser) {
    try {
      const u = JSON.parse(savedUser);
      if (u.username && u.token) {
        showLoad('กำลังตรวจสอบ session...');
        // ตอนเช็ค session — ส่ง username/token แบบ explicit ไม่ผ่าน CURRENT_USER
        const r = await call({ action:'pk_checkSession', username:u.username, token:u.token });
        hideLoad();
        if (r.ok && r.valid) { CURRENT_USER = { ...u, ...r.user }; enterApp(); return; }
        localStorage.removeItem('pk_user');
        if (r && r.error) toast(r.error);
      }
    } catch(e) { localStorage.removeItem('pk_user'); }
  }
});

// ════════════════════════════════════════
//  LOGIN / LOGOUT
// ════════════════════════════════════════
async function doLogin(){
  const username = document.getElementById('lgUser').value.trim();
  const password = document.getElementById('lgPass').value;
  const err = document.getElementById('lgErr');
  err.textContent = '';
  if (!username || !password) { err.textContent = 'กรอกข้อมูลให้ครบ'; return; }
  const btn = document.getElementById('lgBtn');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  try {
    const r = await call({ action:'pk_login', username, password });
    if (r.ok) {
      CURRENT_USER = { username:r.user.username, role:r.user.role, name:r.user.name, token:r.token };
      localStorage.setItem('pk_user', JSON.stringify(CURRENT_USER));
      enterApp();
    } else err.textContent = r.error || 'เข้าสู่ระบบไม่สำเร็จ';
  } catch(e) { err.textContent = 'เชื่อมต่อไม่ได้: ' + e.message; }
  finally { btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; }
}
function logout(){
  if (!confirm('ออกจากระบบ?')) return;
  localStorage.removeItem('pk_user');
  if (window._pkSessionInterval) clearInterval(window._pkSessionInterval);
  CURRENT_USER = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('lgUser').value = '';
  document.getElementById('lgPass').value = '';
  document.getElementById('lgErr').textContent = '';
}

// ════════════════════════════════════════
//  ENTER APP
// ════════════════════════════════════════
function enterApp(){
  if (!CURRENT_USER) return;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';

  const roleLabel = { office:'ออฟฟิศ', sales:'เซลล์', tech:'ช่าง' }[CURRENT_USER.role] || CURRENT_USER.role;
  document.getElementById('hdrRoleLabel').textContent = '· ' + roleLabel;
  document.getElementById('hdrName').textContent = CURRENT_USER.name || CURRENT_USER.username;
  const badge = document.getElementById('hdrRoleBadge');
  badge.className = 'role-badge role-' + CURRENT_USER.role;
  badge.textContent = roleLabel.toUpperCase();

  const c = document.getElementById('roleContent');
  if (CURRENT_USER.role === 'office')      { c.innerHTML = renderOfficeShell(); officeInit(); }
  else if (CURRENT_USER.role === 'sales')  { c.innerHTML = renderSalesStub();   _showRefreshForSales(); }
  else if (CURRENT_USER.role === 'tech')   {
    c.innerHTML = renderTechStub();
    if (CURRENT_USER.team) {
      document.getElementById('btnRefresh').style.display = '';
      document.getElementById('btnRefresh').onclick = initTech;
      initTech();
    } else {
      document.getElementById('btnRefresh').style.display = 'none';
    }
  }
  else                                      c.innerHTML = '<div class="empty-section"><h2>ไม่รู้จัก role</h2></div>';

  if (window._pkSessionInterval) clearInterval(window._pkSessionInterval);
  window._pkSessionInterval = setInterval(async () => {
    try {
      const r = await call({ action:'pk_checkSession', username:CURRENT_USER.username, token:CURRENT_USER.token });
      if (!r.valid) {
        clearInterval(window._pkSessionInterval);
        toast('❌ ' + (r.error || 'Session ถูกยกเลิก'));
        setTimeout(() => { localStorage.removeItem('pk_user'); location.reload(); }, 2000);
      }
    } catch(e) {}
  }, 60000);
}

function officeInit(){
  const today = new Date().toISOString().split('T')[0];
  ['dashDate','jDate'].forEach(id => { const el = document.getElementById(id); if (el) el.value = today; });
  refreshAllDateDisplays();
  reloadAll();
}

async function reloadAll(){
  if (CURRENT_USER && CURRENT_USER.role !== 'office') return;
  document.getElementById('syncTxt').textContent = 'กำลังโหลด...';
  try {
    const b = await call({ action:'pk_bootstrap' });
    _teams = b.teams || [];
    _salesTeams = b.salesTeams || [];
    _accessDates = b.access || [];
    _allMembers = b.members || [];
    fillTeamDropdowns();
    renderAccess();
    document.getElementById('syncTxt').textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH',{timeStyle:'short'});
    if (document.getElementById('tabDash') && document.getElementById('tabDash').style.display !== 'none') loadDashboard();
  } catch(e) { document.getElementById('syncTxt').textContent = '❌ โหลดไม่ได้'; }
}

function fillTeamDropdowns(){
  const at = document.getElementById('accTeam');
  if (at) {
    const v = at.value; at.innerHTML = '';
    _teams.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; at.appendChild(o); });
    if (v) at.value = v;
  }
  const jt = document.getElementById('jTeam');
  if (jt) {
    const jv = jt.value;
    jt.innerHTML = '<option value="__ALL__">ทุกทีม</option>';
    _teams.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; jt.appendChild(o); });
    if (jv) jt.value = jv;
  }
  // bkTeam ใช้ฟังก์ชันแยก เพราะต้องเปลี่ยนตาม _bkType
  fillBookingTeam();
}

// เติม dropdown ทีมในแท็บลงคิว ตามประเภทปัจจุบัน
function fillBookingTeam(){
  const bt = document.getElementById('bkTeam');
  if (!bt) return;
  const list = (typeof _bkType !== 'undefined' && _bkType === 'measure') ? _salesTeams : _teams;
  const label = (typeof _bkType !== 'undefined' && _bkType === 'measure') ? 'เซลล์' : 'ช่าง';
  bt.innerHTML = '<option value="">— ไม่ระบุ —</option>';
  if (!list.length) {
    const o = document.createElement('option');
    o.disabled = true; o.textContent = `(ยังไม่มีทีม${label}ในระบบ)`;
    bt.appendChild(o);
    return;
  }
  list.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; bt.appendChild(o); });
}

function setTab(t, btn){
  ['Dash','Access','Booking','Jobs','Records','Quotes'].forEach(x => {
    const el = document.getElementById('tab'+x); if (el) el.style.display = 'none';
  });
  const tgt = document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
  if (tgt) tgt.style.display = 'block';
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if (t === 'dash') loadDashboard();
  if (t === 'booking') initBookingTab();
  if (t === 'records') recordsInit();
  if (t === 'quotes') quotesInit();
}

// ════════════════════════════════════════
//  BOOKING (ลงคิวใหม่)
// ════════════════════════════════════════
let _bkType = 'install';  // measure | install
let _bkMode = 'form';     // form | raw
let _bkRecent = [];

async function initBookingTab(){
  // set วันที่เป็นวันนี้ ถ้ายังว่าง
  const dt = document.getElementById('bkDate');
  if (dt && !dt.value) {
    dt.value = new Date().toISOString().split('T')[0];
    updateDateDisplay(dt);
  }
  // ถ้า _teams ยังว่าง ให้โหลดก่อน
  if (!_teams.length && !_salesTeams.length) {
    try {
      const b = await call({ action:'pk_bootstrap' });
      _teams = b.teams || [];
      _salesTeams = b.salesTeams || [];
      _accessDates = b.access || [];
      _allMembers = b.members || [];
    } catch(e) {}
  }
  // เติม dropdown ทุกครั้ง (ให้ค่าล่าสุดเสมอ)
  fillTeamDropdowns();
  // เติม bkTeam ตามประเภทปัจจุบัน
  fillBookingTeam();
}

function setBookingType(t){
  _bkType = t;
  document.getElementById('bkTypeMeasure').classList.toggle('on', t==='measure');
  document.getElementById('bkTypeInstall').classList.toggle('on', t==='install');
  // เปลี่ยน dropdown ทีมตามประเภท
  fillBookingTeam();
}
function setBookingMode(m){
  _bkMode = m;
  document.getElementById('bkModeForm').classList.toggle('on', m==='form');
  document.getElementById('bkModeRaw').classList.toggle('on', m==='raw');
  document.getElementById('bkForm').style.display = (m==='form') ? 'block' : 'none';
  document.getElementById('bkRaw').style.display = (m==='raw') ? 'block' : 'none';
}

async function submitBooking(){
  const body = { action:'pk_addBooking', type:_bkType };

  if (_bkMode === 'form') {
    const date     = document.getElementById('bkDate').value;
    const customer = document.getElementById('bkCustomer').value.trim();
    const address  = document.getElementById('bkAddress').value.trim();
    const job      = document.getElementById('bkJob').value.trim();
    const score    = document.getElementById('bkScore').value;
    const amount   = document.getElementById('bkAmount').value;
    const team     = document.getElementById('bkTeam').value;
    if (!date || !customer) { toast('กรอก วันที่ และ ชื่อลูกค้า'); return; }
    Object.assign(body, { date, customer, address, job, score, amount, team });
  } else {
    const raw = document.getElementById('bkRawText').value.trim();
    if (!raw) { toast('พิมพ์ข้อมูลก่อน'); return; }
    body.raw = raw;
  }

  showLoad('กำลังบันทึก...');
  try {
    const r = await call(body);
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error || 'ผิดพลาด')); return; }
    toast(`✅ ลงคิว ${r.sheet} #${r.id} สำเร็จ`);
    addRecentBooking(r);
    clearBookingForm();
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

function addRecentBooking(r){
  _bkRecent.unshift(r);
  if (_bkRecent.length > 5) _bkRecent.pop();
  renderRecentBookings();
}
function renderRecentBookings(){
  const w = document.getElementById('bkRecent');
  if (!w) return;
  if (!_bkRecent.length) { w.innerHTML = ''; return; }
  w.innerHTML = `<div style="font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">บันทึกล่าสุด (รอบนี้)</div>` +
    _bkRecent.map(r => `
      <div class="bk-recent-item">
        <span class="bk-id">${r.sheet} #${r.id}</span>
        <span>${r.customer}</span>
        <span class="bk-meta">${r.date}${r.team?' · '+r.team:''} · ฿${fmt(r.amount)} · รอ CF</span>
      </div>
    `).join('');
}

function clearBookingForm(){
  if (_bkMode === 'form') {
    document.getElementById('bkCustomer').value = '';
    document.getElementById('bkAddress').value = '';
    document.getElementById('bkJob').value = '';
    document.getElementById('bkScore').value = '1';
    document.getElementById('bkAmount').value = '';
    document.getElementById('bkTeam').value = '';
  } else {
    document.getElementById('bkRawText').value = '';
  }
}

// ─── DASHBOARD ───
async function loadDashboard(){
  const date = document.getElementById('dashDate').value;
  if (!date) { document.getElementById('dashContent').innerHTML='<div class="loading-row">เลือกวันที่ก่อน</div>'; return; }
  document.getElementById('dashContent').innerHTML='<div class="loading-row">กำลังโหลด...</div>';
  try {
    const r = await call({ action:'pk_dashboard', date });
    if (!r.ok) { document.getElementById('dashContent').innerHTML='<div class="loading-row">'+r.error+'</div>'; return; }
    const s = r.summary;
    if (s.totalJobs === 0) { document.getElementById('dashContent').innerHTML='<div class="loading-row">ไม่มีงานในวันที่ '+fmtD(date)+'</div>'; return; }
    let html = `<div class="dash-stats">
      <div class="dstat"><div class="dstat-num">${s.totalJobs}</div><div class="dstat-lbl">งานทั้งหมด</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--acc)">${s.cntPending}</div><div class="dstat-lbl">รอรับงาน</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--blu)">${s.cntWorking}</div><div class="dstat-lbl">กำลังทำ</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--grn)">${s.cntDone}</div><div class="dstat-lbl">✅ จบงาน</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--acc)">${s.cntContinue||0}</div><div class="dstat-lbl">➡ ต่องาน</div></div>
      <div class="dstat"><div class="dstat-num" style="color:var(--grn);font-size:18px;">฿${fmt(s.totalAmt)}</div><div class="dstat-lbl">ยอดเงินรวม</div></div>
    </div><div class="dash-team-grid">`;
    r.teams.forEach(t => {
      const tot = t.jobs || 1;
      const pp = (t.pending||0)/tot*100, pw=(t.working||0)/tot*100, pd=(t.done||0)/tot*100;
      html += `<div class="dteam" onclick="showTeamDetail('${t.team.replace(/'/g,"\\'")}','${date}')">
        <div class="dteam-name">👷 ${t.team}</div>
        <div class="dteam-bar"><div class="dseg-p" style="width:${pp}%"></div><div class="dseg-w" style="width:${pw}%"></div><div class="dseg-d" style="width:${pd}%"></div></div>
        <div class="dteam-row"><span>งานทั้งหมด</span><b>${t.jobs}</b></div>
        <div class="dteam-row"><span style="color:var(--acc)">รอรับงาน</span><b>${t.pending||0}</b></div>
        <div class="dteam-row"><span style="color:var(--blu)">กำลังทำ</span><b>${t.working||0}</b></div>
        <div class="dteam-row"><span style="color:var(--grn)">✅ จบงาน</span><b>${t.done||0}</b></div>
        <div class="dteam-row"><span style="color:var(--acc)">➡ ต่องาน</span><b>${t.continued||0}</b></div>
        <div class="dteam-row" style="border-top:1px solid var(--bdr);margin-top:6px;padding-top:6px;"><span>ยอดเงิน</span><b style="color:var(--grn)">฿${fmt(t.amount)}</b></div>
      </div>`;
    });
    html += '</div>';
    document.getElementById('dashContent').innerHTML = html;
  } catch(e) { document.getElementById('dashContent').innerHTML='<div class="loading-row">โหลดไม่ได้</div>'; }
}

// ─── Team Detail Modal — กด card ทีมใน Dashboard → ดูงานของทีมนั้น ───
async function showTeamDetail(team, date){
  const m = document.getElementById('teamDetailModal');
  const b = document.getElementById('tdmBody');
  document.getElementById('tdmTitle').textContent = `👷 ${team} · ${fmtD(date)}`;
  b.innerHTML = '<div class="loading-row">กำลังโหลด...</div>';
  m.classList.add('on');

  try {
    const r = await call({ action:'pk_getJobs', team, date });
    if (!r.ok) { b.innerHTML = '<div class="loading-row">'+(r.error||'โหลดไม่ได้')+'</div>'; return; }
    const jobs = r.jobs || [];
    if (!jobs.length) { b.innerHTML = '<div class="loading-row">ไม่มีงานในวันนี้</div>'; return; }

    // จัดกลุ่ม
    const pending  = jobs.filter(j => j.status === 'pending');
    const working  = jobs.filter(j => j.status === 'working');
    const doneOnly = jobs.filter(j => j.status === 'done' && !j.continueNote);
    const continued = jobs.filter(j => j.status === 'done' && j.continueNote);

    const totalAmt = jobs.reduce((s,j) => s + (Number(j.amount)||0), 0);

    let html = `
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;">
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;">${jobs.length}</div><div class="dstat-lbl">งานทั้งหมด</div></div>
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;color:var(--acc);">${pending.length}</div><div class="dstat-lbl">รอรับงาน</div></div>
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;color:var(--blu);">${working.length}</div><div class="dstat-lbl">กำลังทำ</div></div>
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;color:var(--grn);">${doneOnly.length}</div><div class="dstat-lbl">✅ จบ</div></div>
        <div class="dstat" style="padding:10px;"><div class="dstat-num" style="font-size:18px;color:var(--acc);">${continued.length}</div><div class="dstat-lbl">➡ ต่องาน</div></div>
      </div>
      <div style="text-align:right;font-size:12px;color:var(--mu);margin-bottom:14px;">ยอดเงินรวม: <b style="color:var(--grn);font-size:14px;">฿${fmt(totalAmt)}</b></div>
    `;

    // render กลุ่ม
    const groups = [
      { title:'⏳ รอรับงาน', list:pending,   color:'var(--acc)' },
      { title:'🔧 กำลังทำ',  list:working,   color:'var(--blu)' },
      { title:'✅ จบงาน',    list:doneOnly,  color:'var(--grn)' },
      { title:'➡ ต่องาน',    list:continued, color:'var(--acc)' },
    ];

    groups.forEach(g => {
      if (!g.list.length) return;
      html += `<div style="margin-bottom:14px;">
        <div style="font-size:12px;font-weight:700;color:${g.color};text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;border-left:3px solid ${g.color};padding-left:8px;">
          ${g.title} <span style="color:var(--mu);">(${g.list.length})</span>
        </div>`;

      g.list.forEach(j => {
        const doneTime = j.doneAt ? new Date(Number(j.doneAt)).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'}) : '';
        html += `<div style="background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:6px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;">
            <div style="flex:1;min-width:200px;">
              <div style="font-family:var(--mono);font-size:10px;color:var(--mu);">${j.orderLabel} · ${j.id}</div>
              <div style="font-weight:600;font-size:13px;margin-top:2px;">${j.name||'-'}</div>
              ${j.address?`<div style="font-size:11px;color:var(--mu);margin-top:2px;">📍 ${j.address}</div>`:''}
              ${j.description?`<div style="font-size:11px;color:var(--blu);margin-top:2px;">🔧 ${j.description}</div>`:''}
            </div>
            <div style="text-align:right;font-size:11px;">
              ${j.amount?`<div style="color:var(--acc);font-family:var(--mono);font-weight:600;">฿${fmt(j.amount)}</div>`:''}
              ${j.worker?`<div style="color:var(--blu);margin-top:2px;">👤 ${j.worker}</div>`:''}
              ${doneTime?`<div style="color:var(--grn);margin-top:2px;">⏱ ${doneTime}</div>`:''}
            </div>
          </div>
          ${j.continueNote?`<div style="background:rgba(245,166,35,.1);border-left:3px solid var(--acc);padding:5px 8px;font-size:11px;color:var(--acc);margin-top:6px;border-radius:0 4px 4px 0;">📝 ${j.continueNote}</div>`:''}
          ${j.photos&&j.photos.length?`<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;">${j.photos.map((p,i)=>`<img src="${fixDriveUrl(p)}" referrerpolicy="no-referrer" style="width:42px;height:42px;object-fit:cover;border-radius:4px;border:1px solid var(--bdr);cursor:pointer;" onclick="showTdmPhoto('${j.id}',${i})" onerror="this.style.opacity='.3'">`).join('')}</div>`:''}
        </div>`;
      });
      html += '</div>';
    });

    b.innerHTML = html;
    // เก็บ jobs ไว้สำหรับเปิดรูป
    window._tdmJobs = jobs;
  } catch(e) {
    b.innerHTML = '<div class="loading-row">โหลดไม่ได้</div>';
  }
}

function showTdmPhoto(jobId, photoIdx){

  if (!j || !j.photos || !j.photos[photoIdx]) return;
  _officePhotoJob = j;
  _officePhotoIdx = photoIdx;
  renderOfficePhoto();
  document.getElementById('officePhotoModal').classList.add('on');
}

document.getElementById('teamDetailModal').addEventListener('click', e => {

// ─── ACCESS + MEMBERS ───
function addMemChip(){
  const inp = document.getElementById('memInput');
  const v = inp.value.trim();
  if (!v) return;
  if (!_memDraft.includes(v)) _memDraft.push(v);
  inp.value = '';
  renderMemChips();
}
function renderMemChips(){
  document.getElementById('memChips').innerHTML = _memDraft.map((m,i)=>`<div class="mem-chip">${m}<button onclick="_memDraft.splice(${i},1);renderMemChips()">×</button></div>`).join('') || '<span style="font-size:12px;color:var(--mu)">ยังไม่ได้เพิ่มชื่อ (เว้นว่างได้)</span>';
}
function saveQueue(){
  const team = document.getElementById('accTeam').value;
  const date = document.getElementById('accDate').value;
  const note = document.getElementById('accNote').value.trim();
  if (!team || !date) { toast('เลือกทีมและวันที่'); return; }
  call({ action:'pk_setQueue', team, date, note, members:_memDraft }).then(r => {
    if (r.ok) {
      toast('✓ บันทึกคิว '+team+' '+fmtD(date)+(_memDraft.length?` · ${_memDraft.length} คน`:''));
      _accessDates = _accessDates.filter(a => !(a.team===team && a.date===date));
      _accessDates.push({team,date,note});
      if (_memDraft.length) {
        _allMembers = _allMembers.filter(m => !(m.team===team && m.date===date));
        _allMembers.push({team,date,members:[..._memDraft]});
      }
      _memDraft = [];
      renderMemChips();
      renderAccess();
      document.getElementById('accNote').value = '';
    } else toast(r.error || 'ผิดพลาด');
  });
}
function removeAccess(team, date){
  if (!confirm(`ลบคิว ${team} วันที่ ${fmtD(date)}?\n(ช่างจะเข้าดูวันนี้ไม่ได้อีก)`)) return;
  call({ action:'pk_removeAccessDate', team, date }).then(r => {
    if (r.ok) { toast('ลบแล้ว'); _accessDates = _accessDates.filter(a => !(a.team===team && a.date===date)); renderAccess(); }
    else toast(r.error || 'ผิดพลาด');
  });
}
function editQueue(team, date){
  const a = _accessDates.find(x => x.team===team && x.date===date);
  const m = _allMembers.find(x => x.team===team && x.date===date);
  document.getElementById('accTeam').value = team;
  document.getElementById('accDate').value = date;
  document.getElementById('accNote').value = (a && a.note) || '';
  _memDraft = m ? [...m.members] : [];
  renderMemChips();
  window.scrollTo({top:0,behavior:'smooth'});
  toast('โหลดข้อมูลมาแก้ไข — กดบันทึกเมื่อเสร็จ');
}
function renderAccess(){
  const w = document.getElementById('accList');
  if (!w) return;
  if (!_accessDates.length) { w.innerHTML='<div class="loading-row">ยังไม่มีคิวที่กำหนด</div>'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const byTeam = {};
  [..._accessDates].sort((a,b) => a.date.localeCompare(b.date)).forEach(a => {
    if (!byTeam[a.team]) byTeam[a.team] = [];
    byTeam[a.team].push(a);
  });
  w.innerHTML = Object.entries(byTeam).map(([team,list]) => `
    <div class="acc-group"><div class="acc-team-label">${team}</div>
    ${list.map(a => {
      const d = new Date(a.date); d.setHours(0,0,0,0);
      const diff = Math.round((d-today)/86400000);
      const tag = diff<0 ? '<span class="acc-tag tag-p">ผ่านแล้ว</span>' : diff===0 ? '<span class="acc-tag tag-t">วันนี้</span>' : `<span class="acc-tag tag-f">อีก ${diff} วัน</span>`;
      const mem = _allMembers.find(m => m.team===team && m.date===a.date);
      const memHtml = mem && mem.members.length ? `<div style="font-size:11px;color:var(--blu);margin-top:4px;">👥 ${mem.members.join(', ')}</div>` : '<div style="font-size:11px;color:var(--mu);margin-top:4px;">— ไม่ระบุชื่อสมาชิก —</div>';
      return `<div class="acc-row" style="flex-wrap:wrap;">
        <div class="acc-date">${fmtD(a.date)}</div>
        <div class="acc-note">${a.note||''}</div>
        ${tag}
        <button class="btn btn-g btn-sm" onclick="editQueue('${a.team}','${a.date}')">แก้ไข</button>
        <button class="btn btn-d btn-sm" onclick="removeAccess('${a.team}','${a.date}')">ลบ</button>
        <div style="flex-basis:100%;">${memHtml}</div>
      </div>`;
    }).join('')}</div>`).join('');
}

// ─── JOB TABLE ───
async function loadJobTable(){
  const team = document.getElementById('jTeam').value;
  const date = document.getElementById('jDate').value;
  const status = document.getElementById('jStatus').value;
  const tb = document.getElementById('jTbody');
  if (!date) { tb.innerHTML='<tr><td colspan="9" class="loading-row">เลือกวันที่ก่อน</td></tr>'; return; }
  tb.innerHTML = '<tr><td colspan="9" class="loading-row">กำลังโหลด...</td></tr>';
  try {
    let allJobs = [];
    if (team === '__ALL__') {
      for (const t of _teams) {
        const r = await call({ action:'pk_getJobs', team:t, date });
        if (r.ok && r.jobs) allJobs = allJobs.concat(r.jobs.map(j => ({...j, _team:t})));
      }
    } else {
      const r = await call({ action:'pk_getJobs', team, date });
      if (r.ok && r.jobs) allJobs = r.jobs.map(j => ({...j, _team:team}));
    }
    if (status) allJobs = allJobs.filter(j => j.status === status);
    if (!allJobs.length) { tb.innerHTML='<tr><td colspan="9" class="loading-row">ไม่มีรายการงาน</td></tr>'; return; }
    const sl = {pending:'bp',working:'bw',done:'bd'};
    const ll = {pending:'รอรับงาน',working:'กำลังทำ',done:'เสร็จแล้ว'};
    window._officeJobs = allJobs;  // เก็บไว้สำหรับ showOfficePhoto
    tb.innerHTML = allJobs.map((j, idx) => `<tr>
      <td style="font-family:var(--mono);font-size:11px;color:var(--mu);">${j.orderLabel}</td>
      <td><div style="font-weight:600;font-size:13px;">${j.name}</div><div style="font-size:11px;color:var(--mu);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${j.address}">${j.address}</div></td>
      <td style="font-size:12px;">${j._team}</td>
      <td style="font-size:12px;color:${j.worker?'var(--blu)':'var(--mu)'};">${j.worker||'-'}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--acc);">${j.amount?'฿'+fmt(j.amount):'-'}</td>
      <td><span class="badge ${sl[j.status]||'bp'}">${ll[j.status]||j.status}</span></td>
      <td>${j.lat?`<a class="lnk" onclick="showMap(${j.lat},${j.lng},'${j.name.replace(/'/g,'')}','${(j.doneAt||'')}')">📍 ดูจุดจบงาน</a>`:(j.mapLink?`<a class="lnk" href="${j.mapLink}" target="_blank">🗺 ที่อยู่งาน</a>`:'-')}</td>
      <td>${j.photos && j.photos.length ? `<a class="lnk" onclick="showOfficePhoto(${idx})">📷 ดู ${j.photos.length} รูป</a>` : '-'}</td>
      <td id="jrec-${idx}" style="font-size:11px;color:var(--mu);">…</td>
    </tr>`).join('');
    // โหลด record counts (async ไม่บล็อก)
    loadRecordCountsForJobs(allJobs);
  } catch(e) { tb.innerHTML='<tr><td colspan="9" class="loading-row">โหลดไม่ได้</td></tr>'; }
}

// โหลดจำนวน records ของแต่ละงาน + เซลล์อัปเดต
async function loadRecordCountsForJobs(jobs){
  // อ่าน records ทั้งหมดของผู้ใช้ปัจจุบันครั้งเดียว แล้ว match
  try {
    const r = await call({ action:'pk_recordList', limit: 200 });
    if (!r.ok) return;
    const byJob = {};
    (r.records||[]).forEach(rec => {
      if (rec.linkedJobId && !rec.deletedAt) {
        if (!byJob[rec.linkedJobId]) byJob[rec.linkedJobId] = [];
        byJob[rec.linkedJobId].push(rec);
      }
    });
    jobs.forEach((j, idx) => {
      const cell = document.getElementById('jrec-' + idx);
      if (!cell) return;
      const recs = byJob[j.id] || [];
      if (recs.length === 0) {
        cell.innerHTML = '<a class="lnk" onclick="openCreateRecordForJob(' + idx + ')" style="color:var(--mu);">+ จด</a>';
      } else {
        cell.innerHTML = '<a class="lnk" onclick="openJobRecords(' + idx + ')">📐 ดู ' + recs.length + ' รายการ</a>';
        cell.dataset.records = JSON.stringify(recs.map(r => r.id));
      }
    });
  } catch(e) {}
}

// office: เปิดรายการ records ของงานนั้น
async function openJobRecords(jobIdx){
  const j = window._officeJobs[jobIdx];
  if (!j) return;
  showLoad('กำลังโหลด...');
  try {
    const r = await call({ action:'pk_recordsByJob', jobId: j.id });
    hideLoad();
    if (!r.ok) { toast('❌ ' + r.error); return; }
    const recs = r.records || [];
    if (!recs.length) { toast('ไม่มี record'); return; }
    if (recs.length === 1) {
      recordOpenView(recs[0].id);
      return;
    }
    // หลาย records → list ให้เลือก
    const list = recs.map((rec, i) =>
      `${i+1}. ${rec.id} · ${new Date(rec.updatedAt).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})} · ${rec.entryCount} รายการ`
    ).join('\n');
    const choice = prompt('เลือก record (1-' + recs.length + ') หรือเว้นว่าง:\n\n' + list);
    if (!choice) return;
    const n = parseInt(choice);
    if (n >= 1 && n <= recs.length) {
      recordOpenView(recs[n-1].id);
    }
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

let _officePhotoIdx = 0;
let _officePhotoJob = null;
function showOfficePhoto(jobIdx){
  const j = window._officeJobs[jobIdx];
  if (!j || !j.photos || !j.photos.length) return;
  _officePhotoJob = j;
  _officePhotoIdx = 0;
  renderOfficePhoto();
  document.getElementById('officePhotoModal').classList.add('on');
}
function renderOfficePhoto(){
  const j = _officePhotoJob;
  if (!j) return;
  const img = document.getElementById('officePhotoFull');
  img.src = fixDriveUrl(j.photos[_officePhotoIdx]);
  img.setAttribute('referrerpolicy', 'no-referrer');
  document.getElementById('officePhotoCaption').textContent = `${j.id} · ${j.name} · รูปที่ ${_officePhotoIdx+1}/${j.photos.length}`;
  document.getElementById('officePhotoPrev').style.visibility = _officePhotoIdx > 0 ? 'visible' : 'hidden';
  document.getElementById('officePhotoNext').style.visibility = _officePhotoIdx < j.photos.length - 1 ? 'visible' : 'hidden';
}
function officePhotoPrev(){ if (_officePhotoIdx > 0) { _officePhotoIdx--; renderOfficePhoto(); } }
function officePhotoNext(){ if (_officePhotoJob && _officePhotoIdx < _officePhotoJob.photos.length - 1) { _officePhotoIdx++; renderOfficePhoto(); } }

// ─── MAP MODAL ───
function showMap(lat,lng,name,doneAt){
  document.getElementById('mapModal').classList.add('on');
  document.getElementById('mapInfo').innerHTML = `<b>${name}</b><br><span style="color:var(--mu);font-size:12px;">พิกัด ${Number(lat).toFixed(5)}, ${Number(lng).toFixed(5)}${doneAt?' · จบงาน '+new Date(Number(doneAt)).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'}):''}</span><br><a class="lnk" href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank">เปิดใน Google Maps →</a>`;
  setTimeout(() => {
    if (_mapObj) { try { _mapObj.remove(); } catch(e) {} _mapObj=null; }
    _mapObj = L.map('mapBox',{zoomControl:true,attributionControl:false}).setView([lat,lng],16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(_mapObj);
    const icon = L.divIcon({className:'',html:`<div style="background:#34c759;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 12px #34c759;"></div>`,iconSize:[16,16],iconAnchor:[8,8]});
    L.marker([lat,lng],{icon}).addTo(_mapObj).bindPopup(`<b>${name}</b>`).openPopup();
  }, 150);
}
function closeMap(){
  document.getElementById('mapModal').classList.remove('on');
  if (_mapObj) { try { _mapObj.remove(); } catch(e) {} _mapObj=null; }
}
document.getElementById('mapModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeMap(); });

    const f = new Date(); f.setDate(f.getDate() - 30);
    to.value = t.toISOString().split('T')[0];
    fr.value = f.toISOString().split('T')[0];
    updateDateDisplay(to);
    updateDateDisplay(fr);
  }
  salesLoadMy();
}

// debounce slot check
async function salesCheckSlot(){
  clearTimeout(_sSlotTimer);
  _sSlotTimer = setTimeout(async () => {
    const date = document.getElementById('sBkDate').value;
    const score = parseFloat(document.getElementById('sBkScore').value) || 0;
    const indicator = document.getElementById('sSlotIndicator');
    if (!date) { indicator.innerHTML = ''; return; }
    try {
      const r = await call({ action:'pk_checkSlot', date, score });
      if (!r.ok) { indicator.innerHTML = ''; return; }
      let color, icon, msg;
      if (r.level === 'full') {
        color = 'rgba(255,69,58,.15)'; icon = '⚠️';
        msg = `วันนี้คิว<b>เกินจุดเต็ม</b> (${r.totalAfter}/${r.maxScore}) — บันทึกได้แต่ทับโซนอื่น`;
      } else if (r.level === 'warn') {
        color = 'rgba(245,166,35,.15)'; icon = '💛';
        msg = `วันนี้คิว<b>ใกล้เต็ม</b> (${r.totalAfter}/${r.maxScore})`;
      } else {
        color = 'rgba(52,199,89,.12)'; icon = '✅';
        msg = `วันนี้คิวยังว่าง (${r.currentLoad} + ${r.newScore} = ${r.totalAfter}/${r.maxScore})`;
      }
      indicator.innerHTML = `<div style="padding:10px 14px;background:${color};border-radius:8px;font-size:13px;">${icon} ${msg}</div>`;
    } catch(e) { indicator.innerHTML = ''; }
  }, 400);
}

async function salesSubmitBooking(){
  const body = { action:'pk_salesAddBooking', username: CURRENT_USER.username };

  if (_sBkMode === 'form') {
    const date     = document.getElementById('sBkDate').value;
    const customer = document.getElementById('sBkCustomer').value.trim();
    const address  = document.getElementById('sBkAddress').value.trim();
    const job      = document.getElementById('sBkJob').value.trim();
    const score    = document.getElementById('sBkScore').value;
    const amount   = document.getElementById('sBkAmount').value;
    if (!date || !customer) { toast('กรอก วันที่ และ ชื่อลูกค้า'); return; }

    // ถ้าเกินจุดเต็ม → ขอ confirm
    const r = await call({ action:'pk_checkSlot', date, score });
    if (r.ok && r.level === 'full') {
      if (!confirm(`⚠️ วันนี้คิวเกินจุดเต็มแล้ว (${r.totalAfter}/${r.maxScore})\nต้องการลงคิวต่อไหม?`)) return;
    }
    Object.assign(body, { date, customer, address, job, score, amount });
  } else {
    const raw = document.getElementById('sBkRawText').value.trim();
    if (!raw) { toast('พิมพ์ข้อมูลก่อน'); return; }
    body.raw = raw;
  }

  showLoad('กำลังบันทึก...');
  try {
    const r = await call(body);
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error || 'ผิดพลาด')); return; }
    toast(`✅ ลงคิวสำเร็จ #${r.id} — รอ CF`);
    salesClearForm();
    document.getElementById('sSlotIndicator').innerHTML = '';
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

function salesClearForm(){
  if (_sBkMode === 'form') {
    document.getElementById('sBkCustomer').value = '';
    document.getElementById('sBkAddress').value = '';
    document.getElementById('sBkJob').value = '';
    document.getElementById('sBkScore').value = '1';
    document.getElementById('sBkAmount').value = '';
  } else {
    document.getElementById('sBkRawText').value = '';
  }
}

function salesOpenEdit(j){
  _sEditingId = j.id;
  document.getElementById('sEditId').textContent = '#' + j.id;
  // แปลง dd/mm/yyyy → yyyy-mm-dd สำหรับ input
  let dateIso = '';
  const m = /^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/.exec(j.date);
  if (m) {
    const yr = m[3].length === 2 ? '20' + m[3] : m[3];
    dateIso = `${yr}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  document.getElementById('sEditDate').value = dateIso;
  updateDateDisplay(document.getElementById('sEditDate'));
  document.getElementById('sEditCustomer').value = j.customer || '';
  document.getElementById('sEditAddress').value = j.rawAddress || j.address || '';
  document.getElementById('sEditJob').value = j.job || '';
  document.getElementById('sEditScore').value = j.score || 1;
  document.getElementById('sEditAmount').value = j.amount || 0;
  document.getElementById('sEditModal').classList.add('on');
}

//  TECH STATE
// ════════════════════════════════════════
let _techAccess = [];
let _techMembers = [];
let _techJobs = [];
let _techTab = 'current';   // current | done
let _techDate = '';
let _techRefreshTimer = null;

// Done modal state
let _doneJobId = null;
let _donePhotos = [];        // array of base64
let _doneGpsWatch = null;
let _doneGps = null;

async function initTech(){
  if (!CURRENT_USER.team) return;

  const sync = document.getElementById('tSync');
  if (sync) sync.textContent = 'กำลังโหลด...';

  try {
    const r = await call({ action:'pk_techBootstrap' });
    if (!r.ok) {
      if (sync) sync.textContent = '❌ ' + (r.error || 'โหลดไม่ได้');
      return;
    }
    _techAccess = r.access || [];
    _techMembers = r.members || [];
    fillTechDates();
    if (sync) sync.textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH',{timeStyle:'short'});
    // start auto-refresh
    if (_techRefreshTimer) clearInterval(_techRefreshTimer);
    _techRefreshTimer = setInterval(() => {
      if (_techDate) techLoadJobs();
    }, 30000);
    // ── load records auto for tech ──
    setTimeout(recordsLoad, 200);
  } catch(e) {
    if (sync) sync.textContent = '❌ เชื่อมต่อไม่ได้';
  }
}

function fillTechDates(){
  const dd = document.getElementById('tDate');
  if (!dd) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const sorted = [..._techAccess].sort((a,b) => b.date.localeCompare(a.date));
  // เก็บค่าเดิม
  const prevValue = dd.value;
  dd.innerHTML = '<option value="">— เลือกวันที่ —</option>';
  sorted.forEach(a => {
    const d = new Date(a.date); d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    let label = fmtD(a.date);
    if (diff === 0) label += ' (วันนี้)';
    else if (diff === 1) label += ' (พรุ่งนี้)';
    else if (diff === -1) label += ' (เมื่อวาน)';
    else if (diff > 1) label += ` (อีก ${diff} วัน)`;
    else label += ` (ผ่านมา ${-diff} วัน)`;
    const o = document.createElement('option');
    o.value = a.date;
    o.textContent = label;
    dd.appendChild(o);
  });
  if (!sorted.length) {
    const o = document.createElement('option');
    o.disabled = true; o.textContent = '(ออฟฟิศยังไม่ได้กำหนดวันให้)';
    dd.appendChild(o);
  } else {
    // auto-select วันนี้ ถ้ามี
    const todayStr = new Date().toISOString().split('T')[0];
    const hasToday = sorted.find(a => a.date === todayStr);
    if (prevValue && sorted.find(a => a.date === prevValue)) {
      dd.value = prevValue;
    } else if (hasToday) {
      dd.value = todayStr;
      techOnDateChange();
    }
  }
}

function techOnDateChange(){
  const date = document.getElementById('tDate').value;
  const w = document.getElementById('tMembersDisplay');
  const jobsCard = document.getElementById('tJobsCard');
  _techDate = date;

  if (!date) {
    w.innerHTML = '';
    jobsCard.style.display = 'none';
    return;
  }

  // แสดงสมาชิก
  const mem = _techMembers.find(m => m.date === date);
  const names = mem && mem.members ? mem.members : [];
  if (!names.length) {
    w.innerHTML = `<div style="padding:10px 14px;background:rgba(255,255,255,.03);border-radius:8px;font-size:12px;color:var(--mu);">— ออฟฟิศยังไม่ได้ใส่ชื่อสมาชิก —</div>`;
  } else {
    w.innerHTML = `
      <div style="font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">
        👥 สมาชิกทีมในวันนี้ (${names.length} คน)
      </div>
      <div class="mem-chips">
        ${names.map(n => `<div class="mem-chip" style="cursor:default;">${n}</div>`).join('')}
      </div>
    `;
  }

  // แสดง jobs card + โหลดงาน
  jobsCard.style.display = 'block';
  techLoadJobs();
}

async function techLoadJobs(){
  if (!_techDate) return;
  try {
    const r = await call({ action:'pk_techGetJobs', date: _techDate });
    if (!r.ok) {
      document.getElementById('tJobsList').innerHTML = `<div class="loading-row">${r.error||'โหลดไม่ได้'}</div>`;
      return;
    }
    _techJobs = r.jobs || [];
    techRenderJobs();
  } catch(e) {
    document.getElementById('tJobsList').innerHTML = '<div class="loading-row">โหลดไม่ได้</div>';
  }
}

function techSetTab(tab, btn){
  _techTab = tab;
  document.querySelectorAll('#tJobsCard .tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  techRenderJobs();
}

function techRenderJobs(){
  const w = document.getElementById('tJobsList');
  if (!_techJobs.length) {
    w.innerHTML = '<div class="loading-row">ไม่มีงานในวันที่เลือก</div>';
    document.getElementById('tCntCur').textContent = 0;
    document.getElementById('tCntDone').textContent = 0;
    return;
  }

  // แยกงาน
  const current = _techJobs.filter(j => j.status !== 'done');
  const done = _techJobs.filter(j => j.status === 'done');
  document.getElementById('tCntCur').textContent = current.length;
  document.getElementById('tCntDone').textContent = done.length;

  const showList = (_techTab === 'current') ? current : done;
  if (!showList.length) {
    w.innerHTML = `<div class="loading-row">ไม่มีงานใน${_techTab==='current'?'หมวดงานปัจจุบัน':'หมวดเสร็จแล้ว'}</div>`;
    return;
  }

  const statusLabel = {pending:'รอรับงาน', working:'กำลังทำ', done:'✅ เสร็จแล้ว'};
  const statusClass = {pending:'bp', working:'bw', done:'bd'};

  w.innerHTML = showList.map(j => {
    const isContinued = !!(j.continueNote && j.status !== 'done');
    return `
      <div class="t-jobcard ${j.status}">
        <div class="t-jobhead">
          <div class="t-jobnum">${j.orderLabel}</div>
          <span class="badge ${statusClass[j.status]||'bp'}">${isContinued ? '➡ ต่องาน' : statusLabel[j.status]}</span>
        </div>
        <div class="t-jobname">${j.name}</div>
        ${j.status !== 'pending' && j.address ? `<div class="t-jobaddr">📍 ${j.address}</div>` : ''}

async function techOpenRecord(j){
  // ตรวจว่ามี records ผูกกับงานนี้แล้วหรือยัง
  showLoad('กำลังเช็ค...');
  try {
    const r = await call({ action:'pk_recordsByJob', jobId: j.id });
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'ผิดพลาด')); return; }
    const existing = r.records || [];
    if (existing.length > 0) {
      // มี records อยู่แล้ว → ถาม
      const msg = `งาน ${j.id} มี record ที่ผูกอยู่ ${existing.length} อัน\n\n` +
                  `กด OK → เปิดอันล่าสุดมาแก้\n` +
                  `กด Cancel → สร้างใหม่`;
      if (confirm(msg)) {
        // เปิดอันล่าสุด
        const latest = existing.sort((a,b) => b.updatedAt - a.updatedAt)[0];
        recordOpenEdit(latest.id);
        return;
      }
    }

    recordOpenNew({
      customerName: j.name || '',
      customerPhone: '',
      linkedJobId: j.id
    });

function techJobButtons(j){
  if (j.status === 'pending') {
    return `<button class="btn btn-p btn-sm" onclick="techAcceptJob('${j.id}')">▶ รับงาน</button>`;
  } else if (j.status === 'working') {
    return `
      <button class="btn btn-d btn-sm" onclick="techCancelAccept('${j.id}')">✕ ยกเลิกรับงาน</button>
      <button class="btn btn-p btn-sm" onclick="techOpenDone('${j.id}')">📍 จบงาน</button>
    `;
  } else if (j.status === 'done') {
    // แยกปุ่ม: ถ้าเป็น "ต่องาน" (มี continueNote) → ปุ่มยกเลิกต่องาน
    //         ถ้าเป็น "จบงาน" จริงๆ → ปุ่มยกเลิกการจบงาน
    if (j.continueNote) {
      return `<button class="btn btn-g btn-sm" onclick="techUndoContinue('${j.id}')">↩ ยกเลิกต่องาน</button>`;
    }
    return `<button class="btn btn-g btn-sm" onclick="techUndoDone('${j.id}')">↩ ยกเลิกการจบงาน</button>`;
  }
  return '';
}

// ── แนบรูป (หลายรูป, max 3, compress) ──
function techPhotoSelected(){
  const input = document.getElementById('tDonePhoto');
  const files = Array.from(input.files || []);
  if (!files.length) {
    _donePhotos = [];
    document.getElementById('tPhotoPreview').innerHTML = '';
    return;
  }
  if (files.length > 3) {
    toast('แนบได้สูงสุด 3 รูป — ใช้ 3 รูปแรก');
  }
  const targets = files.slice(0, 3);
  _donePhotos = [];
  document.getElementById('tPhotoPreview').innerHTML = '<div style="font-size:12px;color:var(--mu);">กำลังประมวลผลรูป...</div>';

  let processed = 0;
  targets.forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 1280, maxH = 1280;
        let w = img.width, h = img.height;
        if (w > maxW || h > maxH) {
          const ratio = Math.min(maxW/w, maxH/h);
          w = Math.round(w * ratio); h = Math.round(h * ratio);
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        _donePhotos[idx] = dataUrl;
        processed++;
        if (processed === targets.length) techRenderPhotoPreview();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function techRenderPhotoPreview(){
  const w = document.getElementById('tPhotoPreview');
  const valid = _donePhotos.filter(Boolean);
  if (!valid.length) { w.innerHTML = ''; return; }
  w.innerHTML = valid.map((src, i) => `
    <div style="position:relative;">
      <img src="${src}" style="width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--bdr);">
      <button onclick="techRemovePhoto(${i})" style="position:absolute;top:-6px;right:-6px;background:var(--rd);color:#fff;border:none;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;">×</button>
    </div>
  `).join('');
}

function techRemovePhoto(idx){

}

// ── ดึง GPS — ใช้ watchPosition รอ accuracy < 30m ──
function techStartGps(){
  if (!navigator.geolocation) {
    document.getElementById('tGpsStatus').innerHTML = '❌ เบราว์เซอร์ไม่รองรับ GPS';
    return;
  }
  if (_doneGpsWatch) navigator.geolocation.clearWatch(_doneGpsWatch);
  document.getElementById('tGpsStatus').innerHTML = '⏳ กำลังหาตำแหน่ง... (อยู่นิ่งสักครู่)';
  let bestAcc = 9999;
  _doneGpsWatch = navigator.geolocation.watchPosition(pos => {
    const acc = pos.coords.accuracy;
    if (acc < bestAcc) {
      bestAcc = acc;
      _doneGps = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc };
      const sym = acc < 30 ? '✅' : '⏳';
      document.getElementById('tGpsStatus').innerHTML = `${sym} ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)} <br><span style="color:var(--mu);font-size:11px;">ความแม่นยำ ±${Math.round(acc)}m ${acc < 30 ? '(พร้อมบันทึก)' : '(รออีกสักครู่)'}</span>`;
      if (acc < 30) {
        // ได้ผลลัพธ์ที่ดีแล้ว หยุด
        navigator.geolocation.clearWatch(_doneGpsWatch);
        _doneGpsWatch = null;
      }
    }
  }, err => {
    document.getElementById('tGpsStatus').innerHTML = '❌ ' + err.message;
  }, { enableHighAccuracy:true, timeout:60000, maximumAge:0 });
}

  showLoad(_donePhotos.length ? 'กำลังอัปโหลดรูปและบันทึก...' : 'กำลังบันทึก...');
  try {
    const r = await call(body);

}

let _records = [];

function recordsInit(){
  // bind search

    s.addEventListener('input', () => {

    });

async function recordsLoad(){
  const w = document.getElementById('recList');
  if (!w) return;
  w.innerHTML = '<div class="loading-row" style="grid-column:1/-1;">กำลังโหลด...</div>';
  const search = (document.getElementById('recSearch')?.value || '').trim();
  const showDeletedEl = document.getElementById('recShowDeleted');
  const includeDeleted = showDeletedEl ? showDeletedEl.checked : false;
  try {
    const r = await call({ action:'pk_recordList', search, includeDeleted, limit: 200 });
    if (!r.ok) { w.innerHTML = '<div class="loading-row" style="grid-column:1/-1;">'+(r.error||'โหลดไม่ได้')+'</div>'; return; }
    _records = r.records || [];
    recordsRender();
  } catch(e) { w.innerHTML = '<div class="loading-row" style="grid-column:1/-1;">เชื่อมต่อไม่ได้</div>'; }
}

function recordsRender(){
  const w = document.getElementById('recList');
  if (!_records.length) {
    w.innerHTML = '<div class="loading-row" style="grid-column:1/-1;">ไม่มี records<br><small style="color:var(--mu);">กด "+ สร้างใหม่" เพื่อเริ่มจด</small></div>';
    return;
  }
  const isOffice = CURRENT_USER.role === 'office';
  w.innerHTML = _records.map(r => {
    const isDel = !!r.deletedAt;
    const updatedDate = new Date(r.updatedAt).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'});
    const canEdit = !isDel && (CURRENT_USER.role === 'office' || r.createdBy === CURRENT_USER.username);
