// ─── ACCESS + MEMBERS ───
function addMemChip(){
  const inp = document.getElementById('memInput');
  const v = inp.value.trim();
  if (!v) return;
  if (!_memDraft.includes(v)) _memDraft.push(v);
  inp.value = '';
  renderMemChips();
}
function renderMemChips(){
  document.getElementById('memChips').innerHTML = _memDraft.map((m,i)=>`<div class="mem-chip">${m}<button onclick="_memDraft.splice(${i},1);renderMemChips()">×</button></div>`).join('') || '<span style="font-size:12px;color:var(--mu)">ยังไม่ได้เพิ่มชื่อ (เว้นว่างได้)</span>';
}
function saveQueue(){
  const team = document.getElementById('accTeam').value;
  const date = document.getElementById('accDate').value;
  const note = document.getElementById('accNote').value.trim();
  if (!team || !date) { toast('เลือกทีมและวันที่'); return; }
  call({ action:'pk_setQueue', team, date, note, members:_memDraft }).then(r => {
    if (r.ok) {
      toast('✓ บันทึกคิว '+team+' '+fmtD(date)+(_memDraft.length?` · ${_memDraft.length} คน`:''));
      _accessDates = _accessDates.filter(a => !(a.team===team && a.date===date));
      _accessDates.push({team,date,note});
      if (_memDraft.length) {
        _allMembers = _allMembers.filter(m => !(m.team===team && m.date===date));
        _allMembers.push({team,date,members:[..._memDraft]});
      }
      _memDraft = [];
      renderMemChips();
      renderAccess();
      document.getElementById('accNote').value = '';
    } else toast(r.error || 'ผิดพลาด');
  });
}
function removeAccess(team, date){
  if (!confirm(`ลบคิว ${team} วันที่ ${fmtD(date)}?\n(ช่างจะเข้าดูวันนี้ไม่ได้อีก)`)) return;
  call({ action:'pk_removeAccessDate', team, date }).then(r => {
    if (r.ok) { toast('ลบแล้ว'); _accessDates = _accessDates.filter(a => !(a.team===team && a.date===date)); renderAccess(); }
    else toast(r.error || 'ผิดพลาด');
  });
}
function editQueue(team, date){
  const a = _accessDates.find(x => x.team===team && x.date===date);
  const m = _allMembers.find(x => x.team===team && x.date===date);
  document.getElementById('accTeam').value = team;
  document.getElementById('accDate').value = date;
  document.getElementById('accNote').value = (a && a.note) || '';
  _memDraft = m ? [...m.members] : [];
  renderMemChips();
  window.scrollTo({top:0,behavior:'smooth'});
  toast('โหลดข้อมูลมาแก้ไข — กดบันทึกเมื่อเสร็จ');
}
function renderAccess(){
  const w = document.getElementById('accList');
  if (!w) return;
  if (!_accessDates.length) { w.innerHTML='<div class="loading-row">ยังไม่มีคิวที่กำหนด</div>'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const byTeam = {};
  [..._accessDates].sort((a,b) => a.date.localeCompare(b.date)).forEach(a => {
    if (!byTeam[a.team]) byTeam[a.team] = [];
    byTeam[a.team].push(a);
  });
  w.innerHTML = Object.entries(byTeam).map(([team,list]) => `
    <div class="acc-group"><div class="acc-team-label">${team}</div>
    ${list.map(a => {
      const d = new Date(a.date); d.setHours(0,0,0,0);
      const diff = Math.round((d-today)/86400000);
      const tag = diff<0 ? '<span class="acc-tag tag-p">ผ่านแล้ว</span>' : diff===0 ? '<span class="acc-tag tag-t">วันนี้</span>' : `<span class="acc-tag tag-f">อีก ${diff} วัน</span>`;
      const mem = _allMembers.find(m => m.team===team && m.date===a.date);
      const memHtml = mem && mem.members.length ? `<div style="font-size:11px;color:var(--blu);margin-top:4px;">👥 ${mem.members.join(', ')}</div>` : '<div style="font-size:11px;color:var(--mu);margin-top:4px;">— ไม่ระบุชื่อสมาชิก —</div>';
      return `<div class="acc-row" style="flex-wrap:wrap;">
        <div class="acc-date">${fmtD(a.date)}</div>
        <div class="acc-note">${a.note||''}</div>
        ${tag}
        <button class="btn btn-g btn-sm" onclick="editQueue('${a.team}','${a.date}')">แก้ไข</button>
        <button class="btn btn-d btn-sm" onclick="removeAccess('${a.team}','${a.date}')">ลบ</button>
        <div style="flex-basis:100%;">${memHtml}</div>
      </div>`;
    }).join('')}</div>`).join('');
}

// ─── JOB TABLE ───
async function loadJobTable(){
  const team = document.getElementById('jTeam').value;
  const date = document.getElementById('jDate').value;
  const status = document.getElementById('jStatus').value;
  const tb = document.getElementById('jTbody');
  if (!date) { tb.innerHTML='<tr><td colspan="10" class="loading-row">เลือกวันที่ก่อน</td></tr>'; return; }
  tb.innerHTML = '<tr><td colspan="10" class="loading-row">กำลังโหลด...</td></tr>';
  try {
    let allJobs = [];
    if (team === '__ALL__') {
      for (const t of _teams) {
        const r = await call({ action:'pk_getJobs', team:t, date });
        if (r.ok && r.jobs) allJobs = allJobs.concat(r.jobs.map(j => ({...j, _team:t})));
      }
    } else {
      const r = await call({ action:'pk_getJobs', team, date });
      if (r.ok && r.jobs) allJobs = r.jobs.map(j => ({...j, _team:team}));
    }
    if (status) allJobs = allJobs.filter(j => j.status === status);
    if (!allJobs.length) { tb.innerHTML='<tr><td colspan="10" class="loading-row">ไม่มีรายการงาน</td></tr>'; return; }
    const sl = {pending:'bp',working:'bw',done:'bd'};
    const ll = {pending:'รอรับงาน',working:'กำลังทำ',done:'เสร็จแล้ว'};
    window._officeJobs = allJobs;  // เก็บไว้สำหรับ showOfficePhoto
    tb.innerHTML = allJobs.map((j, idx) => `<tr>
      <td style="font-family:var(--mono);font-size:11px;color:var(--mu);">${j.orderLabel}</td>
      <td><div style="font-weight:600;font-size:13px;">${j.name}</div><div style="font-size:11px;color:var(--mu);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${j.address}">${j.address}</div></td>
      <td style="font-size:12px;">${j._team}</td>
      <td style="font-size:12px;color:${j.worker?'var(--blu)':'var(--mu)'};">${j.worker||'-'}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--acc);">${j.amount?'฿'+fmt(j.amount):'-'}</td>
      <td><span class="badge ${sl[j.status]||'bp'}">${ll[j.status]||j.status}</span></td>
      <td>${j.lat?`<a class="lnk" onclick="showMap(${j.lat},${j.lng},'${j.name.replace(/'/g,'')}','${(j.doneAt||'')}')">📍 ดูจุดจบงาน</a>`:(j.mapLink?`<a class="lnk" href="${j.mapLink}" target="_blank">🗺 ที่อยู่งาน</a>`:'-')}</td>
      <td>${j.photos && j.photos.length ? `<a class="lnk" onclick="showOfficePhoto(${idx})">📷 ดู ${j.photos.length} รูป</a>` : '-'}</td>
      <td id="jrec-${idx}" style="font-size:11px;color:var(--mu);">…</td>
      <td id="jquo-${idx}" style="font-size:11px;color:var(--mu);">…</td>
    </tr>`).join('');
    // โหลด record counts + quote counts (async ไม่บล็อก)
    loadRecordCountsForJobs(allJobs);
    if (isOfficeLevel() || CURRENT_USER.role === 'sales') {
      loadQuoteCountsForJobs(allJobs);
    } else {
      // tech ไม่เห็น quote — ใส่ -
      allJobs.forEach((j, idx) => {
        const c = document.getElementById('jquo-' + idx);
        if (c) c.textContent = '-';
      });
    }
  } catch(e) { tb.innerHTML='<tr><td colspan="10" class="loading-row">โหลดไม่ได้</td></tr>'; }
}

// โหลดจำนวน records ของแต่ละงาน + เซลล์อัปเดต
async function loadRecordCountsForJobs(jobs){
  // อ่าน records ทั้งหมดของผู้ใช้ปัจจุบันครั้งเดียว แล้ว match
  try {
    const r = await call({ action:'pk_recordList', limit: 200 });
    if (!r.ok) return;
    const byJob = {};
    (r.records||[]).forEach(rec => {
      if (rec.linkedJobId && !rec.deletedAt) {
        if (!byJob[rec.linkedJobId]) byJob[rec.linkedJobId] = [];
        byJob[rec.linkedJobId].push(rec);
      }
    });
    jobs.forEach((j, idx) => {
      const cell = document.getElementById('jrec-' + idx);
      if (!cell) return;
      const recs = byJob[j.id] || [];
      if (recs.length === 0) {
        cell.innerHTML = '<a class="lnk" onclick="openCreateRecordForJob(' + idx + ')" style="color:var(--mu);">+ จด</a>';
      } else {
        cell.innerHTML = '<a class="lnk" onclick="openJobRecords(' + idx + ')">📐 ดู ' + recs.length + ' รายการ</a>';
        cell.dataset.records = JSON.stringify(recs.map(r => r.id));
      }
    });
  } catch(e) {}
}

// office: เปิดสร้าง record + ผูกงาน
function openCreateRecordForJob(jobIdx){
  const j = window._officeJobs[jobIdx];
  if (!j) return;
  recordOpenNew({
    customerName: j.name || '',
    linkedJobId: j.id
  });
}

// office: เปิดรายการ records ของงานนั้น
async function openJobRecords(jobIdx){
  const j = window._officeJobs[jobIdx];
  if (!j) return;
  showLoad('กำลังโหลด...');
  try {
    const r = await call({ action:'pk_recordsByJob', jobId: j.id });
    hideLoad();
    if (!r.ok) { toast('❌ ' + r.error); return; }
    const recs = r.records || [];
    if (!recs.length) { toast('ไม่มี record'); return; }
    if (recs.length === 1) {
      recordOpenView(recs[0].id);
      return;
    }
    // หลาย records → list ให้เลือก
    const list = recs.map((rec, i) =>
      `${i+1}. ${rec.id} · ${new Date(rec.updatedAt).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})} · ${rec.entryCount} รายการ`
    ).join('\n');
    const choice = prompt('เลือก record (1-' + recs.length + ') หรือเว้นว่าง:\n\n' + list);
    if (!choice) return;
    const n = parseInt(choice);
    if (n >= 1 && n <= recs.length) {
      recordOpenView(recs[n-1].id);
    }
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

// ── โหลดจำนวน quotes ของแต่ละงาน (office/sales) ──
async function loadQuoteCountsForJobs(jobs){
  try {
    const r = await call({ action:'pk_quoteList', limit: 200 });
    if (!r.ok) return;
    const byJob = {};
    (r.quotes||[]).forEach(q => {
      if (q.linkedJobId && !q.deletedAt) {
        if (!byJob[q.linkedJobId]) byJob[q.linkedJobId] = [];
        byJob[q.linkedJobId].push(q);
      }
    });
    jobs.forEach((j, idx) => {
      const cell = document.getElementById('jquo-' + idx);
      if (!cell) return;
      const quos = byJob[j.id] || [];
      if (quos.length === 0) {
        cell.innerHTML = '<a class="lnk" onclick="openCreateQuoteForJob(' + idx + ')" style="color:var(--mu);">+ คำนวณ</a>';
      } else {
        const totalSum = quos.reduce((s,q) => s + (q.totalAmount||0), 0);
        cell.innerHTML = '<a class="lnk" onclick="openJobQuotes(' + idx + ')" style="color:var(--grn);font-family:var(--mono);">💰 ' + quos.length + ' ใบ · ฿' + fmt(totalSum) + '</a>';
      }
    });
  } catch(e) {}
}

function openCreateQuoteForJob(jobIdx){
  const j = window._officeJobs[jobIdx];
  if (!j) return;
  quoteOpenNew({
    customer: { name: j.name || '', phone: '' },
    linkedJobId: j.id
  });

async function openJobQuotes(jobIdx){
  const j = window._officeJobs[jobIdx];
  if (!j) return;
  showLoad('กำลังโหลด...');
  try {
    const r = await call({ action:'pk_quotesByJob', jobId: j.id });
    hideLoad();
    if (!r.ok) { toast('❌ ' + r.error); return; }
    const quos = r.quotes || [];
    if (!quos.length) { toast('ไม่มี quote'); return; }
    if (quos.length === 1) {
      quoteOpenView(quos[0].id);
      return;
    }
    const list = quos.map((q, i) =>

    ).join('\n');

    if (!choice) return;
    const n = parseInt(choice);
    if (n >= 1 && n <= quos.length) {
      quoteOpenView(quos[n-1].id);
    }
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }

let _officePhotoIdx = 0;
let _officePhotoJob = null;
function showOfficePhoto(jobIdx){
  const j = window._officeJobs[jobIdx];
  if (!j || !j.photos || !j.photos.length) return;
  _officePhotoJob = j;
  _officePhotoIdx = 0;
  renderOfficePhoto();
  document.getElementById('officePhotoModal').classList.add('on');
}
function renderOfficePhoto(){
  const j = _officePhotoJob;
  if (!j) return;
  const img = document.getElementById('officePhotoFull');
  img.src = fixDriveUrl(j.photos[_officePhotoIdx]);
  img.setAttribute('referrerpolicy', 'no-referrer');
  document.getElementById('officePhotoCaption').textContent = `${j.id} · ${j.name} · รูปที่ ${_officePhotoIdx+1}/${j.photos.length}`;
  document.getElementById('officePhotoPrev').style.visibility = _officePhotoIdx > 0 ? 'visible' : 'hidden';
  document.getElementById('officePhotoNext').style.visibility = _officePhotoIdx < j.photos.length - 1 ? 'visible' : 'hidden';
}
function officePhotoPrev(){ if (_officePhotoIdx > 0) { _officePhotoIdx--; renderOfficePhoto(); } }
function officePhotoNext(){ if (_officePhotoJob && _officePhotoIdx < _officePhotoJob.photos.length - 1) { _officePhotoIdx++; renderOfficePhoto(); } }

// ─── MAP MODAL ───
function showMap(lat,lng,name,doneAt){
  document.getElementById('mapModal').classList.add('on');
  document.getElementById('mapInfo').innerHTML = `<b>${name}</b><br><span style="color:var(--mu);font-size:12px;">พิกัด ${Number(lat).toFixed(5)}, ${Number(lng).toFixed(5)}${doneAt?' · จบงาน '+new Date(Number(doneAt)).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'}):''}</span><br><a class="lnk" href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank">เปิดใน Google Maps →</a>`;
  setTimeout(() => {
    if (_mapObj) { try { _mapObj.remove(); } catch(e) {} _mapObj=null; }
    _mapObj = L.map('mapBox',{zoomControl:true,attributionControl:false}).setView([lat,lng],16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(_mapObj);
    const icon = L.divIcon({className:'',html:`<div style="background:#34c759;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 12px #34c759;"></div>`,iconSize:[16,16],iconAnchor:[8,8]});
    L.marker([lat,lng],{icon}).addTo(_mapObj).bindPopup(`<b>${name}</b>`).openPopup();
  }, 150);
}
function closeMap(){
  document.getElementById('mapModal').classList.remove('on');
  if (_mapObj) { try { _mapObj.remove(); } catch(e) {} _mapObj=null; }
}
document.getElementById('mapModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeMap(); });

function setSalesTab(t, btn){
  ['Booking','Measure','My','Records','Quotes'].forEach(x => {
    const el = document.getElementById('sTab'+x); if (el) el.style.display = 'none';
  });
  const tgt = document.getElementById('sTab'+t.charAt(0).toUpperCase()+t.slice(1));
  if (tgt) tgt.style.display = 'block';
  // sidebar active state
  document.querySelectorAll('#salesSidebar .sidebar-item').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  // mobile title
  const titleEl = document.getElementById('mobileTabTitle');
  if (titleEl && btn) {
    const lbl = btn.querySelector('.sidebar-label');
    if (lbl) titleEl.textContent = lbl.textContent;
  }
  closeSidebarMobile();
  if (t === 'booking') initSalesBooking();
  if (t === 'measure') initSalesMeasure();
  if (t === 'my') initSalesMy();
  if (t === 'records') recordsInit();
  if (t === 'quotes') quotesInit();
}

//  📏 SALES MEASURE JOBS (Phase E2)
// ════════════════════════════════════════
let _smJobs = [];
let _smTab = 'current';

function initSalesMeasure(){
  const dt = document.getElementById('smDate');
  if (dt && !dt.value) {
    dt.value = new Date().toISOString().split('T')[0];
    updateDateDisplay(dt);
  }
  salesMeasureLoad();
}

function salesMeasureSwitchTab(t){
  _smTab = t;
  document.getElementById('smTabCurrent').classList.toggle('on', t==='current');
  document.getElementById('smTabDone').classList.toggle('on', t==='done');
  salesMeasureRender();
}

async function salesMeasureLoad(){
  const date = document.getElementById('smDate').value;
  if (!date) { toast('เลือกวันที่ก่อน'); return; }
  const w = document.getElementById('smJobsList');
  w.innerHTML = skelCards(3);
  try {
    const r = await call({ action:'pk_salesGetMeasureJobs', date });
    if (!r.ok) { w.innerHTML = '<div class="loading-row">'+(r.error||'โหลดไม่ได้')+'</div>'; return; }
    _smJobs = r.jobs || [];
    salesMeasureRender();
  } catch(e) { w.innerHTML = '<div class="loading-row">เชื่อมต่อไม่ได้</div>'; }
}

function salesMeasureRender(){
  const w = document.getElementById('smJobsList');
  const current = _smJobs.filter(j => j.status !== 'done');
  const done = _smJobs.filter(j => j.status === 'done');
  document.getElementById('smCntCur').textContent = current.length;
  document.getElementById('smCntDone').textContent = done.length;

  if (!_smJobs.length) {
    w.innerHTML = '<div class="loading-row">ไม่มีงานวัดในวันที่เลือก</div>';
    return;
  }
  const showList = (_smTab === 'current') ? current : done;
  if (!showList.length) {
    w.innerHTML = `<div class="loading-row">ไม่มีงานใน${_smTab==='current'?'หมวดงานปัจจุบัน':'หมวดเสร็จแล้ว'}</div>`;
    return;
  }

  const statusLabel = {pending:'รอรับงาน', working:'กำลังวัด', done:'✅ วัดเสร็จ'};
  const statusClass = {pending:'bp', working:'bw', done:'bd'};

  w.innerHTML = showList.map(j => `
    <div class="t-jobcard ${j.status}">
      <div class="t-jobhead">
        <div class="t-jobnum">${j.orderLabel}</div>
        <span class="badge ${statusClass[j.status]||'bp'}">${statusLabel[j.status]||'รอรับงาน'}</span>
      </div>
      <div class="t-jobname">${j.name}</div>
      ${j.status !== 'pending' && j.address ? `<div class="t-jobaddr">📍 ${j.address}</div>` : ''}
      ${j.status === 'pending' ? `<div class="t-jobaddr" style="color:var(--mu);font-style:italic;">📍 (กดรับงานเพื่อดูที่อยู่)</div>` : ''}
      ${j.description ? `<div class="t-jobdesc">📐 ${j.description}</div>` : ''}
      ${j.status === 'done' && j.doneAt ? `<div class="t-jobtime">⏱ วัดเสร็จ ${new Date(Number(j.doneAt)).toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'})}</div>` : ''}
      <div class="t-jobbtns">
        ${j.status !== 'pending' && j.mapLink ? `<a class="btn btn-g btn-sm" href="${j.mapLink}" target="_blank">🗺 นำทาง</a>` : ''}
        ${salesMeasureButtons(j)}
        ${j.status !== 'pending' ? `<button class="btn btn-sm" style="background:rgba(74,158,255,.15);color:var(--blu);border:1px solid var(--blu);" onclick='salesMeasureOpenRecord(${JSON.stringify(j).replace(/'/g,"&apos;")})'>📐 จดขนาด</button>` : ''}
        ${j.status !== 'pending' ? `<button class="btn btn-sm" style="background:rgba(52,199,89,.15);color:var(--grn);border:1px solid var(--grn);" onclick='salesMeasureQuote(${JSON.stringify(j).replace(/'/g,"&apos;")})'>💰 คำนวณราคา</button>` : ''}
        ${j.status !== 'pending' ? `<button class="btn btn-sm" style="background:rgba(255,159,67,.15);color:var(--acc);border:1px solid var(--acc);" onclick='salesMeasureToInstall(${JSON.stringify(j).replace(/'/g,"&apos;")})'>🔧 ลงคิวติดตั้ง</button>` : ''}
      </div>
    </div>
  `).join('');
}

function salesMeasureButtons(j){
  if (j.status === 'pending') {
    return `<button class="btn btn-p btn-sm" onclick="salesMeasureAccept('${j.id}')">▶ รับงาน</button>`;
  } else if (j.status === 'working') {
    return `
      <button class="btn btn-d btn-sm" onclick="salesMeasureCancelAccept('${j.id}')">✕ ยกเลิกรับงาน</button>
      <button class="btn btn-p btn-sm" onclick="salesMeasureDone('${j.id}')">✅ จบงานวัด</button>
    `;
  } else if (j.status === 'done') {
    return `<button class="btn btn-g btn-sm" onclick="salesMeasureUndo('${j.id}')">↩ ยกเลิกการจบงาน</button>`;
  }
  return '';
}

async function salesMeasureAccept(id){
  if (!confirm('รับงานวัดนี้?')) return;
  showLoad('กำลังรับงาน...');
  try {
    const r = await call({
      action: 'pk_salesUpdateMeasureStatus',
      id, status: 'working', startAt: Date.now(),
      worker: CURRENT_USER.name || CURRENT_USER.username
    });
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'ผิดพลาด')); return; }
    toast('✅ รับงานแล้ว');
    salesMeasureLoad();
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

// เปิด record จากงานวัด — ผูก linkedJobId อัตโนมัติ
async function salesMeasureOpenRecord(j){
  showLoad('กำลังเช็ค...');
  try {
    const r = await call({ action:'pk_recordsByJob', jobId: j.id });
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'ผิดพลาด')); return; }
    const existing = r.records || [];
    if (existing.length > 0) {
      const msg = `งาน ${j.id} มี record ผูกอยู่ ${existing.length} อัน\n\nกด OK → เปิดอันล่าสุด\nกด Cancel → สร้างใหม่`;
      if (confirm(msg)) {
        const latest = existing.sort((a,b) => b.updatedAt - a.updatedAt)[0];
        recordOpenEdit(latest.id);
        return;
      }
    }
    recordOpenNew({
      customerName: j.name || '',
      customerPhone: '',
      linkedJobId: j.id
    });
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

// 💰 คำนวณราคาจากงานวัด — มี record → แปลงเป็น quote / ไม่มี → เติมแค่ลูกค้า
async function salesMeasureQuote(j){
  showLoad('กำลังเตรียม...');
  try {
    // มี quote ผูกงานนี้แล้วไหม
    const rq = await call({ action:'pk_quotesByJob', jobId: j.id });
    if (rq.ok && rq.quotes && rq.quotes.length > 0) {
      hideLoad();
      if (confirm(`มี Quote ผูกกับงานนี้แล้ว ${rq.quotes.length} ใบ\n\nกด OK → เปิดอันล่าสุด\nกด Cancel → สร้างใหม่`)) {
        const latest = rq.quotes.sort((a,b) => b.updatedAt - a.updatedAt)[0];
        quoteOpenView(latest.id);
        return;
      }
      showLoad('กำลังเตรียม...');
    }

    // หา record ที่ผูกงานวัดนี้
    const rr = await call({ action:'pk_recordsByJob', jobId: j.id });
    hideLoad();
    let quoteEntries = [];
    let linkedRecordId = '';
    if (rr.ok && rr.records && rr.records.length > 0) {
      const latest = rr.records.sort((a,b) => b.updatedAt - a.updatedAt)[0];
      showLoad('กำลังโหลดขนาด...');
      const rg = await call({ action:'pk_recordGet', id: latest.id });
      hideLoad();
      if (rg.ok && rg.record) {
        quoteEntries = pkRecordEntriesToQuote(rg.record.entries);
        linkedRecordId = latest.id;
      }
    }

    quoteOpenNew({
      customer: { name: j.name || '', phone: '' },
      linkedJobId: j.id,
      linkedRecordId,
      entries: quoteEntries.length ? quoteEntries : undefined
    });

// debounce slot check
async function salesCheckSlot(){
  clearTimeout(_sSlotTimer);
  _sSlotTimer = setTimeout(async () => {
    const date = document.getElementById('sBkDate').value;
    const score = parseFloat(document.getElementById('sBkScore').value) || 0;
    const indicator = document.getElementById('sSlotIndicator');
    if (!date) { indicator.innerHTML = ''; return; }
    try {
      const r = await call({ action:'pk_checkSlot', date, score });
      if (!r.ok) { indicator.innerHTML = ''; return; }
      let color, icon, msg;
      if (r.level === 'full') {
        color = 'rgba(255,69,58,.15)'; icon = '⚠️';
        msg = `วันนี้คิว<b>เกินจุดเต็ม</b> (${r.totalAfter}/${r.maxScore}) — บันทึกได้แต่ทับโซนอื่น`;
      } else if (r.level === 'warn') {
        color = 'rgba(245,166,35,.15)'; icon = '💛';
        msg = `วันนี้คิว<b>ใกล้เต็ม</b> (${r.totalAfter}/${r.maxScore})`;
      } else {
        color = 'rgba(52,199,89,.12)'; icon = '✅';
        msg = `วันนี้คิวยังว่าง (${r.currentLoad} + ${r.newScore} = ${r.totalAfter}/${r.maxScore})`;
      }
      indicator.innerHTML = `<div style="padding:10px 14px;background:${color};border-radius:8px;font-size:13px;">${icon} ${msg}</div>`;
    } catch(e) { indicator.innerHTML = ''; }
  }, 400);
}

async function salesSubmitBooking(){
  const body = { action:'pk_salesAddBooking', username: CURRENT_USER.username };

  if (_sBkMode === 'form') {
    const date     = document.getElementById('sBkDate').value;
    const customer = document.getElementById('sBkCustomer').value.trim();
    const address  = document.getElementById('sBkAddress').value.trim();
    const job      = document.getElementById('sBkJob').value.trim();
    const score    = document.getElementById('sBkScore').value;
    const amount   = document.getElementById('sBkAmount').value;
    if (!date || !customer) { toast('กรอก วันที่ และ ชื่อลูกค้า'); return; }

    // ถ้าเกินจุดเต็ม → ขอ confirm
    const r = await call({ action:'pk_checkSlot', date, score });
    if (r.ok && r.level === 'full') {
      if (!confirm(`⚠️ วันนี้คิวเกินจุดเต็มแล้ว (${r.totalAfter}/${r.maxScore})\nต้องการลงคิวต่อไหม?`)) return;
    }
    Object.assign(body, { date, customer, address, job, score, amount });
    if (_salesBookingMeasureId) body.linkedMeasureId = _salesBookingMeasureId;
  } else {
    const raw = document.getElementById('sBkRawText').value.trim();
    if (!raw) { toast('พิมพ์ข้อมูลก่อน'); return; }
    body.raw = raw;
    if (_salesBookingMeasureId) body.linkedMeasureId = _salesBookingMeasureId;
  }

  showLoad('กำลังบันทึก...');
  try {
    const r = await call(body);
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error || 'ผิดพลาด')); return; }
    toast(`✅ ลงคิวสำเร็จ #${r.id} — รอ CF`);
    clearMeasureLink();  // ล้าง banner + measure link
    salesClearForm();
    document.getElementById('sSlotIndicator').innerHTML = '';
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

let _techAccess = [];
let _techMembers = [];
let _techJobs = [];

let _techRefreshTimer = null;

// Done modal state
let _doneJobId = null;

async function initTech(){
  if (!CURRENT_USER.team) return;

  const sync = document.getElementById('tSync');
  if (sync) sync.textContent = 'กำลังโหลด...';

  try {
    const r = await call({ action:'pk_techBootstrap' });
    if (!r.ok) {
      if (sync) sync.textContent = '❌ ' + (r.error || 'โหลดไม่ได้');
      return;
    }
    _techAccess = r.access || [];
    _techMembers = r.members || [];
    fillTechDates();
    if (sync) sync.textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH',{timeStyle:'short'});
    // start auto-refresh
    if (_techRefreshTimer) clearInterval(_techRefreshTimer);
    _techRefreshTimer = setInterval(() => {
      if (_techDate) techLoadJobs();
    }, 30000);
    // ── load records auto for tech ──
    setTimeout(recordsLoad, 200);
  } catch(e) {
    if (sync) sync.textContent = '❌ เชื่อมต่อไม่ได้';
  }
}

function fillTechDates(){
  const dd = document.getElementById('tDate');
  if (!dd) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const sorted = [..._techAccess].sort((a,b) => b.date.localeCompare(a.date));
  // เก็บค่าเดิม
  const prevValue = dd.value;
  dd.innerHTML = '<option value="">— เลือกวันที่ —</option>';
  sorted.forEach(a => {
    const d = new Date(a.date); d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    let label = fmtD(a.date);
    if (diff === 0) label += ' (วันนี้)';
    else if (diff === 1) label += ' (พรุ่งนี้)';
    else if (diff === -1) label += ' (เมื่อวาน)';
    else if (diff > 1) label += ` (อีก ${diff} วัน)`;
    else label += ` (ผ่านมา ${-diff} วัน)`;
    const o = document.createElement('option');
    o.value = a.date;
    o.textContent = label;
    dd.appendChild(o);
  });
  if (!sorted.length) {
    const o = document.createElement('option');
    o.disabled = true; o.textContent = '(ออฟฟิศยังไม่ได้กำหนดวันให้)';
    dd.appendChild(o);
  } else {
    // auto-select วันนี้ ถ้ามี
    const todayStr = new Date().toISOString().split('T')[0];
    const hasToday = sorted.find(a => a.date === todayStr);
    if (prevValue && sorted.find(a => a.date === prevValue)) {
      dd.value = prevValue;
    } else if (hasToday) {
      dd.value = todayStr;
      techOnDateChange();
    }
  }
}

function techOnDateChange(){
  const date = document.getElementById('tDate').value;
  const w = document.getElementById('tMembersDisplay');
  const jobsCard = document.getElementById('tJobsCard');
  _techDate = date;

  if (!date) {
    w.innerHTML = '';
    jobsCard.style.display = 'none';
    return;
  }

  // แสดงสมาชิก

        ${j.description ? `<div class="t-jobdesc">🔧 ${j.description}</div>` : ''}
        <div class="t-jobmeta">
          ${j.amount ? `<span style="color:var(--acc);font-family:var(--mono);">฿${fmt(j.amount)}</span>` : ''}

// ── เปิด record จาก Card งาน — ผูกกับ Job อัตโนมัติ ──
async function techOpenRecord(j){
  // ตรวจว่ามี records ผูกกับงานนี้แล้วหรือยัง
  showLoad('กำลังเช็ค...');
  try {
    const r = await call({ action:'pk_recordsByJob', jobId: j.id });
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'ผิดพลาด')); return; }
    const existing = r.records || [];
    if (existing.length > 0) {
      // มี records อยู่แล้ว → ถาม
      const msg = `งาน ${j.id} มี record ที่ผูกอยู่ ${existing.length} อัน\n\n` +
                  `กด OK → เปิดอันล่าสุดมาแก้\n` +
                  `กด Cancel → สร้างใหม่`;
      if (confirm(msg)) {
        // เปิดอันล่าสุด
        const latest = existing.sort((a,b) => b.updatedAt - a.updatedAt)[0];
        recordOpenEdit(latest.id);
        return;
      }
    }
    // สร้างใหม่ + auto-fill
    recordOpenNew({
      customerName: j.name || '',
      customerPhone: '',
      linkedJobId: j.id
    });
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }

function techJobButtons(j){
  if (j.status === 'pending') {
    return `<button class="btn btn-p btn-sm" onclick="techAcceptJob('${j.id}')">▶ รับงาน</button>`;
  } else if (j.status === 'working') {
    return `
      <button class="btn btn-d btn-sm" onclick="techCancelAccept('${j.id}')">✕ ยกเลิกรับงาน</button>
      <button class="btn btn-p btn-sm" onclick="techOpenDone('${j.id}')">📍 จบงาน</button>
    `;
  } else if (j.status === 'done') {
    // แยกปุ่ม: ถ้าเป็น "ต่องาน" (มี continueNote) → ปุ่มยกเลิกต่องาน
    //         ถ้าเป็น "จบงาน" จริงๆ → ปุ่มยกเลิกการจบงาน
    if (j.continueNote) {
      return `<button class="btn btn-g btn-sm" onclick="techUndoContinue('${j.id}')">↩ ยกเลิกต่องาน</button>`;
    }
    return `<button class="btn btn-g btn-sm" onclick="techUndoDone('${j.id}')">↩ ยกเลิกการจบงาน</button>`;
  }
  return '';
}

// ── แนบรูป (หลายรูป, max 3, compress) ──
function techPhotoSelected(){
  const input = document.getElementById('tDonePhoto');
  const files = Array.from(input.files || []);
  if (!files.length) {
    _donePhotos = [];
    document.getElementById('tPhotoPreview').innerHTML = '';
    return;
  }
  if (files.length > 3) {
    toast('แนบได้สูงสุด 3 รูป — ใช้ 3 รูปแรก');
  }
  const targets = files.slice(0, 3);
  _donePhotos = [];
  document.getElementById('tPhotoPreview').innerHTML = '<div style="font-size:12px;color:var(--mu);">กำลังประมวลผลรูป...</div>';

  let processed = 0;
  targets.forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 1280, maxH = 1280;
        let w = img.width, h = img.height;
        if (w > maxW || h > maxH) {
          const ratio = Math.min(maxW/w, maxH/h);
          w = Math.round(w * ratio); h = Math.round(h * ratio);
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        _donePhotos[idx] = dataUrl;
        processed++;
        if (processed === targets.length) techRenderPhotoPreview();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function techRenderPhotoPreview(){
  const w = document.getElementById('tPhotoPreview');
  const valid = _donePhotos.filter(Boolean);
  if (!valid.length) { w.innerHTML = ''; return; }
  w.innerHTML = valid.map((src, i) => `
    <div style="position:relative;">
      <img src="${src}" style="width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--bdr);">
      <button onclick="techRemovePhoto(${i})" style="position:absolute;top:-6px;right:-6px;background:var(--rd);color:#fff;border:none;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;">×</button>
    </div>
  `).join('');
}

function techRemovePhoto(idx){

}

// ── ดึง GPS — ใช้ watchPosition รอ accuracy < 30m ──
function techStartGps(){
  if (!navigator.geolocation) {
    document.getElementById('tGpsStatus').innerHTML = '❌ เบราว์เซอร์ไม่รองรับ GPS';
    return;
  }
  if (_doneGpsWatch) navigator.geolocation.clearWatch(_doneGpsWatch);
  document.getElementById('tGpsStatus').innerHTML = '⏳ กำลังหาตำแหน่ง... (อยู่นิ่งสักครู่)';
  let bestAcc = 9999;
  _doneGpsWatch = navigator.geolocation.watchPosition(pos => {
    const acc = pos.coords.accuracy;
    if (acc < bestAcc) {
      bestAcc = acc;
      _doneGps = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc };
      const sym = acc < 30 ? '✅' : '⏳';
      document.getElementById('tGpsStatus').innerHTML = `${sym} ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)} <br><span style="color:var(--mu);font-size:11px;">ความแม่นยำ ±${Math.round(acc)}m ${acc < 30 ? '(พร้อมบันทึก)' : '(รออีกสักครู่)'}</span>`;
      if (acc < 30) {
        // ได้ผลลัพธ์ที่ดีแล้ว หยุด
        navigator.geolocation.clearWatch(_doneGpsWatch);
        _doneGpsWatch = null;
      }
    }
  }, err => {
    document.getElementById('tGpsStatus').innerHTML = '❌ ' + err.message;
  }, { enableHighAccuracy:true, timeout:60000, maximumAge:0 });
}

// ── ส่งข้อมูลจบงาน ──
async function techSubmitDone(){
  const worker = document.getElementById('tDoneWorker').value.trim();
  const note = document.getElementById('tDoneNote').value.trim();

  const body = {
    action: 'pk_techUpdateJobStatus',
    id: _doneJobId,
    status: 'done',
    doneAt: Date.now(),
    worker,
    continueNote: note,
    photos: _donePhotos.filter(Boolean),
    notify: { event: note ? 'continue' : 'done' }
  };
  if (_doneGps) {
    body.lat = _doneGps.lat;
    body.lng = _doneGps.lng;
  }

  showLoad(_donePhotos.length ? 'กำลังอัปโหลดรูปและบันทึก...' : 'กำลังบันทึก...');
  try {
    const r = await call(body);
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'ผิดพลาด')); return; }
    toast(note ? '➡ บันทึกต่องาน' : '✅ จบงานแล้ว');
    techCloseModal();
    techLoadJobs();
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

  if (s && !s._bound) {

    s.addEventListener('input', () => {
      if (_recordSearchTimer) clearTimeout(_recordSearchTimer);
      _recordSearchTimer = setTimeout(() => recordsLoad(false), 400);
    });
  }
  recordsLoad(true);  // เปิด tab → ใช้ cache ได้

async function recordsLoad(useCache){
  const w = document.getElementById('recList');
  if (!w) return;
  w.innerHTML = skelCards(6);
  const search = (document.getElementById('recSearch')?.value || '').trim();
  const showDeletedEl = document.getElementById('recShowDeleted');
  const includeDeleted = showDeletedEl ? showDeletedEl.checked : false;
  try {
    const r = await call({ action:'pk_recordList', search, includeDeleted, limit: 200 },
                         { cache: true, bypassCache: !useCache });
    if (!r.ok) { w.innerHTML = '<div class="loading-row" style="grid-column:1/-1;">'+(r.error||'โหลดไม่ได้')+'</div>'; return; }

const REC_MAX_ENTRIES = 50;

// State
// guard กันเปิด modal ซ้อน/กดซ้ำ (ใช้ร่วมกับ record + quote)
let _modalOpening = false;

let _recForm = {
  mode: 'new',         // new | edit | view
  id: null,
  customer: { name:'', phone:'' },
  linkedJobId: '',
  entries: [],
  recentJobs: [],
  draftKey: null,
  draftTimer: null,
  lastSavedAt: null,
  dirty: false
};

function recordEmptyEntry(no){
  return {
    no, isEmpty: true, location: '',
    width: null, height: null, qty: null,
    muang: [], krachok: [], rang: null, detail: ''
  };
}

// ── New ──
async function recordOpenNew(prefill){
  if (_modalOpening) return;
  _modalOpening = true;
  showLoad('กำลังเตรียมฟอร์ม...');
  try {
    prefill = prefill || {};
    _recForm = {
      mode: 'new', id: null,
      customer: { name: prefill.customerName || '', phone: prefill.customerPhone || '' },
      linkedJobId: prefill.linkedJobId || '',
      entries: [ recordEmptyEntry(1) ],
      recentJobs: [], draftKey: 'pk_record_draft_new',
      draftTimer: null, lastSavedAt: null, dirty: false
    };
    await recordLoadRecentJobs();
    // ถาม recover draft (เฉพาะตอน new ไม่มี prefill)
    if (!prefill.customerName && !prefill.linkedJobId) {
      const draft = localStorage.getItem(_recForm.draftKey);
      if (draft) {
        hideLoad();
        if (confirm('พบ draft ที่บันทึกค้างไว้ — โหลดกลับ?')) {
          try { Object.assign(_recForm, JSON.parse(draft)); }
          catch(e) { localStorage.removeItem(_recForm.draftKey); }
        } else {
          localStorage.removeItem(_recForm.draftKey);
        }
        showLoad('กำลังเตรียมฟอร์ม...');
      }
    }
    document.getElementById('recmTitle').textContent = '📐 บันทึกขนาด — สร้างใหม่';
    document.getElementById('recmSaveBar').style.display = 'flex';
    document.getElementById('recmSaveBtn').textContent = '💾 บันทึก';
    document.getElementById('recmExportBtn').style.display = 'none';
    document.getElementById('recmLinkBtn').style.display = 'none';
    document.getElementById('recmQuoteBtn').style.display = 'none';
    recordRenderForm();
    recordOpenModal();
    recordStartAutosave();
  } finally {
    hideLoad();
    _modalOpening = false;
  }
}

// ── View (readonly) ──
async function recordOpenView(id){
  if (_modalOpening) return;
  _modalOpening = true;
  showLoad('กำลังโหลด...');
  try {
    const r = await call({ action:'pk_recordGet', id });
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'โหลดไม่ได้')); return; }
    const rec = r.record;
    _recForm = {
      mode: 'view', id,
      customer: rec.customer || { name:'', phone:'' },
      linkedJobId: rec.linkedJobId || '',
      entries: (rec.entries && rec.entries.length) ? rec.entries : [ recordEmptyEntry(1) ],
      recentJobs: [], draftKey: null,
      draftTimer: null, lastSavedAt: null, dirty: false
    };
    document.getElementById('recmTitle').textContent = '📐 ดู Record — ' + id;
    document.getElementById('recmSaveBar').style.display = 'none';
    document.getElementById('recmExportBtn').style.display = '';  // Phase C4 จะใช้
    document.getElementById('recmLinkBtn').style.display = (isOfficeLevel() || rec.createdBy === CURRENT_USER.username) ? '' : 'none';
    document.getElementById('recmQuoteBtn').style.display = (isOfficeLevel() || CURRENT_USER.role === 'sales') ? '' : 'none';
    recordRenderForm();
    recordOpenModal();
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
  finally { _modalOpening = false; }
}

// ── Edit ──
async function recordOpenEdit(id){
  if (_modalOpening) return;
  _modalOpening = true;
  showLoad('กำลังโหลด...');
  try {
    const r = await call({ action:'pk_recordGet', id });
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'โหลดไม่ได้')); return; }
    const rec = r.record;
    _recForm = {
      mode: 'edit', id,
      customer: rec.customer || { name:'', phone:'' },
      linkedJobId: rec.linkedJobId || '',
      entries: (rec.entries && rec.entries.length) ? rec.entries : [ recordEmptyEntry(1) ],
      recentJobs: [], draftKey: 'pk_record_draft_' + id,
      draftTimer: null, lastSavedAt: null, dirty: false
    };
    await recordLoadRecentJobs();
    // ถาม recover draft
    const draft = localStorage.getItem(_recForm.draftKey);
    if (draft) {
      if (confirm('พบ draft ของ record นี้ที่บันทึกค้างไว้ — โหลดกลับ?')) {
        try {
          const d = JSON.parse(draft);
          _recForm.customer = d.customer || _recForm.customer;
          _recForm.linkedJobId = d.linkedJobId || _recForm.linkedJobId;
          _recForm.entries = d.entries || _recForm.entries;
        } catch(e) { localStorage.removeItem(_recForm.draftKey); }
      } else {
        localStorage.removeItem(_recForm.draftKey);
      }
    }
    document.getElementById('recmTitle').textContent = '📐 แก้ไข — ' + id;
    document.getElementById('recmSaveBar').style.display = 'flex';
    document.getElementById('recmSaveBtn').textContent = '💾 อัปเดต';
    document.getElementById('recmExportBtn').style.display = '';
    document.getElementById('recmLinkBtn').style.display = '';
    document.getElementById('recmQuoteBtn').style.display = (isOfficeLevel() || CURRENT_USER.role === 'sales') ? '' : 'none';
    recordRenderForm();
    recordOpenModal();
    recordStartAutosave();
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
  finally { _modalOpening = false; }
}

function recordOpenModal(){
  document.getElementById('recmModal').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function recordCloseModal(){
  if (_recForm.dirty && _recForm.mode !== 'view') {
    if (!confirm('มีการแก้ไขที่ยังไม่บันทึก — ปิดเลย?\n(Draft จะถูกเก็บไว้ใน browser)')) return;
  }
  recordStopAutosave();
  document.getElementById('recmModal').classList.remove('on');
  document.body.style.overflow = '';
}

async function recordLoadRecentJobs(){
  try {
    const r = await call({ action:'pk_recordListRecentJobs' });
    if (r.ok) _recForm.recentJobs = r.jobs || [];
  } catch(e) {}
}

// ── Render Form ──
function recordRenderForm(){
  const body = document.getElementById('recmBody');
  const ro = _recForm.mode === 'view';
  body.className = 'recm-body' + (ro ? ' recm-readonly' : '');

  const c = _recForm.customer || { name:'', phone:'' };
  const jobOptions = ['<option value="">— ไม่ผูกกับงาน —</option>']
    .concat(_recForm.recentJobs.map(j => {
      const sel = j.id === _recForm.linkedJobId ? ' selected' : '';
      return `<option value="${j.id}"${sel}>${j.id} · ${j.name||''} · ${fmtD(j.date)}</option>`;
    }));
  // ถ้า linkedJobId เก่ามีแต่ไม่อยู่ใน recent (เกิน 30 วัน) — เพิ่มไว้ด้วย
  if (_recForm.linkedJobId && !_recForm.recentJobs.find(j => j.id === _recForm.linkedJobId)) {
    jobOptions.push(`<option value="${_recForm.linkedJobId}" selected>${_recForm.linkedJobId} · (เก่า)</option>`);
  }

  let html = `
    <div class="recm-section">
      <div class="recm-section-head">ข้อมูลลูกค้า</div>
      <div class="fg" style="margin-bottom:10px;">
        <label class="fl">👤 ชื่อลูกค้า <span style="color:var(--rd)">*</span></label>
        <input class="fi" id="recmCustName" type="text" value="${escAttr(c.name)}" oninput="recordOnChange()">
      </div>
      <div class="fg" style="margin-bottom:10px;">
        <label class="fl">📞 เบอร์โทร</label>
        <input class="fi" id="recmCustPhone" type="tel" value="${escAttr(c.phone)}" oninput="recordOnChange()">
      </div>
      <div class="fg">
        <label class="fl">🔗 ผูกกับงาน (Optional)</label>
        <select class="fi" id="recmLinkedJob" onchange="recordOnChange()">${jobOptions.join('')}</select>
      </div>
    </div>
  `;

  _recForm.entries.forEach((e, idx) => {
    html += recordRenderEntry(e, idx, ro);
  });

  if (!ro) {
    html += ``;
  }

  body.innerHTML = html;
  recordUpdateSaveStatus();
}

function recordRenderEntry(e, idx, ro){
  const num = idx + 1;
  const muangBoxes = MUANG_OPTIONS.map(opt => {
    const ch = (e.muang||[]).indexOf(opt) !== -1;
    return `<label class="recm-check${ch?' checked':''}">
      <input type="checkbox" ${ch?'checked':''} onchange="recordToggleMuang(${idx},'${opt}',this)">
      ${opt}
    </label>`;
  }).join('');
  const krachokBoxes = KRACHOK_OPTIONS.map(opt => {
    const ch = (e.krachok||[]).indexOf(opt) !== -1;
    return `<label class="recm-check${ch?' checked':''}">
      <input type="checkbox" ${ch?'checked':''} onchange="recordToggleKrachok(${idx},'${opt}',this)">
      ${opt}
    </label>`;
  }).join('');
  const rt = e.rang === 'รางธรรมดา';
  const re_ = e.rang === 'รางเตี้ย';
  return `
    <div class="recm-entry">
      <div class="recm-entry-head">
        <div class="recm-entry-num">รายการที่ ${num}</div>
        ${!ro?`<button class="recm-rm-entry" onclick="recordRemoveEntry(${idx})">× ลบ</button>`:''}
      </div>
      <div class="fg" style="margin-bottom:10px;">
        <label class="fl">📍 ตำแหน่ง</label>
        <input class="fi" type="text" placeholder="เช่น ห้องนอน / ระเบียง" value="${escAttr(e.location||'')}" oninput="recordOnEntryChange(${idx},'location',this.value)">
      </div>
      <div class="recm-size-row">
        <div class="fg">
          <label class="fl">📏 กว้าง (cm)</label>
          <input class="fi" type="number" inputmode="decimal" value="${e.width??''}" placeholder="0" oninput="recordOnEntryChange(${idx},'width',this.value===''?null:parseFloat(this.value))">
        </div>
        <div class="fg">
          <label class="fl">📐 สูง (cm)</label>
          <input class="fi" type="number" inputmode="decimal" value="${e.height??''}" placeholder="0" oninput="recordOnEntryChange(${idx},'height',this.value===''?null:parseFloat(this.value))">
        </div>
        <div class="fg">
          <label class="fl">🔢 จำนวน</label>
          <input class="fi" type="number" inputmode="numeric" value="${e.qty??''}" placeholder="1" min="1" oninput="recordOnEntryChange(${idx},'qty',this.value===''?null:parseInt(this.value))">
        </div>
      </div>

      <div style="margin-bottom:10px;">
        <div style="font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">🪟 มุ้งลวด</div>
        <div class="recm-check-grid">${muangBoxes}</div>
        <div class="recm-rang-row">
          <label class="recm-check${rt?' checked':''}">
            <input type="radio" name="rang_${idx}" ${rt?'checked':''} onclick="recordSetRang(${idx},'รางธรรมดา')">
            รางธรรมดา
          </label>
          <label class="recm-check${re_?' checked':''}">
            <input type="radio" name="rang_${idx}" ${re_?'checked':''} onclick="recordSetRang(${idx},'รางเตี้ย')">
            รางเตี้ย
          </label>
          ${(rt||re_)&&!ro?`<button class="recm-rm-entry" onclick="recordSetRang(${idx},null)" style="white-space:nowrap;">× ล้างราง</button>`:''}
        </div>
      </div>

      <div style="margin-bottom:10px;">
        <div style="font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">🪞 กระจกอลูมิเนียม</div>
        <div class="recm-check-grid">${krachokBoxes}</div>
      </div>

      <div class="fg">
        <label class="fl">📝 รายละเอียดเพิ่มเติม</label>
        <textarea class="fi" rows="2" oninput="recordOnEntryChange(${idx},'detail',this.value)">${escHtml(e.detail||'')}</textarea>
      </div>
    </div>
  `;
}

function escAttr(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escHtml(s){ return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Event Handlers ──
function recordOnChange(){
  _recForm.customer.name = document.getElementById('recmCustName').value;
  _recForm.customer.phone = document.getElementById('recmCustPhone').value;
  _recForm.linkedJobId = document.getElementById('recmLinkedJob').value;
  _recForm.dirty = true;
}
function recordOnEntryChange(idx, field, val){
  if (!_recForm.entries[idx]) return;
  _recForm.entries[idx][field] = val;
  // recompute isEmpty
  const e = _recForm.entries[idx];
  e.isEmpty = !e.location && !e.width && !e.height && !e.qty && !e.detail
              && (!e.muang || !e.muang.length) && (!e.krachok || !e.krachok.length) && !e.rang;
  _recForm.dirty = true;
}
function recordToggleMuang(idx, opt, el){
  if (!_recForm.entries[idx]) return;
  const e = _recForm.entries[idx];
  if (!e.muang) e.muang = [];
  const i = e.muang.indexOf(opt);
  if (i === -1) e.muang.push(opt);
  else e.muang.splice(i, 1);
  el.parentElement.classList.toggle('checked', i === -1);
  recordOnEntryChange(idx, 'muang', e.muang);
}
function recordToggleKrachok(idx, opt, el){
  if (!_recForm.entries[idx]) return;
  const e = _recForm.entries[idx];
  if (!e.krachok) e.krachok = [];
  const i = e.krachok.indexOf(opt);
  if (i === -1) e.krachok.push(opt);
  else e.krachok.splice(i, 1);
  el.parentElement.classList.toggle('checked', i === -1);
  recordOnEntryChange(idx, 'krachok', e.krachok);
}
function recordSetRang(idx, val){
  if (!_recForm.entries[idx]) return;
  _recForm.entries[idx].rang = val;
  recordOnEntryChange(idx, 'rang', val);
  recordRenderForm();  // re-render to update radio state
}

function recordAddEntry(){
  if (_recForm.entries.length >= REC_MAX_ENTRIES) {
    toast('สูงสุด ' + REC_MAX_ENTRIES + ' รายการ'); return;
  }
  _recForm.entries.push(recordEmptyEntry(_recForm.entries.length + 1));
  _recForm.dirty = true;
  recordRenderForm();
  // scroll ไปท้าย
  setTimeout(() => {
    document.getElementById('recmModal').scrollTop = 99999;
  }, 50);
}

function recordRemoveEntry(idx){
  if (_recForm.entries.length <= 1) { toast('ต้องมีอย่างน้อย 1 รายการ'); return; }
  if (!confirm('ลบรายการที่ ' + (idx+1) + '?')) return;
  _recForm.entries.splice(idx, 1);
  // renumber
  _recForm.entries.forEach((e, i) => e.no = i + 1);
  _recForm.dirty = true;
  recordRenderForm();
}

// ── Auto-save Draft ──
function recordStartAutosave(){
  recordStopAutosave();
  _recForm.draftTimer = setInterval(() => {
    if (!_recForm.dirty || !_recForm.draftKey) return;
    try {
      localStorage.setItem(_recForm.draftKey, JSON.stringify({
        customer: _recForm.customer,
        linkedJobId: _recForm.linkedJobId,
        entries: _recForm.entries
      }));
      _recForm.lastSavedAt = Date.now();
      _recForm.dirty = false;
      recordUpdateSaveStatus();
    } catch(e) {}
  }, 5000);
}
function recordStopAutosave(){
  if (_recForm.draftTimer) clearInterval(_recForm.draftTimer);
  _recForm.draftTimer = null;
}
function recordUpdateSaveStatus(){
  const el = document.getElementById('recmSaveStatus');
  if (!el) return;
  if (_recForm.mode === 'view') { el.textContent = '🔒 โหมดดู (readonly)'; return; }
  if (_recForm.lastSavedAt) {
    const t = new Date(_recForm.lastSavedAt).toLocaleTimeString('th-TH',{timeStyle:'short'});
    el.textContent = '💾 draft บันทึกใน browser · ล่าสุด ' + t;
  } else {
    el.textContent = 'auto-save draft ทุก 5 วินาที';
  }
}

// ── Submit (Save / Update) ──
async function recordSubmit(){
  // validate
  if (!_recForm.customer.name || !_recForm.customer.name.trim()) {
    toast('กรอกชื่อลูกค้า'); return;
  }
  const nonEmpty = _recForm.entries.filter(e => !e.isEmpty);
  if (!nonEmpty.length) {
    toast('ต้องมีอย่างน้อย 1 รายการที่กรอกข้อมูล'); return;
  }

  const body = {
    customer: _recForm.customer,
    linkedJobId: _recForm.linkedJobId,
    entries: _recForm.entries
  };

  showLoad(_recForm.mode === 'edit' ? 'กำลังอัปเดต...' : 'กำลังบันทึก...');
  try {
    let r;
    if (_recForm.mode === 'edit') {
      r = await call({ action:'pk_recordUpdate', id: _recForm.id, ...body });
    } else {
      r = await call({ action:'pk_recordCreate', ...body });
    }
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'ผิดพลาด')); return; }
    toast(_recForm.mode === 'edit' ? '✅ อัปเดตแล้ว' : '✅ บันทึกแล้ว');
    clearCache(['pk_recordList','pk_getJobs']);
    // ลบ draft
    if (_recForm.draftKey) localStorage.removeItem(_recForm.draftKey);
    _recForm.dirty = false;
    recordStopAutosave();
    document.getElementById('recmModal').classList.remove('on');
    document.body.style.overflow = '';
    recordsLoad(false);
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

// ── Export PNG A4 (C4) ──
const A4_ENTRIES_PER_PAGE = 5;

async function recordExportImg(){
  if (typeof html2canvas === 'undefined') {
    toast('❌ html2canvas ยังไม่โหลด — ลองรีเฟรชหน้า');
    return;
  }
  const id = _recForm.id || ('NEW_' + Date.now());
  const customer = _recForm.customer || { name:'', phone:'' };
  const entries = (_recForm.entries || []).filter(e => !e.isEmpty);
  if (!entries.length) { toast('ไม่มีรายการให้ export'); return; }

  // แบ่งหน้า
  const pages = [];
  for (let i = 0; i < entries.length; i += A4_ENTRIES_PER_PAGE) {
    pages.push(entries.slice(i, i + A4_ENTRIES_PER_PAGE));
  }

  showLoad(`กำลังสร้างรูป ${pages.length} หน้า...`);

  // build host
  let host = document.getElementById('a4ExportHost');
  if (!host) {
    host = document.createElement('div');
    host.id = 'a4ExportHost';
    host.className = 'a4-export-host';
    document.body.appendChild(host);
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('th-TH', { day:'2-digit', month:'2-digit', year:'numeric' });
  const fileDate = now.toISOString().split('T')[0];
  const safeName = (customer.name||'noname').replace(/[^\w\u0E00-\u0E7F]+/g, '_').slice(0, 40);

  try {
    for (let p = 0; p < pages.length; p++) {
      host.innerHTML = renderA4Page(pages[p], p+1, pages.length, customer, dateStr);
      // รอ font + render
      await new Promise(r => setTimeout(r, 200));
      const canvas = await html2canvas(host.querySelector('.a4-page'), {
        backgroundColor: '#ffffff',
        scale: 2,            // ความคมชัด 2x
        logging: false,
        useCORS: true
      });
      // download
      const dataUrl = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `บันทึกขนาด_${safeName}_${fileDate}_หน้า${p+1}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // เว้นช่วงให้ browser download ทัน
      await new Promise(r => setTimeout(r, 400));
    }
    host.innerHTML = '';
    hideLoad();
    toast(`✅ Export เสร็จ ${pages.length} หน้า`);
  } catch(e) {
    hideLoad();
    toast('❌ Export ผิดพลาด: ' + e.message);
    host.innerHTML = '';
  }
}

function renderA4Page(entriesInPage, pageNum, totalPages, customer, dateStr){
  const linkedHtml = _recForm.linkedJobId
    ? `<div class="a4-meta-row"><span class="a4-meta-label">🔗 ผูกกับงาน:</span><span class="a4-meta-val">${escAttr(_recForm.linkedJobId)}</span></div>`
    : '';
  const headBlock = `
    <div class="a4-header">
      <div class="a4-title">📐 บันทึกขนาดรายการ</div>
      <div class="a4-meta-grid">
        <div class="a4-meta-row"><span class="a4-meta-label">👤 ลูกค้า:</span><span class="a4-meta-val">${escAttr(customer.name)||'-'}</span></div>
        <div class="a4-meta-row"><span class="a4-meta-label">📞 เบอร์:</span><span class="a4-meta-val">${escAttr(customer.phone)||'-'}</span></div>
        <div class="a4-meta-row"><span class="a4-meta-label">📅 วันที่:</span><span class="a4-meta-val">${dateStr}</span></div>
        <div class="a4-meta-row"><span class="a4-meta-label">✍️ ผู้บันทึก:</span><span class="a4-meta-val">${escAttr(CURRENT_USER.username)||'-'}</span></div>
        ${linkedHtml}
      </div>
    </div>
  `;
  const entriesHtml = entriesInPage.map(e => renderA4Entry(e)).join('');
  return `
    <div class="a4-page">
      ${headBlock}
      <div class="a4-entries">
        ${entriesHtml}
      </div>
      <div class="a4-footer">
        <span>${_recForm.id || ''}</span>
        <span>หน้า ${pageNum} / ${totalPages}</span>
      </div>
    </div>
  `;
}

function renderA4Entry(e){
  const w = e.width != null ? e.width : '-';
  const h = e.height != null ? e.height : '-';
  const qty = e.qty || 1;
  const sizeStr = `${w} × ${h} cm × ${qty} ชุด`;

  const muang = (e.muang || []);
  const krachok = (e.krachok || []);
  const muangTags = muang.length
    ? muang.map(m => `<span class="a4-tag muang">🪟 ${escAttr(m)}</span>`).join('')

  const krachokTags = krachok.length
    ? krachok.map(k => `<span class="a4-tag krachok">🪞 ${escAttr(k)}</span>`).join('')
    : '';
  const rangTag = e.rang ? `<span class="a4-tag rang">📏 ${escAttr(e.rang)}</span>` : '';

  return `
    <div class="a4-entry">
      <div class="a4-entry-head">
        <span class="a4-entry-num">#${e.no}</span>
        <span class="a4-entry-loc">📍 ${escAttr(e.location)||'(ไม่ระบุตำแหน่ง)'}</span>

        ${muangTags}${rangTag}
      </div>

      ${e.detail ? `<div class="a4-detail">📝 ${escAttr(e.detail)}</div>` : ''}

  `;

// ── เปลี่ยน/ยกเลิก linkedJobId ของ record ที่มีอยู่ ──
// ── Handoff: Record → Quote (D4) ──
// Mapping: มุ้งลวด → quote types / กระจก → ใส่ note
const REC_TO_QUO_TYPE_MAP = {
  'เก็บซ้าย': 'jeeb_single',
  'เก็บขวา': 'jeeb_single',
  'แยกกลาง': 'jeeb_split',
  'อิสระ': 'jeeb_free',
  '4 มือจับ': 'jeeb_h4',
  'มุ้งบานเลื่อน': 'slide',
  'มุ้งบานเลื่อนแยกกลาง': 'slide_split',
  'มุ้งบานเปิด': 'open',
  'มุ้งบานเปิดแยกกลาง': 'open_split'
};

// แปลง record entries → quote entries (shared)
function pkRecordEntriesToQuote(entries){
  return (entries || []).filter(e => !e.isEmpty).map((e, i) => {
    const types = [];
    (e.muang || []).forEach(m => {
      const tid = REC_TO_QUO_TYPE_MAP[m];
      if (tid && !types.includes(tid)) types.push(tid);
    });
    const noteParts = [];
    if (e.krachok && e.krachok.length) noteParts.push('🪞 กระจก: ' + e.krachok.join(', '));
    if (e.rang) noteParts.push('📏 ' + e.rang);
    if (e.detail) noteParts.push(e.detail);
    return {
      no: i + 1, isEmpty: false,
      location: e.location || '',
      width: e.width, height: e.height, qty: e.qty || 1,
      colorId: '', types, note: noteParts.join(' · ')
    };
  });
}

async function recordHandoffToQuote(){
  if (!_recForm.id) { toast('ต้องบันทึก record ก่อน'); return; }
  if (!isOfficeLevel() && CURRENT_USER.role !== 'sales') {
    toast('เฉพาะ office / sales'); return;
  }

  // ตรวจว่ามี quote ที่ผูกกับ record นี้แล้วหรือยัง
  if (_recForm.linkedJobId) {
    showLoad('กำลังตรวจ...');
    try {
      const r = await call({ action:'pk_quotesByJob', jobId: _recForm.linkedJobId });
      hideLoad();
      if (r.ok && r.quotes && r.quotes.length > 0) {
        // หา quote ที่ผูก linkedRecordId = id นี้
        const linked = r.quotes.filter(q => true);  // backend ไม่กรองตาม linkedRecordId
        if (linked.length > 0) {
          if (confirm('มี Quote ที่ผูกกับงานนี้แล้ว ' + linked.length + ' ใบ\n\nกด OK → เปิดอันล่าสุด\nกด Cancel → สร้างใหม่')) {
            const latest = linked.sort((a,b) => b.updatedAt - a.updatedAt)[0];
            recordCloseModal();
            quoteOpenEdit(latest.id);
            return;
          }
        }
      }
    } catch(e) { hideLoad(); }
  }

  // แปลง entries จาก record → quote entries
  const quoteEntries = pkRecordEntriesToQuote(_recForm.entries);

  if (!quoteEntries.length) {
    toast('Record ไม่มีรายการที่กรอกข้อมูล'); return;
  }

  // ปิด record modal + เปิด quote modal พร้อม prefill
  recordCloseModal();
  setTimeout(() => {
    quoteOpenNew({
      customer: _recForm.customer,
      linkedJobId: _recForm.linkedJobId,
      linkedRecordId: _recForm.id,
      entries: quoteEntries
    });
    toast('💰 เริ่มคำนวณราคา — ตรวจสอบ types แล้วบันทึก');
  }, 250);
}

async function recordChangeLink(){
  if (!_recForm.id) { toast('record ยังไม่มี id'); return; }
  // โหลด recent jobs ถ้ายังไม่มี
  if (!_recForm.recentJobs.length) {
    showLoad('กำลังโหลด...');
    await recordLoadRecentJobs();
    hideLoad();
  }

  const currentLinked = _recForm.linkedJobId || '';
  const opts = _recForm.recentJobs.map((j, i) =>
    `${i+1}. ${j.id} · ${j.name||''} · ${fmtD(j.date)}${j.id===currentLinked?' (ปัจจุบัน)':''}`
  ).join('\n');
  const msg = 'ผูก record นี้กับ Job ID อะไร?\n\n' +
              'ปัจจุบัน: ' + (currentLinked||'(ไม่ผูก)') + '\n\n' +
              'พิมพ์เลข (1-' + _recForm.recentJobs.length + ')\n' +
              'หรือพิมพ์ Job ID ตรงๆ (เช่น I0123)\n' +
              'หรือพิมพ์ "x" เพื่อยกเลิกผูก\n\n' +
              opts;
  const input = prompt(msg);
  if (input === null) return;
  let newJobId = '';
  const trimmed = input.trim();
  if (trimmed.toLowerCase() === 'x' || trimmed === '') {
    newJobId = '';
  } else if (/^\d+$/.test(trimmed)) {
    const n = parseInt(trimmed);
    if (n >= 1 && n <= _recForm.recentJobs.length) {
      newJobId = _recForm.recentJobs[n-1].id;
    } else { toast('เลขไม่ถูกต้อง'); return; }
  } else {
    newJobId = trimmed;
  }

  showLoad('กำลังผูก...');
  try {
    const r = await call({ action:'pk_recordLink', id: _recForm.id, linkedJobId: newJobId });
    hideLoad();
    if (!r.ok) { toast('❌ ' + r.error); return; }
    _recForm.linkedJobId = newJobId;
    clearCache(['pk_recordList','pk_getJobs']);
    toast(newJobId ? '🔗 ผูกกับ ' + newJobId : '↩ ยกเลิกผูกแล้ว');
    // update UI
    const sel = document.getElementById('recmLinkedJob');
    if (sel) {
      // ถ้า newJobId ไม่มีใน dropdown → เพิ่ม
      if (newJobId && ![...sel.options].some(o => o.value === newJobId)) {
        const o = document.createElement('option');
        o.value = newJobId; o.textContent = newJobId + ' · (เก่า)';
        sel.appendChild(o);
      }
      sel.value = newJobId;
    }
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

//  Calculation (Client-side mirror of server logic)
// ════════════════════════════════════════
const PK_H4_EXTRA_CLIENT = 2000;
const PK_H4_THRESHOLD_SQM_CLIENT = 6;

function quoteCalcEntry(entry){
  if (!_quoteMetadata) return { total:0, breakdown:[] };
  const w = Number(entry.width) || 0;
  const h = Number(entry.height) || 0;
  const qty = Number(entry.qty) || 1;
  const types = Array.isArray(entry.types) ? entry.types : [];
  const colorId = entry.colorId || _quoForm.mainColor;
  const color = _quoteMetadata.colors.find(c => c.id === colorId);
  const group = color ? color.group : 'g1';
  const slidePrice = Number(_quoForm.slidePrice) || 0;
  const openPrice = Number(_quoForm.openPrice) || 0;

  let total = 0;
  const breakdown = [];

  types.forEach(typeId => {
    const t = _quoteMetadata.types[typeId];
    if (!t) return;

    let p = 0;
    let note = '';
    if (t.calc === 'area') {
      const tbl = _quoteMetadata.priceTable[_quoForm.priceType] && _quoteMetadata.priceTable[_quoForm.priceType][group];
      const ratePerSqm = tbl ? tbl[t.priceKey] : null;
      if (!ratePerSqm) { breakdown.push({ typeId, label:t.label, price:0, note:'⚠️ ไม่มีราคา' }); return; }
      let area = (w * h) / 10000;
      const minArea = h >= 170 ? 2 : 1;
      if (area < minArea) area = minArea;
      p = ratePerSqm * area * qty;
      note = ratePerSqm + '/ตร.ม.';
    } else if (t.calc === 'area_h4') {
      // h4 ใช้สูตรพิเศษ: rate_free × area × qty + (area<6 ? 2000×qty : 0)
      const tbl = _quoteMetadata.priceTable[_quoForm.priceType] && _quoteMetadata.priceTable[_quoForm.priceType][group];
      const ratePerSqm = tbl ? tbl[t.priceKey] : null;
      if (!ratePerSqm) { breakdown.push({ typeId, label:t.label, price:0, note:'⚠️ ไม่มีราคา' }); return; }
      let area = (w * h) / 10000;
      const minArea = h >= 170 ? 2 : 1;
      if (area < minArea) area = minArea;
      const basePrice = ratePerSqm * area * qty;
      const extra = (area < PK_H4_THRESHOLD_SQM_CLIENT) ? (PK_H4_EXTRA_CLIENT * qty) : 0;
      p = basePrice + extra;
      note = ratePerSqm + '/ตร.ม.' + (extra ? ' +2,000×' + qty : ' (≥ 6 ตร.ม.)');
    } else if (t.calc === 'perimeter') {
      const perim = (w + h) * 2 / 100;
      const rate = t.priceKey === 'slide' ? slidePrice : openPrice;
      p = rate * perim * qty;
      note = rate + '/ม.';
    } else if (t.calc === 'perimeter_split') {
      const perim = ((w/2) + h) * 2 * 2 / 100;
      const rate = t.priceKey === 'slide' ? slidePrice : openPrice;
      p = rate * perim * qty;
      note = rate + '/ม.';
    }

    breakdown.push({ typeId, label: t.label, price: Math.round(p), note });
    total += p;
  });

  return { total: Math.round(total), breakdown };
}

function quoteCalcAll(){
  let grand = 0;
  _quoForm.entries.forEach(e => {
    if (e.isEmpty) { e._calc = { total:0, breakdown:[] }; return; }
    e._calc = quoteCalcEntry(e);
    grand += e._calc.total;
  });
  // บวก additionalFees
  (_quoForm.additionalFees || []).forEach(f => {
    grand += Number(f.amount) || 0;
  });
  return grand;
}

function quoteRenderEntry(e, idx, ro){
  const num = idx + 1;
  const colorOptions = ['<option value="">▼ ใช้สีหลัก</option>']
    .concat((_quoteMetadata?.colors||[]).map(c => {
      const sel = c.id === e.colorId ? ' selected' : '';
      return `<option value="${c.id}"${sel}>${c.label} (${c.group})</option>`;
    }));

  // คำนวณก่อนทุกครั้ง (เพื่อรองรับการเปลี่ยน priceType/mainColor/raคา)
  e._calc = e.isEmpty ? { total:0, breakdown:[] } : quoteCalcEntry(e);

  // Type checkboxes
  const typesHtml = QUO_TYPE_ORDER.map(tid => {
    const t = _quoteMetadata?.types[tid];
    if (!t) return '';
    const checked = (e.types||[]).indexOf(tid) !== -1;
    // ตรวจว่ามีราคาไหม
    let unavailable = false;
    if (t.calc === 'area') {
      const colorId = e.colorId || _quoForm.mainColor;
      const color = (_quoteMetadata?.colors||[]).find(c => c.id === colorId);
      const group = color ? color.group : 'g1';
      const tbl = _quoteMetadata.priceTable[_quoForm.priceType] && _quoteMetadata.priceTable[_quoForm.priceType][group];
      if (!tbl || !tbl[t.priceKey]) unavailable = true;
    }
    return `<label class="quom-type${checked?' checked':''}${unavailable&&!checked?' unavailable':''}">
      <input type="checkbox" ${checked?'checked':''} ${unavailable&&!checked?'disabled':''} onchange="quoteToggleType(${idx},'${tid}',this)">
      ${t.label}
    </label>`;
  }).join('');

  const cls = e.isEmpty || e._calc.total === 0 ? '' : 'has-calc';
  const breakdownHtml = (e._calc.breakdown||[]).length ? `
    <div class="quom-calc-breakdown">
      ${e._calc.breakdown.map(b => `
        <div>
          <span>• ${b.label}${b.note?' ('+b.note+')':''}</span>
          <span style="${b.note==='⚠️ ไม่มีราคา'?'color:var(--rd);':'color:var(--tx);'}">${b.note==='⚠️ ไม่มีราคา'?b.note:'฿'+fmt(b.price)}</span>
        </div>
      `).join('')}
    </div>` : '';

  return `
    <div class="quom-entry ${cls}">
      <div class="quom-entry-head">
        <div class="quom-entry-num">รายการที่ ${num}</div>
        ${!ro?`<button class="quom-rm-entry" onclick="quoteRemoveEntry(${idx})">× ลบ</button>`:''}
      </div>
      <div class="fg" style="margin-bottom:10px;">
        <label class="fl">📍 ตำแหน่ง</label>
        <input class="fi" type="text" placeholder="เช่น ห้องนอน" value="${escAttr(e.location||'')}" oninput="quoteOnEntryChange(${idx},'location',this.value)">
      </div>
      <div class="quom-size-row">
        <div class="fg">
          <label class="fl">📏 กว้าง (cm)</label>
          <input class="fi" type="number" inputmode="decimal" value="${e.width??''}" oninput="quoteOnEntryChange(${idx},'width',this.value===''?null:parseFloat(this.value))">
        </div>
        <div class="fg">
          <label class="fl">📐 สูง (cm)</label>
          <input class="fi" type="number" inputmode="decimal" value="${e.height??''}" oninput="quoteOnEntryChange(${idx},'height',this.value===''?null:parseFloat(this.value))">
        </div>
        <div class="fg">
          <label class="fl">🔢 จำนวน</label>
          <input class="fi" type="number" inputmode="numeric" value="${e.qty??''}" min="1" oninput="quoteOnEntryChange(${idx},'qty',this.value===''?null:parseInt(this.value))">
        </div>
      </div>
      <div class="fg" style="margin-bottom:10px;">
        <label class="fl">🎨 สี (เฉพาะรายการนี้)</label>
        <select class="fi" onchange="quoteOnEntryChange(${idx},'colorId',this.value)">${colorOptions.join('')}</select>
      </div>
      <div style="margin-bottom:8px;">
        <div style="font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">ประเภทมุ้ง (ติ๊กได้หลายอย่าง)</div>
        <div class="quom-types-grid">${typesHtml}</div>
      </div>
      <div class="fg" style="margin-bottom:10px;">
        <label class="fl">📝 หมายเหตุ</label>
        <textarea class="fi" rows="2" oninput="quoteOnEntryChange(${idx},'note',this.value)">${escHtml(e.note||'')}</textarea>
      </div>
      <div class="quom-calc-box">
        <div class="quom-calc-head">
          <span class="quom-calc-label">💰 ยอดรายการนี้</span>
          <span class="quom-calc-total">฿${fmt(e._calc.total||0)}</span>
        </div>
        ${breakdownHtml}
      </div>
    </div>
  `;
}

// ════════════════════════════════════════
//  Event Handlers
// ════════════════════════════════════════
function quoteOnChange(){
  _quoForm.customer.name = document.getElementById('quomCustName').value;
  _quoForm.customer.phone = document.getElementById('quomCustPhone').value;
  _quoForm.linkedJobId = document.getElementById('quomLinkedJob').value;
  _quoForm.dirty = true;
}

function quoteOnPriceTypeChange(){
  _quoForm.priceType = document.getElementById('quomPriceType').value;
  _quoForm.dirty = true;
  quoteRenderForm();
}

function quoteOnMainColorChange(){
  _quoForm.mainColor = document.getElementById('quomMainColor').value;
  _quoForm.dirty = true;
  quoteRenderForm();
}

function quoteOnPriceChange(field, val){
  _quoForm[field] = parseFloat(val) || 0;
  _quoForm.dirty = true;
  // re-calc แต่ไม่ต้อง re-render full (เพราะ input อยู่ที่ price)
  quoteCalcAll();
  quoteUpdateGrandTotal();
  // re-render entries เพื่อ update breakdown
  quoteRerenderEntriesOnly();
}

function quoteOnEntryChange(idx, field, val){
  if (!_quoForm.entries[idx]) return;
  _quoForm.entries[idx][field] = val;
  const e = _quoForm.entries[idx];
  e.isEmpty = !e.location && !e.width && !e.height && !e.qty && !e.note
              && (!e.types || !e.types.length);
  _quoForm.dirty = true;
  // re-calc แค่ entry นี้
  e._calc = e.isEmpty ? { total:0, breakdown:[] } : quoteCalcEntry(e);
  // ถ้าเปลี่ยน colorId ของ entry → ต้อง re-render เพราะ unavailable เปลี่ยน
  if (field === 'colorId') {
    quoteRerenderEntriesOnly();
  } else {
    quoteUpdateEntryCalc(idx);
  }
  quoteUpdateGrandTotal();
}

function quoteToggleType(idx, typeId, el){
  if (!_quoForm.entries[idx]) return;
  const e = _quoForm.entries[idx];
  if (!e.types) e.types = [];
  const i = e.types.indexOf(typeId);
  if (i === -1) e.types.push(typeId);
  else e.types.splice(i, 1);
  el.parentElement.classList.toggle('checked', i === -1);
  quoteOnEntryChange(idx, 'types', e.types);
}

function quoteAddEntry(){
  if (_quoForm.entries.length >= QUO_MAX_ENTRIES) {
    toast('สูงสุด ' + QUO_MAX_ENTRIES + ' รายการ'); return;
  }
  _quoForm.entries.push(quoteEmptyEntry(_quoForm.entries.length + 1));
  _quoForm.dirty = true;
  quoteRenderForm();
  setTimeout(() => { document.getElementById('quomModal').scrollTop = 99999; }, 50);
}

function quoteRemoveEntry(idx){
  if (_quoForm.entries.length <= 1) { toast('ต้องมีอย่างน้อย 1 รายการ'); return; }
  if (!confirm('ลบรายการที่ ' + (idx+1) + '?')) return;
  _quoForm.entries.splice(idx, 1);
  _quoForm.entries.forEach((e, i) => e.no = i + 1);
  _quoForm.dirty = true;
  quoteRenderForm();
}

// ── Additional Fees ──
function quoteAddFee(){
  if (!_quoForm.additionalFees) _quoForm.additionalFees = [];
  _quoForm.additionalFees.push({ label: '', amount: 0 });
  _quoForm.dirty = true;
  quoteRenderForm();
}

function quoteRemoveFee(idx){
  if (!_quoForm.additionalFees) return;
  _quoForm.additionalFees.splice(idx, 1);
  _quoForm.dirty = true;
  quoteRenderForm();
}

function quoteOnFeeChange(idx, field, val){
  if (!_quoForm.additionalFees || !_quoForm.additionalFees[idx]) return;
  _quoForm.additionalFees[idx][field] = val;
  _quoForm.dirty = true;
  quoteUpdateGrandTotal();
}

// ── Update เฉพาะส่วน — ไม่ re-render ทั้งหมด เพื่อไม่ลบ focus ของ input ──
function quoteUpdateEntryCalc(idx){
  // หา .quom-entry ตำแหน่ง idx แล้วอัปเดต .quom-calc-box
  const entries = document.querySelectorAll('.quom-entry');
  if (!entries[idx]) return;
  const e = _quoForm.entries[idx];
  const calcBox = entries[idx].querySelector('.quom-calc-box');
  if (!calcBox) return;
  const breakdownHtml = (e._calc.breakdown||[]).length ? `
    <div class="quom-calc-breakdown">
      ${e._calc.breakdown.map(b => `
        <div>
          <span>• ${b.label}${b.note?' ('+b.note+')':''}</span>
          <span style="${b.note==='⚠️ ไม่มีราคา'?'color:var(--rd);':'color:var(--tx);'}">${b.note==='⚠️ ไม่มีราคา'?b.note:'฿'+fmt(b.price)}</span>
        </div>
      `).join('')}
    </div>` : '';
  calcBox.innerHTML = `
    <div class="quom-calc-head">
      <span class="quom-calc-label">💰 ยอดรายการนี้</span>
      <span class="quom-calc-total">฿${fmt(e._calc.total||0)}</span>
    </div>
    ${breakdownHtml}
  `;
  entries[idx].classList.toggle('has-calc', !e.isEmpty && e._calc.total > 0);
}

function quoteUpdateGrandTotal(){
  let grand = _quoForm.entries.reduce((s,e) => s + (e._calc?.total||0), 0);
  (_quoForm.additionalFees || []).forEach(f => { grand += Number(f.amount) || 0; });
  const el = document.getElementById('quomGrandTotal');
  if (el) el.textContent = '฿' + fmt(grand);
}

function quoteRerenderEntriesOnly(){
  // re-render เฉพาะ entries section
  const body = document.getElementById('quomBody');
  if (!body) return;
  const entries = body.querySelectorAll('.quom-entry');
  const ro = _quoForm.mode === 'view';
  _quoForm.entries.forEach((e, idx) => {
    if (!entries[idx]) return;
    e._calc = e.isEmpty ? { total:0, breakdown:[] } : quoteCalcEntry(e);
  });
  // re-render ทั้ง form เพื่อ update checkbox states + unavailable
  quoteRenderForm();
}

// ── Auto-save Draft ──
function quoteStartAutosave(){
  quoteStopAutosave();
  _quoForm.draftTimer = setInterval(() => {
    if (!_quoForm.dirty || !_quoForm.draftKey) return;
    try {
      const snapshot = {
        customer: _quoForm.customer,
        priceType: _quoForm.priceType,
        mainColor: _quoForm.mainColor,
        slidePrice: _quoForm.slidePrice,
        openPrice: _quoForm.openPrice,
        linkedJobId: _quoForm.linkedJobId,
        linkedRecordId: _quoForm.linkedRecordId,
        entries: _quoForm.entries.map(e => { const copy = {...e}; delete copy._calc; return copy; }),
        additionalFees: _quoForm.additionalFees || []
      };
      localStorage.setItem(_quoForm.draftKey, JSON.stringify(snapshot));
      _quoForm.lastSavedAt = Date.now();
      _quoForm.dirty = false;
      quoteUpdateSaveStatus();
    } catch(e) {}
  }, 5000);
}
function quoteStopAutosave(){
  if (_quoForm.draftTimer) clearInterval(_quoForm.draftTimer);
  _quoForm.draftTimer = null;
}
function quoteUpdateSaveStatus(){
  const el = document.getElementById('quomSaveStatus');
  if (!el) return;
  if (_quoForm.mode === 'view') { el.textContent = '🔒 โหมดดู (readonly)'; return; }
  if (_quoForm.lastSavedAt) {
    const t = new Date(_quoForm.lastSavedAt).toLocaleTimeString('th-TH',{timeStyle:'short'});
    el.textContent = '💾 draft บันทึกใน browser · ล่าสุด ' + t;
  } else {
    el.textContent = 'auto-save draft ทุก 5 วินาที';
  }
}

// ── Submit ──
async function quoteSubmit(){
  if (!_quoForm.customer.name || !_quoForm.customer.name.trim()) {
    toast('กรอกชื่อลูกค้า'); return;
  }
  const nonEmpty = _quoForm.entries.filter(e => !e.isEmpty);
  if (!nonEmpty.length) { toast('ต้องมีอย่างน้อย 1 รายการ'); return; }

  // clean _calc ก่อนส่ง
  const entries = _quoForm.entries.map(e => {
    const copy = {...e}; delete copy._calc; return copy;
  });

  const body = {
    customer: _quoForm.customer,
    priceType: _quoForm.priceType,
    mainColor: _quoForm.mainColor,
    slidePrice: _quoForm.slidePrice,
    openPrice: _quoForm.openPrice,
    linkedJobId: _quoForm.linkedJobId,
    linkedRecordId: _quoForm.linkedRecordId,
    entries,
    additionalFees: _quoForm.additionalFees || []
  };

  showLoad(_quoForm.mode === 'edit' ? 'กำลังอัปเดต...' : 'กำลังบันทึก...');
  try {
    let r;
    if (_quoForm.mode === 'edit') {
      r = await call({ action:'pk_quoteUpdate', id: _quoForm.id, ...body });
    } else {
      r = await call({ action:'pk_quoteCreate', ...body });
    }
    hideLoad();
    if (!r.ok) { toast('❌ ' + (r.error||'ผิดพลาด')); return; }
    toast(_quoForm.mode === 'edit' ? '✅ อัปเดตแล้ว · ฿' + fmt(r.totalAmount||0) : '✅ บันทึกแล้ว · ฿' + fmt(r.totalAmount||0));
    clearCache(['pk_quoteList','pk_getJobs']);
    if (_quoForm.draftKey) localStorage.removeItem(_quoForm.draftKey);
    _quoForm.dirty = false;
    quoteStopAutosave();
    document.getElementById('quomModal').classList.remove('on');
    document.body.style.overflow = '';
    quotesLoad(false);
  } catch(e) { hideLoad(); toast('❌ เชื่อมต่อไม่ได้'); }
}

// ── Quote Export PNG A4 (D4) ──
const QUO_A4_ENTRIES_PER_PAGE = 4;

async function quoteExportImg(){
  if (typeof html2canvas === 'undefined') {
    toast('❌ html2canvas ยังไม่โหลด'); return;
  }
  if (!_quoteMetadata) { toast('โหลด metadata ก่อน'); return; }
  const customer = _quoForm.customer || { name:'', phone:'' };
  // ใช้ entries ที่ไม่ว่าง + recalc ให้แน่ใจ
  const entries = (_quoForm.entries || []).filter(e => !e.isEmpty).map(e => {
    e._calc = quoteCalcEntry(e);
    return e;
  });
  if (!entries.length) { toast('ไม่มีรายการให้ export'); return; }
  const fees = (_quoForm.additionalFees || []).filter(f => Number(f.amount) > 0);

  // คำนวณ grand total
  let grand = entries.reduce((s,e) => s + (e._calc?.total||0), 0);
  fees.forEach(f => { grand += Number(f.amount) || 0; });

  // แบ่งหน้า — fees + grand อยู่หน้าสุดท้ายเท่านั้น
  const pages = [];
  for (let i = 0; i < entries.length; i += QUO_A4_ENTRIES_PER_PAGE) {
    pages.push(entries.slice(i, i + QUO_A4_ENTRIES_PER_PAGE));
  }
  if (!pages.length) pages.push([]);

  showLoad(`กำลังสร้างรูป ${pages.length} หน้า...`);

  let host = document.getElementById('a4QuoExportHost');
  if (!host) {
    host = document.createElement('div');
    host.id = 'a4QuoExportHost';
    host.className = 'a4-export-host';
    document.body.appendChild(host);
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('th-TH', { day:'2-digit', month:'2-digit', year:'numeric' });
  const fileDate = now.toISOString().split('T')[0];
  const safeName = (customer.name||'noname').replace(/[^\w\u0E00-\u0E7F]+/g, '_').slice(0, 40);

  try {
    for (let p = 0; p < pages.length; p++) {
      const isLast = p === pages.length - 1;
      host.innerHTML = renderQuoteA4Page(pages[p], p+1, pages.length, customer, dateStr, isLast ? fees : null, isLast ? grand : null);
      await new Promise(r => setTimeout(r, 200));
      const canvas = await html2canvas(host.querySelector('.a4-page'), {
        backgroundColor: '#ffffff', scale: 2, logging: false, useCORS: true
      });
      const dataUrl = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `ใบเสนอราคา_${safeName}_${fileDate}_หน้า${p+1}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      await new Promise(r => setTimeout(r, 400));
    }
    host.innerHTML = '';
    hideLoad();
    toast(`✅ Export เสร็จ ${pages.length} หน้า`);
  } catch(e) {
    hideLoad();
    toast('❌ Export ผิดพลาด: ' + e.message);
    host.innerHTML = '';
  }
}

  const bdwnHtml = (e._calc?.breakdown||[]).map(b => `

}

// แปลง URL Drive รูปแบบเก่า → ใหม่ (สำหรับแสดงใน <img>)
function fixDriveUrl(url){
  if (!url || typeof url !== 'string') return url;
  // ถ้าเป็น base64 (เก่า) → คืนตรงๆ
  if (url.startsWith('data:')) return url;
  // ถ้าเป็น uc?export=view → แปลงเป็น lh3
  const m = url.match(/drive\.google\.com\/uc\?(?:export=view&)?id=([\w-]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  // ถ้าเป็น lh3 อยู่แล้ว → ไม่แตะ
  return url;
}
function updateDateDisplay(input){
  if (!input) return;
  const span = document.querySelector(`.date-display[data-for="${input.id}"]`);
  if (!span) return;
  const v = input.value;
  if (!v) { span.textContent='เลือกวันที่'; span.classList.add('empty'); return; }
  const p = v.split('-');
  if (p.length !== 3) { span.textContent='เลือกวันที่'; span.classList.add('empty'); return; }
  span.textContent = `${p[2]}/${p[1]}/${p[0].slice(2)}`;
  span.classList.remove('empty');
}
function refreshAllDateDisplays(){
  document.querySelectorAll('input[type="date"]').forEach(updateDateDisplay);
}

function pkpScreenCalc(type, W, H){
